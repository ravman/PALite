<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA Lite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#14141f;--card2:#1a1a2e;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#e17055;--orange:#fdcb6e;--text:#e8e8f0;--text2:#8888a0;--border:#2a2a3e;--radius:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#14141f,#1a1a2e);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .ctx{font-size:11px;color:var(--text2);text-align:right;cursor:pointer}
.header .ctx span{color:var(--accent2);font-weight:600}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;pointer-events:none}
.nav-inner{display:flex;align-items:flex-end;justify-content:space-between;padding:0 32px 16px;pointer-events:all}
.nav-pill{background:rgba(20,20,31,0.96);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:50px;display:flex;align-items:center;justify-content:space-between;padding:10px 28px;gap:32px}
.nav-btn{background:none;border:none;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-family:inherit;font-weight:500;transition:.2s;padding:4px 8px;border-radius:20px}
.nav-btn.active{color:white}
.nav-btn svg{width:22px;height:22px}
.nav-center{width:52px;height:52px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(255,255,255,0.2);border:none;transition:.2s;flex-shrink:0}
.nav-center:hover{transform:scale(1.05)}
.nav-center svg{width:22px;height:22px;color:#0a0a0f}
.page{padding:16px 20px}
.page-title{font-size:22px;font-weight:700;margin-bottom:16px}
.page-header{display:flex;align-items:center;gap:8px;padding:16px 20px 4px}
.back-btn{background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;color:var(--text2);transition:.2s;flex-shrink:0}
.back-btn:hover{color:white}
.back-btn svg{width:20px;height:20px}
.page-header-title{font-size:22px;font-weight:700;color:white}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:.2s}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card-title{font-size:14px;font-weight:600;margin-bottom:8px}
.card-sub{font-size:12px;color:var(--text2)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,184,148,.15);color:var(--green)}
.badge-red{background:rgba(225,112,85,.15);color:var(--red)}
.badge-orange{background:rgba(253,203,110,.15);color:var(--orange)}
.badge-purple{background:rgba(108,92,231,.15);color:var(--accent)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--card2);border-radius:var(--radius);padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:700;font-family:'Space Mono',monospace}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px}
.btn{padding:10px 20px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:11px}
.btn-green{background:var(--green);color:white}
.btn-red{background:var(--red);color:white}
.input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--card2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:.2s}
.input:focus{border-color:var(--accent)}
.label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.form-group{margin-bottom:14px}
select.input{appearance:none;cursor:pointer}
/* QR Code */
.qr-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);backdrop-filter:blur(12px);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.qr-modal-card{background:#fff;border-radius:24px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px;max-width:320px;width:100%}
.qr-modal-name{font-size:18px;font-weight:700;color:#0a0a0f;text-align:center}
.qr-modal-meta{font-size:13px;color:#555;text-align:center;line-height:1.5}
.qr-modal-code{font-size:11px;color:#888;font-family:'Space Mono',monospace;letter-spacing:1px}
.qr-modal-btns{display:flex;gap:10px;width:100%}
.qr-inline{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid rgba(255,255,255,0.08);margin-top:10px;transition:.2s}
.qr-inline:hover{background:rgba(255,255,255,0.08)}
.qr-inline-hint{font-size:10px;color:var(--text2)}
/* Photo picker */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.photo-thumb{aspect-ratio:1;border-radius:10px;object-fit:cover;width:100%;display:block;background:var(--card2)}
.photo-thumb-wrap{position:relative}
.photo-remove{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(0,0,0,0.7);border:none;border-radius:50%;color:white;cursor:pointer;font-size:14px;line-height:20px;text-align:center;padding:0}
.photo-add{aspect-ratio:1;border-radius:10px;border:2px dashed var(--border);background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text2);font-size:11px;font-family:inherit;transition:.2s}
.photo-add:hover{border-color:var(--accent);color:var(--accent)}
.photo-add svg{width:24px;height:24px}
/* Voice assistant */
.voice-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(16px);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.voice-orb{width:96px;height:96px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;position:relative}
.voice-orb svg{width:40px;height:40px;color:#0a0a0f}
.voice-orb.listening{animation:orbPulse 1.2s ease-in-out infinite}
.voice-orb.thinking{background:linear-gradient(135deg,#6c5ce7,#a29bfe);animation:orbSpin 1s linear infinite}
@keyframes orbPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.4)}50%{box-shadow:0 0 0 20px rgba(255,255,255,0)}}
@keyframes orbSpin{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
.voice-status{font-size:18px;font-weight:600;color:white;text-align:center}
.voice-transcript{font-size:14px;color:rgba(255,255,255,0.6);text-align:center;max-width:280px;min-height:40px;font-style:italic}
.voice-response{font-size:15px;color:rgba(255,255,255,0.9);text-align:center;max-width:300px;background:rgba(255,255,255,0.08);padding:12px 20px;border-radius:16px;border:1px solid rgba(255,255,255,0.12)}
.voice-cancel{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:10px 28px;border-radius:30px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:8px}
.nav-center.active-voice{background:linear-gradient(135deg,#6c5ce7,#a29bfe);box-shadow:0 4px 20px rgba(108,92,231,0.5)}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center}
.login h1{font-size:32px;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login p{color:var(--text2);margin-bottom:32px}
.login .form{width:100%;max-width:320px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:24px 20px}
.modal h2{font-size:18px;margin-bottom:16px}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.tab-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mt-2{margin-top:8px}.mt-4{margin-top:16px}.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}
.qr-box{background:white;color:black;padding:20px;border-radius:12px;text-align:center;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;word-break:break-all}
/* Home screen tiles */
.home-header{padding:20px 20px 8px;display:flex;align-items:flex-start;justify-content:space-between}
.home-greeting{font-size:14px;color:var(--text2);font-weight:400}
.home-name{font-size:26px;font-weight:700;color:white;margin:2px 0 4px;letter-spacing:-0.5px}
.home-loc{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer}
.home-loc svg{width:12px;height:12px}
.home-topright{display:flex;align-items:center;gap:10px}
.weather-pill{background:rgba(255,255,255,0.08);border-radius:30px;padding:6px 12px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.notif-btn{position:relative;width:36px;height:36px;background:rgba(255,255,255,0.08);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:#e17055;border-radius:50%;border:1.5px solid var(--bg)}
.avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;cursor:pointer}
.tiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px}
.tile{border-radius:20px;overflow:hidden;position:relative;cursor:pointer;transition:transform .2s,box-shadow .2s;aspect-ratio:1}
.tile:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.4)}
.tile-tall{aspect-ratio:auto;grid-row:span 1}
.tile svg.illustration{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:16px 16px 48px}
.tile-label{position:absolute;bottom:14px;left:16px;font-size:16px;font-weight:600;color:white;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
.tile-pending{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);border-radius:20px;padding:3px 8px;font-size:10px;font-weight:700;color:white}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;
const API = '';

function api(path, opts={}) {
  const token = localStorage.getItem('gk_token');
  const headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = `Bearer ${token}`;
  return fetch(API+path, {...opts, headers}).then(r=>r.json());
}

// Icons as simple SVG
const Icons = {
  home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>,
  user: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  shield: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  shop: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>,
  plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
};

function VoiceAssistant({onNavigate, onClose}) {
  const [status, setStatus] = useState('listening'); // listening | thinking | done | error
  const [transcript, setTranscript] = useState('');
  const [response, setResponse] = useState('');
  const recognitionRef = React.useRef(null);

  const PAGES = {
    home: ['home','main','dashboard','start'],
    bookings: ['book','booking','space','amenity','gym','pool','room','hall','reserve','clubhouse'],
    visitors: ['visitor','gate','invite','guest','delivery','move','entry'],
    marketplace: ['market','buy','sell','post','listing','shop'],
    profile: ['profile','account','my details','vehicles','pets','family','documents'],
    news: ['news','notice','announcement','updates','society news'],
    locks: ['lock','unlock','door','smart lock'],
  };

  const processWithClaude = async (text) => {
    setStatus('thinking');
    setResponse('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 200,
          system: `You are a voice assistant for PA Lite, a residential community app. Extract navigation intent AND any form prefill data from the user's speech.

Pages: home, bookings (space/amenity booking), visitors (gate pass, visitor invites, move requests), marketplace (buy/sell posts), profile (account, vehicles, pets, family), news (society announcements), locks (smart lock control).

Respond ONLY with JSON, no other text. Format:
{"action":"navigate","page":"bookings","message":"Booking the gym for you!","prefill":{"spaceSearch":"gym","date":"2026-03-11","startTime":"06:00","endTime":"07:00"}}

Prefill fields by page:
- bookings: spaceSearch (space name/type), date (YYYY-MM-DD), startTime (HH:MM 24hr), endTime (HH:MM 24hr)
- visitors: visitorName, visitorPhone, visitorType (guest/cab/delivery/daily_help), purpose
- marketplace: postType (buy/sell), title, description, price

For date/time: today is new Date().toISOString().split('T')[0], resolve relative dates like 'tomorrow', 'next monday', 'at 6pm' into exact values.
If unclear: {"action":"unclear","message":"Try: book the gym tomorrow at 6pm"}
Keep message under 10 words. Only include prefill fields the user actually mentioned.`,
          messages: [{role:'user', content: text}]
        })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || '{}';
      const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
      setResponse(parsed.message || 'Done!');
      setStatus('done');
      if(parsed.action === 'navigate' && parsed.page) {
        setTimeout(()=>{ onNavigate(parsed.page, parsed.prefill||{}); onClose(); }, 1200);
      } else {
        setTimeout(onClose, 3000);
      }
    } catch(e) {
      // Fallback: simple keyword match
      const lower = text.toLowerCase();
      let matched = null;
      for(const [page, keywords] of Object.entries(PAGES)) {
        if(keywords.some(k => lower.includes(k))) { matched = page; break; }
      }
      if(matched) {
        setResponse(`Taking you to ${matched}!`);
        setStatus('done');
        setTimeout(()=>{ onNavigate(matched); onClose(); }, 1000);
      } else {
        setStatus('error');
        setResponse("Sorry, I didn't understand. Try again.");
        setTimeout(onClose, 2500);
      }
    }
  };

  useEffect(()=>{
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition) {
      setStatus('error');
      setResponse('Voice not supported on this browser. Try Chrome.');
      setTimeout(onClose, 3000);
      return;
    }
    const rec = new SpeechRecognition();
    rec.lang = 'en-IN';
    rec.continuous = false;
    rec.interimResults = true;
    rec.maxAlternatives = 1;
    recognitionRef.current = rec;

    rec.onresult = (e) => {
      const interim = Array.from(e.results).map(r=>r[0].transcript).join('');
      setTranscript(interim);
      if(e.results[e.results.length-1].isFinal) {
        rec.stop();
        processWithClaude(interim);
      }
    };
    rec.onerror = (e) => {
      if(e.error === 'no-speech') { setStatus('error'); setResponse('No speech detected. Tap to try again.'); setTimeout(onClose,2000); }
      else { setStatus('error'); setResponse('Microphone error. Please try again.'); setTimeout(onClose,2000); }
    };
    rec.onend = () => { if(status === 'listening') setStatus('thinking'); };
    rec.start();

    return ()=>{ try{ rec.stop(); }catch(e){} };
  }, []);

  const orbClass = `voice-orb ${status==='listening'?'listening':status==='thinking'?'thinking':''}`;

  return <div className="voice-overlay" onClick={e=>e.stopPropagation()}>
    <div className={orbClass}>
      {status==='listening' && <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>}
      {status==='thinking' && <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>}
      {(status==='done'||status==='error') && <svg viewBox="0 0 24 24" fill="none" stroke={status==='done'?'#0a0a0f':'#e17055'} strokeWidth="2.5">{status==='done'?<polyline points="20 6 9 17 4 12"/>:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}</svg>}
    </div>
    <div className="voice-status">
      {status==='listening' && 'Listening...'}
      {status==='thinking' && 'Got it, one sec...'}
      {status==='done' && 'On it!'}
      {status==='error' && 'Oops!'}
    </div>
    {transcript && <div className="voice-transcript">"{transcript}"</div>}
    {response && <div className="voice-response">{response}</div>}
    <button className="voice-cancel" onClick={onClose}>Cancel</button>
  </div>;
}

function App() {
  const [token, setToken] = useState(localStorage.getItem('gk_token'));
  const [user, setUser] = useState(null);
  const [ctx, setCtx] = useState(null);
  const [page, setPage] = useState('home');
  const [loading, setLoading] = useState(true);
  const [voiceOpen, setVoiceOpen] = useState(false);
  const [voiceAction, setVoiceAction] = useState(null); // {page, prefill:{}} from voice

  const loadMe = useCallback(()=>{
    if(!token) {setLoading(false); return;}
    api('/api/auth/me').then(d=>{
      if(d.error) {localStorage.removeItem('gk_token');setToken(null);}
      else {setUser(d.user);setCtx(d);}
      setLoading(false);
    }).catch(()=>{setLoading(false);});
  },[token]);

  useEffect(()=>{loadMe();},[loadMe]);

  const handleLogin = (t,u)=>{localStorage.setItem('gk_token',t);setToken(t);setUser(u);setLoading(true);setTimeout(loadMe,100);};
  const handleLogout = ()=>{localStorage.removeItem('gk_token');setToken(null);setUser(null);setCtx(null);setPage('home');};
  const switchApt = (aptId)=>{api('/api/context/switch',{method:'POST',body:JSON.stringify({apartmentId:aptId})}).then(()=>loadMe());};

  if(loading) return <div className="login"><h1>PA Lite</h1><p>Loading...</p></div>;
  if(!token) return <LoginPage onLogin={handleLogin}/>;

  const pages = {home:<HomePage ctx={ctx} setPage={setPage}/>,profile:<ProfilePage ctx={ctx} user={user} onLogout={handleLogout} switchApt={switchApt} reload={loadMe} setPage={setPage}/>,bookings:<BookingsPage setPage={setPage} prefill={voiceAction?.page==='bookings'?voiceAction.prefill:null}/>,visitors:<VisitorsPage ctx={ctx} setPage={setPage} prefill={voiceAction?.page==='visitors'?voiceAction.prefill:null}/>,marketplace:<MarketplacePage setPage={setPage} prefill={voiceAction?.page==='marketplace'?voiceAction.prefill:null}/>,locks:<LocksPage setPage={setPage}/>,news:<NewsPage setPage={setPage}/>};

  return <div className="app">
    {voiceOpen && <VoiceAssistant
      onNavigate={(page, prefill)=>{setPage(page); setVoiceAction({page, prefill: prefill||{}}); setTimeout(()=>setVoiceAction(null), 5000);}}
      onClose={()=>setVoiceOpen(false)}/>}
    {pages[page] || pages.home}
    <div className="nav">
      <div className="nav-inner">
        <div className="nav-pill">
          <button className={`nav-btn ${page==='locks'?'active':''}`} onClick={()=>setPage('locks')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            Lock
          </button>
          <button className={`nav-center ${voiceOpen?'active-voice':''}`} onClick={()=>setVoiceOpen(true)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>

    </div>
  </div>;
}

function LoginPage({onLogin}) {
  const [phone, setPhone] = useState('');
  const [otp, setOtp] = useState('');
  const [sid, setSid] = useState('');
  const [step, setStep] = useState('phone');
  const [err, setErr] = useState('');

  const sendOtp = ()=>{
    api('/api/auth/request-otp',{method:'POST',body:JSON.stringify({phone})})
    .then(d=>{if(d.success){setSid(d.sessionId);setStep('otp');}else setErr(d.error);});
  };
  const verify = ()=>{
    api('/api/auth/verify-otp',{method:'POST',body:JSON.stringify({sessionId:sid,otp})})
    .then(d=>{if(d.token){onLogin(d.token,d.user);}else setErr(d.error);});
  };

  return <div className="login">
    <h1>PA Lite</h1>
    <p>Smart Community Living</p>
    <div className="form">
      {step==='phone' ? <>
        <div className="form-group"><label className="label">Phone Number</label>
        <input className="input" placeholder="Enter phone number" value={phone} onChange={e=>setPhone(e.target.value)}/></div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={sendOtp}>Send OTP</button>
        <p style={{marginTop:12,fontSize:12,color:'var(--text2)'}}>Demo: 9876543210 (Resident) | 9999900001 (Admin) | 9999900002 (Guard)</p>
      </> : <>
        <div className="form-group"><label className="label">Enter OTP</label>
        <input className="input" placeholder="Enter 6-digit OTP" value={otp} onChange={e=>setOtp(e.target.value)}/></div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={verify}>Verify</button>
        <p style={{marginTop:12,fontSize:12,color:'var(--text2)'}}>Demo OTP: 123456</p>
      </>}
      {err && <p style={{color:'var(--red)',marginTop:12,fontSize:13}}>{err}</p>}
    </div>
  </div>;
}

  const [booking, setBooking] = useState(null);
  const [spaceFilter, setSpaceFilter] = useState('');

  // Apply voice prefill when it arrives
  useEffect(()=>{
    if(!prefill) return;
    if(prefill.spaceSearch) setSpaceFilter(prefill.spaceSearch.toLowerCase());
    if(prefill.date||prefill.startTime||prefill.endTime||prefill.spaceSearch) {
      setTab('book');
      setBooking(b=>({...(b||{}),
        date: prefill.date||b?.date||'',
        startTime: prefill.startTime||b?.startTime||'',
        endTime: prefill.endTime||b?.endTime||'',
      }));
    }
  },[prefill]);

  useEffect(()=>{
    api('/api/spaces').then(setSpaces);
    api('/api/bookings/my').then(setBookings);
  },[]);

  const book = ()=>{
    if(!booking?.spaceId||!booking?.date||!booking?.startTime||!booking?.endTime) return alert('Fill all fields');
    api('/api/bookings',{method:'POST',body:JSON.stringify(booking)}).then(d=>{
      if(d.error) return alert(d.error);
      if(confirm(`Total: Rs. ${d.totalCost}. Pay now?`)){
        api(`/api/bookings/${d.bookingId}/pay`,{method:'POST'}).then(p=>{
          alert(`Paid! TXN: ${p.transactionId}`);
          api('/api/bookings/my').then(setBookings);
          setBooking(null);setTab('my');
        });
      }
    });
  };

  return <div>
    <PageHeader title="Bookings" onBack={()=>setPage('home')}/>
    <div className="tab-bar"><button className={`tab ${tab==='spaces'?'active':''}`} onClick={()=>setTab('spaces')}>Spaces</button><button className={`tab ${tab==='my'?'active':''}`} onClick={()=>setTab('my')}>My Bookings</button><button className={`tab ${tab==='book'?'active':''}`} onClick={()=>setTab('book')}>Book Now</button></div>

    {tab==='spaces' && <>
      <input className="input mb-4" placeholder="Search spaces..." value={spaceFilter} onChange={e=>setSpaceFilter(e.target.value.toLowerCase())} style={{marginBottom:12}}/>
      {spaces.filter(s=>!spaceFilter||s.name.toLowerCase().includes(spaceFilter)||s.space_type?.toLowerCase().includes(spaceFilter)).map(s=><div key={s.id} className="card" onClick={()=>{setBooking({spaceId:s.id,date:prefill?.date||'',startTime:prefill?.startTime||'',endTime:prefill?.endTime||'',spotNumber:1});setTab('book');}}>
      <div className="flex-between"><div><div className="card-title">{s.name}</div><div className="card-sub">{s.description}</div></div><div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:700,color:'var(--accent2)',fontFamily:'Space Mono'}}>Rs.{s.cost_per_hour}/hr</div>
      {s.is_shared?<div className="card-sub">{s.total_spots} spots</div>:null}</div></div>
      <div className="mt-2 card-sub">{s.available_from} - {s.available_to} &bull; Cap: {s.capacity}</div>
    </div>)}
    </>

    {tab==='my' && <>
      {bookings.map(b=><div key={b.id} className="card">
        <div className="flex-between"><div><div className="card-title">{b.space_name}</div><div className="card-sub">{b.booking_date} {b.start_time}-{b.end_time}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontWeight:700,fontFamily:'Space Mono'}}>Rs.{b.total_cost}</div><span className={`badge badge-${b.status==='confirmed'?'green':b.status==='pending'?'orange':'red'}`}>{b.status}</span>
        {b.invoice_status==='unpaid'&&<button className="btn btn-sm btn-primary mt-2" onClick={()=>{api(`/api/bookings/${b.id}/pay`,{method:'POST'}).then(()=>api('/api/bookings/my').then(setBookings));}}>Pay</button>}</div></div>
      </div>)}
      {!bookings.length && <div className="empty">No bookings yet</div>}
    </>}

    {tab==='book' && <div>
      <div className="form-group"><label className="label">Space</label>
      <select className="input" value={booking?.spaceId||''} onChange={e=>setBooking(b=>({...b,spaceId:e.target.value}))}>
        <option value="">Select space</option>{spaces.map(s=><option key={s.id} value={s.id}>{s.name} - Rs.{s.cost_per_hour}/hr</option>)}</select></div>
      <div className="form-group"><label className="label">Date</label><input type="date" className="input" value={booking?.date||''} onChange={e=>setBooking(b=>({...b,date:e.target.value}))}/></div>
      <div className="grid-2">
        <div className="form-group"><label className="label">Start</label><input type="time" className="input" value={booking?.startTime||''} onChange={e=>setBooking(b=>({...b,startTime:e.target.value}))}/></div>
        <div className="form-group"><label className="label">End</label><input type="time" className="input" value={booking?.endTime||''} onChange={e=>setBooking(b=>({...b,endTime:e.target.value}))}/></div>
      </div>
      <button className="btn btn-primary" style={{width:'100%'}} onClick={book}>Book & Pay</button>
    </div>}
  </div>;
}

function VisitorsPage({ctx,setPage,prefill}) {
  const [invites, setInvites] = useState([]);
  const [tab, setTab] = useState('my');
  const [modal, setModal] = useState(false);
  const [moves, setMoves] = useState([]);
  const [invitePrefill, setInvitePrefill] = useState({});
  const [qrInvite, setQrInvite] = useState(null); // invite object to show QR for

  useEffect(()=>{
    if(!prefill) return;
    const fields = {};
    if(prefill.visitorName) fields.visitorName = prefill.visitorName;
    if(prefill.visitorPhone) fields.visitorPhone = prefill.visitorPhone;
    if(prefill.visitorType) fields.visitorType = prefill.visitorType;
    if(prefill.purpose) fields.purpose = prefill.purpose;
    if(Object.keys(fields).length > 0) {
      setInvitePrefill(fields);
      setModal('invite');
    }
  },[prefill]);

  useEffect(()=>{
    api('/api/visitors/my-invitations').then(setInvites);
    api('/api/move-requests/my').then(setMoves);
  },[]);

  const createInvite = d=>{api('/api/visitors/invite',{method:'POST',body:JSON.stringify(d)}).then(r=>{
    api('/api/visitors/my-invitations').then(freshInvites=>{
      setInvites(freshInvites);
      // Auto-open QR for the newly created invite
      if(r.id) { const created = freshInvites.find(i=>i.id===r.id); if(created) setQrInvite(created); }
    });
    setModal(false);
  });};

  const createMove = d=>{api('/api/move-requests',{method:'POST',body:JSON.stringify(d)}).then(()=>{api('/api/move-requests/my').then(setMoves);setModal(false);});};

  return <div>
    <PageHeader title="Visitors & Moves" onBack={()=>setPage('home')}/>
    <div className="tab-bar"><button className={`tab ${tab==='my'?'active':''}`} onClick={()=>setTab('my')}>Invitations</button><button className={`tab ${tab==='moves'?'active':''}`} onClick={()=>setTab('moves')}>Move Requests</button></div>

    {tab==='my' && <>
      <button className="btn btn-primary mb-4" style={{width:'100%'}} onClick={()=>setModal('invite')}>+ Create Invitation</button>
      {invites.map(i=><div key={i.id} className="card">
        <div className="flex-between"><div><div className="card-title">{i.visitor_name}</div><div className="card-sub">{i.visitor_type} &bull; {i.visitor_phone||''}</div></div>
        <span className={`badge badge-${i.status==='active'?'green':i.status==='used'?'purple':'red'}`}>{i.status}</span></div>
        {i.status==='active' && <div className="qr-inline mt-2" onClick={()=>setQrInvite(i)}>
          <QRCanvas code={i.qr_code} size={80}/>
          <span className="qr-inline-hint">Tap to share gate pass</span>
        </div>}
      </div>)}
      {!invites.length && <div className="empty">No invitations</div>}
    </>}

    {tab==='moves' && <>
      <button className="btn btn-primary mb-4" style={{width:'100%'}} onClick={()=>setModal('move')}>+ Request Move In/Out</button>
      {moves.map(m=><div key={m.id} className="card"><div className="flex-between"><div><div className="card-title">{m.move_type==='move_in'?'Move In':'Move Out'}</div><div className="card-sub">{m.tentative_start} to {m.tentative_end}</div></div><span className={`badge badge-${m.status==='approved'?'green':m.status==='pending'?'orange':'red'}`}>{m.status}</span></div></div>)}
      {!moves.length && <div className="empty">No move requests</div>}
    </>}

    {qrInvite && <InviteQRModal invite={qrInvite} onClose={()=>setQrInvite(null)}/>}
    {modal==='invite' && <FormModal title="Create Invitation" onClose={()=>setModal(false)} onSubmit={createInvite} initialData={invitePrefill}
      fields={[{key:'visitorName',label:'Visitor Name'},{key:'visitorPhone',label:'Phone'},{key:'visitorType',label:'Type',type:'select',options:['guest','cab','delivery','daily_help','other']},{key:'purpose',label:'Purpose'},{key:'validFrom',label:'Valid From',type:'datetime-local'},{key:'validTo',label:'Valid To',type:'datetime-local'}]}/>}
    {modal==='move' && <FormModal title="Move Request" onClose={()=>setModal(false)} onSubmit={createMove}
      fields={[{key:'moveType',label:'Type',type:'select',options:['move_in','move_out']},{key:'tentativeStart',label:'Start Date',type:'date'},{key:'tentativeEnd',label:'End Date',type:'date'},{key:'notes',label:'Notes'}]}/>}
  </div>;
}

function MarketplacePage({setPage, prefill}) {
  const [posts, setPosts] = useState([]);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({postType:'sell',title:'',description:'',price:''});
  const [photos, setPhotos] = useState([]); // array of base64 strings
  const [lightbox, setLightbox] = useState(null); // {images, index}
  const fileInputRef = React.useRef(null);

  useEffect(()=>{ api('/api/marketplace').then(setPosts); },[]);

  useEffect(()=>{
    if(!prefill) return;
    const updates = {};
    if(prefill.postType) updates.postType = prefill.postType;
    if(prefill.title) updates.title = prefill.title;
    if(prefill.description) updates.description = prefill.description;
    if(prefill.price) updates.price = prefill.price;
    if(Object.keys(updates).length > 0) { setForm(f=>({...f,...updates})); setModal(true); }
  },[prefill]);

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  const addPhotos = (e) => {
    const files = Array.from(e.target.files);
    if(photos.length + files.length > 6) return alert('Maximum 6 photos per listing');
    files.forEach(file=>{
      const reader = new FileReader();
      reader.onload = ev => setPhotos(p=>[...p, ev.target.result]);
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  };

  const removePhoto = (i) => setPhotos(p=>p.filter((_,idx)=>idx!==i));

  const create = () => {
    if(!form.title) return alert('Title required');
    api('/api/marketplace',{method:'POST',body:JSON.stringify({...form,price:parseFloat(form.price)||0,images:photos})})
      .then(()=>{ api('/api/marketplace').then(setPosts); setModal(false); setForm({postType:'sell',title:'',description:'',price:''}); setPhotos([]); });
  };

  useEffect(()=>{api('/api/marketplace').then(setPosts);},[]);

  const create = d=>{api('/api/marketplace',{method:'POST',body:JSON.stringify(d)}).then(()=>{api('/api/marketplace').then(setPosts);setModal(false);});};

  return <div>
    <PageHeader title="Marketplace" onBack={()=>setPage('home')}/>
    <div className="page">

    {/* Post list */}
    <button className="btn btn-primary mb-4" style={{width:'100%'}} onClick={()=>setModal(true)}>+ New Listing</button>
    {posts.map(p=><div key={p.id} className="card">
      {p.images&&p.images.length>0&&<div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(p.images.length,3)},1fr)`,gap:4,borderRadius:10,overflow:'hidden',marginBottom:10}}>
        {p.images.slice(0,3).map((img,i)=><div key={i} style={{position:'relative',cursor:'pointer'}} onClick={()=>setLightbox({images:p.images,index:i})}>
          <img src={img} style={{width:'100%',aspectRatio:'1',objectFit:'cover',display:'block'}}/>
          {i===2&&p.images.length>3&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.55)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:18}}>+{p.images.length-3}</div>}
        </div>)}
      </div>}
      <div className="flex-between">
        <div style={{flex:1}}>
          <div className="card-title">{p.title}</div>
          <div className="card-sub">{p.description}</div>
          <div className="card-sub mt-2">by {p.posted_by}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0,marginLeft:12}}>
          <div style={{fontSize:16,fontWeight:700,color:'var(--green)',fontFamily:'Space Mono'}}>Rs.{p.price}</div>
          <span className={`badge badge-${p.post_type==='sell'?'purple':'orange'}`}>{p.post_type}</span>
        </div>
      </div>
    </div>)}
    {!posts.length && <div className="empty">No posts in your society</div>}

    {/* Lightbox */}
    {lightbox && <div className="modal-overlay" onClick={()=>setLightbox(null)} style={{alignItems:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:480,padding:'0 20px'}}>
        <img src={lightbox.images[lightbox.index]} style={{width:'100%',borderRadius:16,maxHeight:'70vh',objectFit:'contain'}}/>
        <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:12}}>
          {lightbox.images.map((_,i)=><div key={i} onClick={()=>setLightbox(l=>({...l,index:i}))} style={{width:8,height:8,borderRadius:'50%',background:i===lightbox.index?'white':'rgba(255,255,255,0.3)',cursor:'pointer'}}/>)}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:12}}>
          <button onClick={()=>setLightbox(l=>({...l,index:Math.max(0,l.index-1)}))} disabled={lightbox.index===0} className="btn" style={{background:'rgba(255,255,255,0.1)',color:'white',flex:1,marginRight:8}}>← Prev</button>
          <button onClick={()=>setLightbox(l=>({...l,index:Math.min(l.images.length-1,l.index+1)}))} disabled={lightbox.index===lightbox.images.length-1} className="btn" style={{background:'rgba(255,255,255,0.1)',color:'white',flex:1}}>Next →</button>
        </div>
        <button onClick={()=>setLightbox(null)} className="btn" style={{width:'100%',marginTop:8,background:'rgba(255,255,255,0.08)',color:'white'}}>Close</button>
      </div>
    </div>}

    {/* Create post modal */}
    {modal && <div className="modal-overlay" onClick={()=>setModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>New Listing</h2>

        {/* Photos */}
        <div className="form-group">
          <label className="label">Photos <span style={{color:'var(--text2)'}}>(up to 6)</span></label>
          <div className="photo-grid">
            {photos.map((src,i)=><div key={i} className="photo-thumb-wrap">
              <img src={src} className="photo-thumb"/>
              <button className="photo-remove" onClick={()=>removePhoto(i)}>×</button>
            </div>)}
            {photos.length<6&&<button className="photo-add" onClick={()=>fileInputRef.current.click()}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Add photo
            </button>}
          </div>
          <input ref={fileInputRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={addPhotos}/>
        </div>

        <div className="form-group"><label className="label">Type</label>
          <select className="input" value={form.postType} onChange={e=>setF('postType',e.target.value)}>
            <option value="sell">Sell</option><option value="buy">Buy</option>
          </select></div>
        <div className="form-group"><label className="label">Title *</label>
          <input className="input" value={form.title} onChange={e=>setF('title',e.target.value)} placeholder="e.g. Sofa for sale"/></div>
        <div className="form-group"><label className="label">Description</label>
          <textarea className="input" value={form.description} onChange={e=>setF('description',e.target.value)} placeholder="Condition, details..." rows={3} style={{resize:'none'}}/></div>
        <div className="form-group"><label className="label">Price (Rs.)</label>
          <input className="input" type="number" value={form.price} onChange={e=>setF('price',e.target.value)} placeholder="0"/></div>

        <div className="flex" style={{gap:10,marginTop:16}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={create}>Post Listing</button>
          <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setModal(false)}>Cancel</button>
        </div>
      </div>
    </div>}

    </div>
  </div>;
}

function QRCanvas({code, size=80}) {
  const ref = React.useRef(null);
  useEffect(()=>{
    if(!ref.current || !window.QRCode) return;
    ref.current.innerHTML = '';
    new QRCode(ref.current, {
      text: code, width: size, height: size,
      colorDark:'#000', colorLight:'#fff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  },[code, size]);
  return <div ref={ref} style={{borderRadius:6,overflow:'hidden',lineHeight:0}}/>;
}

function InviteQRModal({invite, onClose}) {
  const canvasRef = React.useRef(null);

  useEffect(()=>{
    if(!canvasRef.current) return;
    canvasRef.current.innerHTML = '';
    new QRCode(canvasRef.current, {
      text: invite.qr_code,
      width: 220, height: 220,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H,
    });
  }, [invite.qr_code]);

  const download = () => {
    const img = canvasRef.current?.querySelector('img') || canvasRef.current?.querySelector('canvas');
    if(!img) return;
    const src = img.tagName === 'CANVAS' ? img.toDataURL() : img.src;
    const a = document.createElement('a');
    a.href = src; a.download = `GatePass-${invite.visitor_name.replace(/\s+/g,'-')}.png`;
    a.click();
  };

  const share = async () => {
    const img = canvasRef.current?.querySelector('img') || canvasRef.current?.querySelector('canvas');
    if(!img) return;
    const src = img.tagName === 'CANVAS' ? img.toDataURL() : img.src;
    if(navigator.share) {
      const blob = await (await fetch(src)).blob();
      const file = new File([blob], `GatePass-${invite.visitor_name}.png`, {type:'image/png'});
      navigator.share({title:`Gate Pass – ${invite.visitor_name}`, text:`QR Code: ${invite.qr_code}`, files:[file]}).catch(()=>{});
    } else {
      await navigator.clipboard.writeText(invite.qr_code);
      alert('QR code copied to clipboard: ' + invite.qr_code);
    }
  };

  const validRange = invite.valid_from || invite.valid_to
    ? `${invite.valid_from ? new Date(invite.valid_from).toLocaleString() : ''}${invite.valid_from && invite.valid_to ? ' → ' : ''}${invite.valid_to ? new Date(invite.valid_to).toLocaleString() : ''}`
    : null;

  return <div className="qr-modal-overlay" onClick={onClose}>
    <div className="qr-modal-card" onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:28}}>🎫</div>
      <div className="qr-modal-name">{invite.visitor_name}</div>
      <div className="qr-modal-meta">
        {invite.visitor_type}{invite.purpose ? ` · ${invite.purpose}` : ''}
        {validRange && <><br/>{validRange}</>}
      </div>
      <div ref={canvasRef}/>
      <div className="qr-modal-code">{invite.qr_code}</div>
      <div className="qr-modal-btns">
        <button className="btn btn-secondary" style={{flex:1,fontSize:13}} onClick={share}>
          {navigator.share ? '📤 Share' : '📋 Copy Code'}
        </button>
        <button className="btn btn-primary" style={{flex:1,fontSize:13}} onClick={download}>⬇ Save</button>
      </div>
      <button className="btn btn-secondary" style={{width:'100%',fontSize:13}} onClick={onClose}>Close</button>
    </div>
  </div>;
}

function FormModal({title, onClose, onSubmit, fields, initialData}) {
  const [data, setData] = useState(initialData||{});
  const set = (k,v)=>setData(d=>({...d,[k]:v}));
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>{title}</h2>
      {initialData&&Object.keys(initialData).length>0&&<div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12,fontSize:12,color:'var(--accent2)'}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
        Voice filled {Object.keys(initialData).length} field{Object.keys(initialData).length>1?'s':''}
      </div>}
      {fields.map(f=><div key={f.key} className="form-group">
        <label className="label">{f.label}</label>
        {f.type==='select' ? <select className="input" value={data[f.key]||''} onChange={e=>set(f.key,e.target.value)} style={initialData?.[f.key]?{borderColor:'var(--accent)',background:'rgba(108,92,231,0.08)'}:{}}><option value="">Select</option>{f.options.map(o=><option key={o} value={o}>{o}</option>)}</select>
        : <input className="input" type={f.type||'text'} value={data[f.key]||''} onChange={e=>set(f.key,e.target.value)} placeholder={f.label} style={initialData?.[f.key]?{borderColor:'var(--accent)',background:'rgba(108,92,231,0.08)'}:{}}/>}
      </div>)}
      <div className="flex" style={{gap:10,marginTop:16}}>
        <button className="btn btn-primary" style={{flex:1}} onClick={()=>onSubmit(data)}>Submit</button>
        <button className="btn btn-secondary" style={{flex:1}} onClick={onClose}>Cancel</button>
      </div>
    </div>
  </div>;
}
