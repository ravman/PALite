<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA Lite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#14141f;--card2:#1a1a2e;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#e17055;--orange:#fdcb6e;--text:#e8e8f0;--text2:#8888a0;--border:#2a2a3e;--radius:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#14141f,#1a1a2e);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .ctx{font-size:11px;color:var(--text2);text-align:right;cursor:pointer}
.header .ctx span{color:var(--accent2);font-weight:600}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;pointer-events:none}
.nav-inner{display:flex;align-items:flex-end;justify-content:space-between;padding:0 32px 16px;pointer-events:all}
.nav-pill{background:rgba(20,20,31,0.96);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:50px;display:flex;align-items:center;justify-content:space-between;padding:10px 28px;gap:32px}
.nav-btn{background:none;border:none;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-family:inherit;font-weight:500;transition:.2s;padding:4px 8px;border-radius:20px}
.nav-btn.active{color:white}
.nav-btn svg{width:22px;height:22px}
.nav-center{width:52px;height:52px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(255,255,255,0.2);border:none;transition:.2s;flex-shrink:0}
.nav-center:hover{transform:scale(1.05)}
.nav-center svg{width:22px;height:22px;color:#0a0a0f}
.page{padding:16px 20px}
.page-title{font-size:22px;font-weight:700;margin-bottom:16px}
.page-header{display:flex;align-items:center;gap:8px;padding:16px 20px 4px}
.back-btn{background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;color:var(--text2);transition:.2s;flex-shrink:0}
.back-btn:hover{color:white}
.back-btn svg{width:20px;height:20px}
.page-header-title{font-size:22px;font-weight:700;color:white}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:.2s}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card-title{font-size:14px;font-weight:600;margin-bottom:8px}
.card-sub{font-size:12px;color:var(--text2)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,184,148,.15);color:var(--green)}
.badge-red{background:rgba(225,112,85,.15);color:var(--red)}
.badge-orange{background:rgba(253,203,110,.15);color:var(--orange)}
.badge-purple{background:rgba(108,92,231,.15);color:var(--accent)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--card2);border-radius:var(--radius);padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:700;font-family:'Space Mono',monospace}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px}
.btn{padding:10px 20px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:11px}
.btn-green{background:var(--green);color:white}
.btn-red{background:var(--red);color:white}
.input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--card2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:.2s}
.input:focus{border-color:var(--accent)}
.label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.form-group{margin-bottom:14px}
select.input{appearance:none;cursor:pointer}
/* Space booking grid */
.space-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px 20px}
.space-card{border-radius:18px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:1;background:#1a1a2e;transition:transform .18s,box-shadow .18s}
.space-card:active{transform:scale(.96)}
.space-card-img{width:100%;height:100%;object-fit:cover;display:block}
.space-card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#1e1e30,#2a2a42)}
.space-card-footer{position:absolute;bottom:0;left:0;right:0;padding:10px 12px 12px;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,0) 100%)}
.space-card-name{font-size:14px;font-weight:700;color:white;line-height:1.2;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.space-card-price{font-size:11px;color:rgba(255,255,255,.75);font-family:'Space Mono',monospace;margin-top:2px}
.space-search-wrap{padding:16px 20px 4px;position:relative}
.space-search-wrap svg{position:absolute;left:32px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text2);pointer-events:none}
.space-search-wrap input{padding-left:38px}
.voice-hint{padding:16px 20px 8px;font-size:12px;color:var(--text2);line-height:1.6}
/* QR Code */
.qr-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);backdrop-filter:blur(12px);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.qr-modal-card{background:#fff;border-radius:24px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px;max-width:320px;width:100%}
.qr-modal-name{font-size:18px;font-weight:700;color:#0a0a0f;text-align:center}
.qr-modal-meta{font-size:13px;color:#555;text-align:center;line-height:1.5}
.qr-modal-code{font-size:11px;color:#888;font-family:'Space Mono',monospace;letter-spacing:1px}
.qr-modal-btns{display:flex;gap:10px;width:100%}
.qr-inline{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid rgba(255,255,255,0.08);margin-top:10px;transition:.2s}
.qr-inline:hover{background:rgba(255,255,255,0.08)}
.qr-inline-hint{font-size:10px;color:var(--text2)}
/* Photo picker */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.photo-thumb{aspect-ratio:1;border-radius:10px;object-fit:cover;width:100%;display:block;background:var(--card2)}
.photo-thumb-wrap{position:relative}
.photo-remove{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(0,0,0,0.7);border:none;border-radius:50%;color:white;cursor:pointer;font-size:14px;line-height:20px;text-align:center;padding:0}
.photo-add{aspect-ratio:1;border-radius:10px;border:2px dashed var(--border);background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text2);font-size:11px;font-family:inherit;transition:.2s}
.photo-add:hover{border-color:var(--accent);color:var(--accent)}
.photo-add svg{width:24px;height:24px}
/* Voice assistant */
.voice-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(16px);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.voice-orb{width:96px;height:96px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;position:relative}
.voice-orb svg{width:40px;height:40px;color:#0a0a0f}
.voice-orb.listening{animation:orbPulse 1.2s ease-in-out infinite}
.voice-orb.thinking{background:linear-gradient(135deg,#6c5ce7,#a29bfe);animation:orbSpin 1s linear infinite}
@keyframes orbPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.4)}50%{box-shadow:0 0 0 20px rgba(255,255,255,0)}}
@keyframes orbSpin{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
.voice-status{font-size:18px;font-weight:600;color:white;text-align:center}
.voice-transcript{font-size:14px;color:rgba(255,255,255,0.6);text-align:center;max-width:280px;min-height:40px;font-style:italic}
.voice-response{font-size:15px;color:rgba(255,255,255,0.9);text-align:center;max-width:300px;background:rgba(255,255,255,0.08);padding:12px 20px;border-radius:16px;border:1px solid rgba(255,255,255,0.12)}
.voice-cancel{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:10px 28px;border-radius:30px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:8px}
.nav-center.active-voice{background:linear-gradient(135deg,#6c5ce7,#a29bfe);box-shadow:0 4px 20px rgba(108,92,231,0.5)}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center}
.login h1{font-size:32px;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login p{color:var(--text2);margin-bottom:32px}
.login .form{width:100%;max-width:320px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:24px 20px}
.modal h2{font-size:18px;margin-bottom:16px}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.tab-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mt-2{margin-top:8px}.mt-4{margin-top:16px}.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}
.qr-box{background:white;color:black;padding:20px;border-radius:12px;text-align:center;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;word-break:break-all}
/* Home screen tiles */
.home-header{padding:20px 20px 8px;display:flex;align-items:flex-start;justify-content:space-between}
.home-greeting{font-size:14px;color:var(--text2);font-weight:400}
.home-name{font-size:26px;font-weight:700;color:white;margin:2px 0 4px;letter-spacing:-0.5px}
.home-loc{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer}
.home-loc svg{width:12px;height:12px}
.home-topright{display:flex;align-items:center;gap:10px}
.weather-pill{background:rgba(255,255,255,0.08);border-radius:30px;padding:6px 12px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.notif-btn{position:relative;width:36px;height:36px;background:rgba(255,255,255,0.08);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:#e17055;border-radius:50%;border:1.5px solid var(--bg)}
.avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;cursor:pointer}
.tiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px}
.tile{border-radius:20px;overflow:hidden;position:relative;cursor:pointer;transition:transform .2s,box-shadow .2s;aspect-ratio:1}
.tile:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.4)}
.tile-tall{aspect-ratio:auto;grid-row:span 1}
.tile svg.illustration{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:16px 16px 48px}
.tile-label{position:absolute;bottom:14px;left:16px;font-size:16px;font-weight:600;color:white;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
.tile-pending{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);border-radius:20px;padding:3px 8px;font-size:10px;font-weight:700;color:white}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;
const API = '';

function api(path, opts={}) {
  const token = localStorage.getItem('gk_token');
  const headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = `Bearer ${token}`;
  return fetch(API+path, {...opts, headers}).then(r=>r.json());
}

// Icons as simple SVG
const Icons = {
  home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>,
  user: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  shield: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  shop: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>,
  plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
};

function VoiceAssistant({onNavigate, onClose}) {
  const [status, setStatus] = useState('listening'); // listening | thinking | done | error
  const [transcript, setTranscript] = useState('');
  const [response, setResponse] = useState('');
  const recognitionRef = React.useRef(null);

  const PAGES = {
    home: ['home','main','dashboard','start'],
    bookings: ['book','booking','space','amenity','gym','pool','room','hall','reserve','clubhouse'],
    visitors: ['visitor','gate','invite','guest','delivery','move','entry'],
    marketplace: ['market','buy','sell','post','listing','shop'],
    profile: ['profile','account','my details','vehicles','pets','family','documents'],
    news: ['news','notice','announcement','updates','society news'],
    locks: ['lock','unlock','door','smart lock'],
  };

  const processWithClaude = async (text) => {
    setStatus('thinking');
    setResponse('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 200,
          system: `You are a voice assistant for PA Lite, a residential community app. Extract navigation intent AND any form prefill data from the user's speech.

Pages: home, bookings (space/amenity booking), visitors (gate pass, visitor invites, move requests), marketplace (buy/sell posts), profile (account, vehicles, pets, family), news (society announcements), locks (smart lock control).

Respond ONLY with JSON, no other text. Format:
{"action":"navigate","page":"bookings","message":"Booking the gym for you!","prefill":{"spaceSearch":"gym","date":"2026-03-11","startTime":"06:00","endTime":"07:00"}}

Prefill fields by page:
- bookings: spaceSearch (space name/type), date (YYYY-MM-DD), startTime (HH:MM 24hr), endTime (HH:MM 24hr)
- visitors: visitorName, visitorPhone, visitorType (guest/cab/delivery/daily_help), purpose
- marketplace: postType (buy/sell), title, description, price

For date/time: today is new Date().toISOString().split('T')[0], resolve relative dates like 'tomorrow', 'next monday', 'at 6pm' into exact values.
If unclear: {"action":"unclear","message":"Try: book the gym tomorrow at 6pm"}
Keep message under 10 words. Only include prefill fields the user actually mentioned.`,
          messages: [{role:'user', content: text}]
        })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || '{}';
      const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
      setResponse(parsed.message || 'Done!');
      setStatus('done');
      if(parsed.action === 'navigate' && parsed.page) {
        setTimeout(()=>{ onNavigate(parsed.page, parsed.prefill||{}); onClose(); }, 1200);
      } else {
        setTimeout(onClose, 3000);
      }
    } catch(e) {
      // Fallback: simple keyword match
      const lower = text.toLowerCase();
      let matched = null;
      for(const [page, keywords] of Object.entries(PAGES)) {
        if(keywords.some(k => lower.includes(k))) { matched = page; break; }
      }
      if(matched) {
        setResponse(`Taking you to ${matched}!`);
        setStatus('done');
        setTimeout(()=>{ onNavigate(matched); onClose(); }, 1000);
      } else {
        setStatus('error');
        setResponse("Sorry, I didn't understand. Try again.");
        setTimeout(onClose, 2500);
      }
    }
  };

  useEffect(()=>{
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition) {
      setStatus('error');
      setResponse('Voice not supported on this browser. Try Chrome.');
      setTimeout(onClose, 3000);
      return;
    }
    const rec = new SpeechRecognition();
    rec.lang = 'en-IN';
    rec.continuous = false;
    rec.interimResults = true;
    rec.maxAlternatives = 1;
    recognitionRef.current = rec;

    rec.onresult = (e) => {
      const interim = Array.from(e.results).map(r=>r[0].transcript).join('');
      setTranscript(interim);
      if(e.results[e.results.length-1].isFinal) {
        rec.stop();
        processWithClaude(interim);
      }
    };
    rec.onerror = (e) => {
      if(e.error === 'no-speech') { setStatus('error'); setResponse('No speech detected. Tap to try again.'); setTimeout(onClose,2000); }
      else { setStatus('error'); setResponse('Microphone error. Please try again.'); setTimeout(onClose,2000); }
    };
    rec.onend = () => { if(status === 'listening') setStatus('thinking'); };
    rec.start();

    return ()=>{ try{ rec.stop(); }catch(e){} };
  }, []);

  const orbClass = `voice-orb ${status==='listening'?'listening':status==='thinking'?'thinking':''}`;

  return <div className="voice-overlay" onClick={e=>e.stopPropagation()}>
    <div className={orbClass}>
      {status==='listening' && <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>}
      {status==='thinking' && <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>}
      {(status==='done'||status==='error') && <svg viewBox="0 0 24 24" fill="none" stroke={status==='done'?'#0a0a0f':'#e17055'} strokeWidth="2.5">{status==='done'?<polyline points="20 6 9 17 4 12"/>:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}</svg>}
    </div>
    <div className="voice-status">
      {status==='listening' && 'Listening...'}
      {status==='thinking' && 'Got it, one sec...'}
      {status==='done' && 'On it!'}
      {status==='error' && 'Oops!'}
    </div>
    {transcript && <div className="voice-transcript">"{transcript}"</div>}
    {response && <div className="voice-response">{response}</div>}
    <button className="voice-cancel" onClick={onClose}>Cancel</button>
  </div>;
}

function App() {
  const [token, setToken] = useState(localStorage.getItem('gk_token'));
  const [user, setUser] = useState(null);
  const [ctx, setCtx] = useState(null);
  const [page, setPage] = useState('home');
  const [loading, setLoading] = useState(true);
  const [voiceOpen, setVoiceOpen] = useState(false);
  const [voiceAction, setVoiceAction] = useState(null);
  const [signupState, setSignupState] = useState(null); // {sid, phone, token, user} for new users

  const loadMe = useCallback(()=>{
    if(!token) {setLoading(false); return;}
    api('/api/auth/me').then(d=>{
      if(d.error) {localStorage.removeItem('gk_token');setToken(null);}
      else {setUser(d.user);setCtx(d);}
      setLoading(false);
    }).catch(()=>{setLoading(false);});
  },[token]);

  useEffect(()=>{loadMe();},[loadMe]);

  const handleLogin = (t,u)=>{localStorage.setItem('gk_token',t);setToken(t);setUser(u);setLoading(true);setTimeout(loadMe,100);};
  const handleLogout = ()=>{localStorage.removeItem('gk_token');setToken(null);setUser(null);setCtx(null);setPage('home');setSignupState(null);};

  // New user — show signup before storing token
  const handleSignup = (sid, phone, token, user) => {
    setSignupState({sid, phone, token, user});
  };
  const handleSignupDone = (result) => {
    // Store token now, reload context → will land on pending screen
    localStorage.setItem('gk_token', signupState.token);
    setToken(signupState.token);
    setSignupState(null);
    setLoading(true);
    setTimeout(loadMe, 200);
  };

  const switchApt = (aptId)=>{api('/api/context/switch',{method:'POST',body:JSON.stringify({apartmentId:aptId})}).then(()=>loadMe());};

  if(loading) return <div className="login"><h1>PA Lite</h1><p>Loading...</p></div>;

  // New user completing signup
  if(signupState) return <SignupPage
    sessionId={signupState.sid}
    phone={signupState.phone}
    onDone={handleSignupDone}/>;

  if(!token) return <LoginPage onLogin={handleLogin} onSignup={handleSignup}/>;

  // Check resident status — pending or rejected users get a gate screen
  const resident = ctx?.resident;
  if(resident && (resident.status==='pending' || resident.status==='rejected')) {
    return <PendingScreen
      resident={resident}
      user={user}
      onLogout={handleLogout}
      onRefresh={loadMe}/>;
  }

  const pages = {home:<HomePage ctx={ctx} setPage={setPage}/>,profile:<ProfilePage ctx={ctx} user={user} onLogout={handleLogout} switchApt={switchApt} reload={loadMe} setPage={setPage}/>,bookings:<BookingsPage setPage={setPage} prefill={voiceAction?.page==='bookings'?voiceAction.prefill:null}/>,visitors:<VisitorsPage ctx={ctx} setPage={setPage} prefill={voiceAction?.page==='visitors'?voiceAction.prefill:null}/>,marketplace:<MarketplacePage setPage={setPage} prefill={voiceAction?.page==='marketplace'?voiceAction.prefill:null}/>,locks:<LocksPage setPage={setPage}/>,news:<NewsPage setPage={setPage}/>};

  return <div className="app">
    {voiceOpen && <VoiceAssistant
      onNavigate={(page, prefill)=>{setPage(page); setVoiceAction({page, prefill: prefill||{}}); setTimeout(()=>setVoiceAction(null), 5000);}}
      onClose={()=>setVoiceOpen(false)}/>}
    {pages[page] || pages.home}
    <div className="nav">
      <div className="nav-inner">
        <div className="nav-pill">
          <button className={`nav-btn ${page==='locks'?'active':''}`} onClick={()=>setPage('locks')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            Lock
          </button>
          <button className={`nav-center ${voiceOpen?'active-voice':''}`} onClick={()=>setVoiceOpen(true)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button className={`nav-btn ${page==='bookings'?'active':''}`} onClick={()=>setPage('bookings')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Book
          </button>
        </div>
      </div>
    </div>
  </div>;
}

// ─── Resident type config ────────────────────────────────────────────────────
const RESIDENT_TYPES = [
  { value:'owner',          label:'Owner',          desc:'Primary property owner',            icon:'🏠' },
  { value:'owner_family',   label:'Owner\'s Family', desc:'Family member of the owner',        icon:'👨‍👩‍👧' },
  { value:'tenant',         label:'Tenant',          desc:'Renting the apartment',             icon:'🔑' },
  { value:'tenant_family',  label:'Tenant\'s Family',desc:'Family member of a tenant',        icon:'👪' },
];

// ─── Pending / Rejected gate screen ─────────────────────────────────────────
function PendingScreen({resident, user, onLogout, onRefresh}) {
  const isRejected = resident?.status === 'rejected';

  useEffect(()=>{
    if(isRejected) return; // don't poll if rejected
    const t = setInterval(onRefresh, 10000); // poll every 10s while pending
    return ()=>clearInterval(t);
  },[isRejected]);

  return <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,textAlign:'center'}}>
    <div style={{fontSize:64,marginBottom:16}}>{isRejected?'❌':'⏳'}</div>
    <h2 style={{fontSize:22,fontWeight:700,color:'var(--text)',marginBottom:8}}>
      {isRejected ? 'Application Not Approved' : 'Awaiting Approval'}
    </h2>
    {isRejected ? <>
      <div style={{background:'rgba(248,81,73,.1)',border:'1px solid rgba(248,81,73,.3)',borderRadius:14,padding:20,marginBottom:20,maxWidth:360,width:'100%'}}>
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:6,fontWeight:600}}>Reason from admin:</p>
        <p style={{fontSize:14,color:'#f85149',lineHeight:1.6,margin:0}}>{resident.rejection_reason}</p>
      </div>
      <p style={{fontSize:13,color:'var(--text2)',maxWidth:300,lineHeight:1.6,marginBottom:24}}>
        Please log out and sign up again with the correct information and documents.
      </p>
      <button onClick={onLogout} style={{background:'var(--red)',border:'none',borderRadius:12,padding:'12px 32px',color:'white',fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:'inherit'}}>
        Logout &amp; Try Again
      </button>
    </> : <>
      <p style={{fontSize:14,color:'var(--text2)',maxWidth:320,lineHeight:1.7,marginBottom:8}}>
        Your application is being reviewed by the society admin.<br/>
        You'll be notified once approved.
      </p>
      <div style={{margin:'20px 0',display:'flex',flexDirection:'column',gap:10,textAlign:'left',maxWidth:340,width:'100%'}}>
        <div style={{background:'var(--card)',borderRadius:14,padding:16,border:'1px solid var(--border)'}}>
          <p style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>Society</p>
          <p style={{fontSize:14,color:'var(--text)',fontWeight:600,margin:0}}>{resident?.society_name||'—'}</p>
        </div>
        <div style={{background:'var(--card)',borderRadius:14,padding:16,border:'1px solid var(--border)'}}>
          <p style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>Apartment</p>
          <p style={{fontSize:14,color:'var(--text)',fontWeight:600,margin:0}}>{resident?.unit_number||'—'} · {resident?.tower_name||'—'}</p>
        </div>
        <div style={{background:'var(--card)',borderRadius:14,padding:16,border:'1px solid var(--border)'}}>
          <p style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>Resident Type</p>
          <p style={{fontSize:14,color:'var(--text)',fontWeight:600,margin:0,textTransform:'capitalize'}}>{(resident?.resident_type||'').replace(/_/g,' ')}</p>
        </div>
      </div>
      <p style={{fontSize:11,color:'var(--text2)',marginBottom:20}}>Checking for updates automatically...</p>
      <button onClick={onLogout} style={{background:'none',border:'1px solid var(--border)',borderRadius:10,padding:'9px 22px',color:'var(--text2)',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
        Logout
      </button>
    </>}
    {/* While pending, show news */}
    {!isRejected && <div style={{marginTop:32,width:'100%',maxWidth:420}}>
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:12,textAlign:'left'}}>📰 Society News (available during review)</p>
      <NewsPreview/>
    </div>}
  </div>;
}

function NewsPreview() {
  const [news,setNews]=useState([]);
  useEffect(()=>{ api('/api/news').then(d=>setNews(Array.isArray(d)?d.slice(0,3):[])); },[]);
  if(!news.length) return null;
  return <div style={{display:'flex',flexDirection:'column',gap:10}}>
    {news.map(n=><div key={n.id} style={{background:'var(--card)',borderRadius:14,padding:16,border:'1px solid var(--border)',textAlign:'left'}}>
      {n.is_pinned&&<span style={{fontSize:10,color:'var(--accent)',fontWeight:700,display:'block',marginBottom:4}}>📌 PINNED</span>}
      <p style={{fontSize:14,fontWeight:700,color:'var(--text)',margin:'0 0 4px'}}>{n.title}</p>
      {n.body&&<p style={{fontSize:12,color:'var(--text2)',margin:0,lineHeight:1.5}}>{n.body.slice(0,120)}{n.body.length>120?'…':''}</p>}
    </div>)}
  </div>;
}

// ─── Signup flow ─────────────────────────────────────────────────────────────
function SignupPage({sessionId, phone, onDone}) {
  const [step, setStep]         = useState('identity');   // identity → location → docs → submitting
  const [name, setName]         = useState('');
  const [email, setEmail]       = useState('');
  const [societies, setSocieties] = useState([]);
  const [towers, setTowers]     = useState([]);
  const [apartments, setApts]   = useState([]);
  const [societyId, setSocId]   = useState('');
  const [towerId, setTowerId]   = useState('');
  const [apartmentId, setAptId] = useState('');
  const [residentType, setType] = useState('');
  const [docReqs, setDocReqs]   = useState([]);
  const [docs, setDocs]         = useState({});   // {docType: {fileName, data (base64)}}
  const [err, setErr]           = useState('');
  const [submitting, setSubmitting] = useState(false);

  useEffect(()=>{ fetch('/api/lookup/societies').then(r=>r.json()).then(setSocieties); },[]);
  useEffect(()=>{
    if(!societyId){setTowers([]);setApts([]);setTowerId('');setAptId('');return;}
    fetch(`/api/lookup/towers?societyId=${societyId}`).then(r=>r.json()).then(setTowers);
  },[societyId]);
  useEffect(()=>{
    if(!towerId){setApts([]);setAptId('');return;}
    fetch(`/api/lookup/apartments?towerId=${towerId}`).then(r=>r.json()).then(setApts);
  },[towerId]);
  useEffect(()=>{
    if(!societyId||!residentType) return;
    fetch(`/api/public/doc-requirements?societyId=${societyId}&residentType=${residentType}`)
      .then(r=>r.json()).then(setDocReqs);
  },[societyId,residentType]);

  const goToLocation = ()=>{
    if(!name.trim()) return setErr('Full name is required');
    setErr(''); setStep('location');
  };
  const goToDocs = ()=>{
    if(!societyId) return setErr('Select a society');
    if(!towerId)   return setErr('Select a tower');
    if(!apartmentId) return setErr('Select your apartment');
    if(!residentType) return setErr('Select your resident type');
    setErr(''); setStep('docs');
  };
  const handleFile = (docType, file)=>{
    const reader = new FileReader();
    reader.onload = e=>setDocs(d=>({...d,[docType]:{fileName:file.name,data:e.target.result}}));
    reader.readAsDataURL(file);
  };
  const submit = async ()=>{
    const missing = docReqs.filter(r=>r.is_mandatory && !docs[r.doc_type]);
    if(missing.length) return setErr(`Please upload: ${missing.map(r=>r.doc_type.replace(/_/g,' ')).join(', ')}`);
    setSubmitting(true); setErr('');
    const payload = {
      token: sessionId, name, email, apartmentId, residentType,
      documents: Object.entries(docs).map(([type,[,{fileName,data}]]=>[type,docs[type]])
        .map ? Object.entries(docs).map(([type,v])=>({type,fileName:v.fileName,data:v.data})) : []
    };
    // cleaner:
    const docList = Object.entries(docs).map(([type,v])=>({type,fileName:v.fileName,data:v.data}));
    const res = await fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:sessionId,name,email,apartmentId,residentType,documents:docList})}).then(r=>r.json());
    setSubmitting(false);
    if(res.error) return setErr(res.error);
    onDone(res);
  };

  const typeObj = RESIDENT_TYPES.find(t=>t.value===residentType);

  // Step: Identity
  if(step==='identity') return <div className="login" style={{gap:0}}>
    <div style={{marginBottom:24,textAlign:'center'}}>
      <h1 style={{marginBottom:4}}>PA Lite</h1>
      <p style={{color:'var(--text2)'}}>Let's set up your account</p>
    </div>
    <div style={{width:'100%',maxWidth:380,display:'flex',flexDirection:'column',gap:14}}>
      <div style={{padding:'10px 16px',background:'rgba(108,92,231,.12)',borderRadius:12,fontSize:13,color:'var(--accent)'}}>
        📱 Verified: <strong>{phone}</strong>
      </div>
      <div className="form-group"><label className="label">Full Name *</label>
        <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="Your full name" autoFocus/></div>
      <div className="form-group"><label className="label">Email (optional)</label>
        <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com"/></div>
      {err&&<p style={{color:'var(--red)',fontSize:13,margin:0}}>{err}</p>}
      <button className="btn btn-primary" style={{width:'100%',padding:14}} onClick={goToLocation}>Continue →</button>
    </div>
    <div style={{marginTop:16,display:'flex',alignItems:'center',gap:8}}>
      <div style={{height:4,width:40,borderRadius:2,background:'var(--accent)'}}/>
      <div style={{height:4,width:40,borderRadius:2,background:'var(--border)'}}/>
      <div style={{height:4,width:40,borderRadius:2,background:'var(--border)'}}/>
    </div>
  </div>;

  // Step: Location + resident type
  if(step==='location') return <div className="login" style={{gap:0,justifyContent:'flex-start',paddingTop:32}}>
    <div style={{width:'100%',maxWidth:380}}>
      <button onClick={()=>{setErr('');setStep('identity');}} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:13,fontFamily:'inherit',marginBottom:16,padding:0}}>← Back</button>
      <h2 style={{marginBottom:4}}>Your Home</h2>
      <p style={{color:'var(--text2)',fontSize:13,marginBottom:20}}>Tell us which apartment you live in</p>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div className="form-group"><label className="label">Society *</label>
          <select className="input" value={societyId} onChange={e=>setSocId(e.target.value)} style={{cursor:'pointer'}}>
            <option value="">Select society...</option>
            {societies.map(s=><option key={s.id} value={s.id}>{s.name}{s.city?` · ${s.city}`:''}</option>)}
          </select></div>
        <div className="form-group"><label className="label">Tower / Block *</label>
          <select className="input" value={towerId} onChange={e=>setTowerId(e.target.value)} disabled={!societyId} style={{cursor:'pointer'}}>
            <option value="">Select tower...</option>
            {towers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select></div>
        <div className="form-group"><label className="label">Apartment *</label>
          <select className="input" value={apartmentId} onChange={e=>setAptId(e.target.value)} disabled={!towerId} style={{cursor:'pointer'}}>
            <option value="">Select apartment...</option>
            {apartments.map(a=><option key={a.id} value={a.id}>{a.unit_number}{a.floor?` · Floor ${a.floor}`:''}</option>)}
          </select></div>
        <div className="form-group"><label className="label">I am a... *</label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:4}}>
            {RESIDENT_TYPES.map(t=><button key={t.value} onClick={()=>setType(t.value)}
              style={{padding:'10px 8px',borderRadius:12,border:`2px solid ${residentType===t.value?'var(--accent)':'var(--border)'}`,background:residentType===t.value?'rgba(108,92,231,.15)':'var(--card)',cursor:'pointer',textAlign:'left',fontFamily:'inherit'}}>
              <div style={{fontSize:20,marginBottom:4}}>{t.icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{t.label}</div>
              <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.3}}>{t.desc}</div>
            </button>)}
          </div></div>
        {err&&<p style={{color:'var(--red)',fontSize:13,margin:0}}>{err}</p>}
        <button className="btn btn-primary" style={{width:'100%',padding:14}} onClick={goToDocs}>Continue →</button>
      </div>
      <div style={{marginTop:16,display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}>
        <div style={{height:4,width:40,borderRadius:2,background:'var(--border)'}}/>
        <div style={{height:4,width:40,borderRadius:2,background:'var(--accent)'}}/>
        <div style={{height:4,width:40,borderRadius:2,background:'var(--border)'}}/>
      </div>
    </div>
  </div>;

  // Step: Documents
  if(step==='docs') return <div className="login" style={{gap:0,justifyContent:'flex-start',paddingTop:32}}>
    <div style={{width:'100%',maxWidth:380}}>
      <button onClick={()=>{setErr('');setStep('location');}} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:13,fontFamily:'inherit',marginBottom:16,padding:0}}>← Back</button>
      <h2 style={{marginBottom:4}}>Required Documents</h2>
      <p style={{color:'var(--text2)',fontSize:13,marginBottom:6}}>
        {typeObj?.icon} {typeObj?.label} — please upload the following
      </p>
      {!docReqs.length
        ? <div style={{padding:'20px 0',color:'var(--text2)',fontSize:13}}>No documents required for your society. You can proceed.</div>
        : <div style={{display:'flex',flexDirection:'column',gap:12,marginTop:16}}>
          {docReqs.map(req=>{
            const uploaded = docs[req.doc_type];
            const label = req.doc_type.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            return <div key={req.doc_type} style={{background:'var(--card)',borderRadius:14,padding:16,border:`1px solid ${uploaded?'var(--accent)':'var(--border)'}`}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div>
                  <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{label}</span>
                  {req.is_mandatory&&<span style={{fontSize:10,color:'var(--red)',marginLeft:6,fontWeight:700}}>REQUIRED</span>}
                </div>
                {uploaded&&<span style={{fontSize:11,color:'var(--accent)',fontWeight:600}}>✓ Uploaded</span>}
              </div>
              {uploaded
                ? <div style={{fontSize:11,color:'var(--text2)',wordBreak:'break-all'}}>{uploaded.fileName}</div>
                : null}
              <label style={{display:'block',marginTop:8}}>
                <div style={{padding:'8px 14px',borderRadius:9,border:'1px solid var(--border)',fontSize:12,color:'var(--text2)',cursor:'pointer',textAlign:'center',background:'var(--card2)'}}>
                  {uploaded?'Replace file':'📎 Upload PDF / Image'}
                </div>
                <input type="file" accept="image/*,.pdf" style={{display:'none'}} onChange={e=>e.target.files[0]&&handleFile(req.doc_type,e.target.files[0])}/>
              </label>
            </div>;
          })}
        </div>}
      {err&&<p style={{color:'var(--red)',fontSize:13,margin:'12px 0 0'}}>{err}</p>}
      <button className="btn btn-primary" style={{width:'100%',padding:14,marginTop:20}} onClick={submit} disabled={submitting}>
        {submitting?'Submitting...' : 'Submit Application →'}
      </button>
      <div style={{marginTop:16,display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}>
        <div style={{height:4,width:40,borderRadius:2,background:'var(--border)'}}/>
        <div style={{height:4,width:40,borderRadius:2,background:'var(--border)'}}/>
        <div style={{height:4,width:40,borderRadius:2,background:'var(--accent)'}}/>
      </div>
    </div>
  </div>;

  return null;
}

function LoginPage({onLogin, onSignup}) {
  const [phone, setPhone] = useState('');
  const [otp, setOtp] = useState('');
  const [sid, setSid] = useState('');
  const [step, setStep] = useState('phone');
  const [err, setErr] = useState('');
  const [isNew, setIsNew] = useState(false);

  const sendOtp = ()=>{
    if(!phone) return setErr('Enter your phone number');
    setErr('');
    api('/api/auth/request-otp',{method:'POST',body:JSON.stringify({phone})})
    .then(d=>{if(d.success){setSid(d.sessionId);setStep('otp');}else setErr(d.error||'Failed');});
  };
  const verify = ()=>{
    if(!otp) return setErr('Enter the OTP');
    setErr('');
    api('/api/auth/verify-otp',{method:'POST',body:JSON.stringify({sessionId:sid,otp})})
    .then(d=>{
      if(!d.token) return setErr(d.error||'Invalid OTP');
      if(d.isNew) { onSignup(sid, phone, d.token, d.user); }
      else { onLogin(d.token, d.user); }
    });
  };

  return <div className="login">
    <h1>PA Lite</h1>
    <p style={{color:'var(--text2)',marginBottom:24}}>Smart Community Living</p>
    <div style={{width:'100%',maxWidth:360,display:'flex',flexDirection:'column',gap:14}}>
      {step==='phone' ? <>
        <div className="form-group"><label className="label">Phone Number</label>
          <input className="input" placeholder="Enter phone number" value={phone}
            onChange={e=>setPhone(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendOtp()}/></div>
        <button className="btn btn-primary" style={{width:'100%',padding:14}} onClick={sendOtp}>Send OTP</button>
        <p style={{fontSize:11,color:'var(--text2)',textAlign:'center',margin:0}}>Demo: 9876543210</p>
      </> : <>
        <div style={{padding:'10px 16px',background:'rgba(108,92,231,.12)',borderRadius:12,fontSize:13,color:'var(--accent)'}}>
          OTP sent to {phone}
        </div>
        <div className="form-group"><label className="label">Enter OTP</label>
          <input className="input" placeholder="123456" value={otp}
            onChange={e=>setOtp(e.target.value)} maxLength={6}
            onKeyDown={e=>e.key==='Enter'&&verify()}
            style={{fontSize:24,letterSpacing:8,textAlign:'center',fontFamily:'monospace'}}/></div>
        <button className="btn btn-primary" style={{width:'100%',padding:14}} onClick={verify}>Verify OTP</button>
        <button onClick={()=>{setStep('phone');setOtp('');setErr('');}}
          style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>
          ← Change number
        </button>
      </>}
      {err&&<p style={{color:'var(--red)',fontSize:13,margin:0,textAlign:'center'}}>{err}</p>}
    </div>
  </div>;
}

  const h = new Date().getHours();
  if(h<12) return 'Good Morning,'; if(h<17) return 'Good Afternoon,'; return 'Good Evening,';
}

function NewsPhotoCarousel({images}) {
  const [idx, setIdx] = useState(0);
  if(!images||!images.length) return null;
  return <div style={{position:'relative',borderRadius:14,overflow:'hidden',marginBottom:14,background:'#111'}}>
    <img src={images[idx]} style={{width:'100%',maxHeight:220,objectFit:'cover',display:'block'}}
      onError={e=>e.target.style.display='none'}/>
    {images.length>1&&<>
      <div style={{position:'absolute',bottom:10,left:0,right:0,display:'flex',justifyContent:'center',gap:5}}>
        {images.map((_,i)=><div key={i} onClick={()=>setIdx(i)} style={{width:6,height:6,borderRadius:'50%',background:i===idx?'white':'rgba(255,255,255,.4)',cursor:'pointer',transition:'.2s'}}/>)}
      </div>
      {idx>0&&<button onClick={()=>setIdx(i=>i-1)} style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',background:'rgba(0,0,0,.5)',border:'none',color:'white',width:32,height:32,borderRadius:'50%',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>}
      {idx<images.length-1&&<button onClick={()=>setIdx(i=>i+1)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'rgba(0,0,0,.5)',border:'none',color:'white',width:32,height:32,borderRadius:'50%',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>}
    </>}
  </div>;
}

function NewsPage({setPage}) {
  const [news, setNews] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    api('/api/news').then(d=>{ setNews(Array.isArray(d)?d:[]); setLoading(false); });
  },[]);

  const formatDate = dt => {

    const d = new Date(dt);
    return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  };

  return <div>
    <PageHeader title="Society News" onBack={()=>setPage('home')}/>
    <div className="page">
    {loading && <div className="empty">Loading...</div>}
    {!loading && !news.length && <div className="empty" style={{paddingTop:60}}>
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" strokeWidth="1.5" style={{marginBottom:12}}><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/></svg>
      <p>No announcements yet</p>

      {n.is_pinned?<div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--accent2)',fontWeight:600,marginBottom:8}}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6h2v-6h5v-2l-2-2z"/></svg>

  party_hall:   'https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=600&q=80',
  work_area:    'https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&q=80',

function getSpacePhoto(space) {
  const n = (space.name + ' ' + (space.space_type||'')).toLowerCase();
  if(n.includes('gym') || n.includes('fitness')) return SPACE_PHOTOS.gym;
  if(n.includes('pool') || n.includes('swim')) return SPACE_PHOTOS.pool;
  if(n.includes('court') || n.includes('basket') || n.includes('tennis')) return SPACE_PHOTOS.court;
  if(n.includes('club')) return SPACE_PHOTOS.clubhouse;
  if(n.includes('hall') || n.includes('party') || n.includes('event')) return SPACE_PHOTOS.party_hall;
  if(n.includes('work') || n.includes('desk') || n.includes('co-work') || n.includes('cowork')) return SPACE_PHOTOS.work_area;
  if(n.includes('meeting') || n.includes('study') || n.includes('room')) return SPACE_PHOTOS.common_room;
  return SPACE_PHOTOS[space.space_type] || SPACE_PHOTOS.default;
}

// ─── Move Request Modal (two-step: details → documents) ───────────────────────
function MoveRequestModal({ ctx, onClose, onSubmit }) {
  const [step, setStep]       = useState('details');  // details | docs
  const [details, setDetails] = useState({ moveType:'move_in', tentativeStart:'', tentativeEnd:'', notes:'' });
  const [docReqs, setDocReqs] = useState([]);
  const [docs, setDocs]       = useState({});
  const [err, setErr]         = useState('');
  const [submitting, setSubmitting] = useState(false);

  // Fetch doc requirements whenever moveType changes
  useEffect(() => {
    if (!ctx?.society?.id || !details.moveType) return;
    setDocs({});
    fetch(`/api/public/move-doc-requirements?societyId=${ctx.society.id}&moveType=${details.moveType}`)
      .then(r => r.json()).then(setDocReqs);
  }, [details.moveType, ctx?.society?.id]);

  const goToDocs = () => {
    if (!details.tentativeStart) return setErr('Please select a start date');
    if (!details.tentativeEnd)   return setErr('Please select an end date');
    setErr('');
    setStep('docs');
  };

  const handleFile = (docType, file) => {
    const reader = new FileReader();
    reader.onload = e => setDocs(d => ({ ...d, [docType]: { fileName: file.name, data: e.target.result } }));
    reader.readAsDataURL(file);
  };

  const submit = () => {
    const missing = docReqs.filter(r => r.is_mandatory && !docs[r.doc_type]);
    if (missing.length) return setErr(`Please upload: ${missing.map(r => r.doc_type.replace(/_/g,' ')).join(', ')}`);
    setSubmitting(true);
    onSubmit(details, docs);
  };

  const moveLabel = details.moveType === 'move_in' ? '📦 Move In' : '🚚 Move Out';

  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'flex-end',zIndex:200}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:'var(--card)',borderRadius:'20px 20px 0 0',padding:24,width:'100%',maxHeight:'90vh',overflowY:'auto'}}>

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {step==='docs' && <button onClick={()=>{setStep('details');setErr('');}}
            style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:20,lineHeight:1,padding:0}}>←</button>}
          <h3 style={{margin:0}}>Move Request</h3>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:22,lineHeight:1,padding:0}}>×</button>
      </div>

      {/* Progress */}
      <div style={{display:'flex',gap:6,marginBottom:20}}>
        {['Details','Documents'].map((s,i)=><div key={s} style={{flex:1,height:3,borderRadius:2,background:(step==='details'?i===0:true)?'var(--accent)':'var(--border)'}}/>)}
      </div>

      {step==='details' && <>
        {/* Move type toggle */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
          {[{v:'move_in',label:'📦 Move In'},{v:'move_out',label:'🚚 Move Out'}].map(t=>
            <button key={t.v} onClick={()=>setDetails(d=>({...d,moveType:t.v}))}
              style={{padding:'12px 0',borderRadius:12,border:`2px solid ${details.moveType===t.v?'var(--accent)':'var(--border)'}`,
                background:details.moveType===t.v?'rgba(108,92,231,.15)':'var(--card2)',
                cursor:'pointer',color:'var(--text)',fontWeight:700,fontSize:14,fontFamily:'inherit'}}>
              {t.label}
            </button>)}
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div className="form-group">
            <label className="label">Start Date *</label>
            <input className="input" type="date" value={details.tentativeStart}
              onChange={e=>setDetails(d=>({...d,tentativeStart:e.target.value}))}/>
          </div>
          <div className="form-group">
            <label className="label">End Date *</label>
            <input className="input" type="date" value={details.tentativeEnd}
              onChange={e=>setDetails(d=>({...d,tentativeEnd:e.target.value}))}/>
          </div>
          <div className="form-group">
            <label className="label">Notes</label>
            <input className="input" placeholder="e.g. Large furniture, need lift access" value={details.notes}
              onChange={e=>setDetails(d=>({...d,notes:e.target.value}))}/>
          </div>
        </div>

        {err && <p style={{color:'var(--red)',fontSize:13,margin:'12px 0 0'}}>{err}</p>}
        <button className="btn btn-primary" style={{width:'100%',marginTop:20,padding:14}} onClick={goToDocs}>
          Next: Upload Documents →
        </button>
      </>}

      {step==='docs' && <>
        <div style={{marginBottom:16,padding:'10px 14px',background:'rgba(108,92,231,.1)',borderRadius:12,fontSize:13,color:'var(--accent)'}}>
          {moveLabel} · {details.tentativeStart} → {details.tentativeEnd}
        </div>

        {docReqs.length === 0
          ? <div style={{padding:'20px 0',color:'var(--text2)',fontSize:13,textAlign:'center'}}>
              No documents required for this move type. You can submit directly.
            </div>
          : <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {docReqs.map(req => {
                const uploaded = docs[req.doc_type];
                const label = req.doc_type.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
                return <div key={req.doc_type} style={{background:'var(--card2)',borderRadius:14,padding:16,
                    border:`1px solid ${uploaded?'var(--accent)':'var(--border)'}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <div>
                      <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{label}</span>
                      {req.is_mandatory && <span style={{fontSize:10,color:'var(--red)',marginLeft:6,fontWeight:700}}>REQUIRED</span>}
                    </div>
                    {uploaded && <span style={{fontSize:11,color:'var(--accent)',fontWeight:600}}>✓</span>}
                  </div>
                  {uploaded && <div style={{fontSize:11,color:'var(--text2)',marginBottom:8,wordBreak:'break-all'}}>{uploaded.fileName}</div>}
                  <label>
                    <div style={{padding:'8px 12px',borderRadius:9,border:'1px solid var(--border)',fontSize:12,
                        color:'var(--text2)',cursor:'pointer',textAlign:'center',background:'var(--card)'}}>
                      {uploaded ? '↺ Replace' : '📎 Upload PDF / Image'}
                    </div>
                    <input type="file" accept="image/*,.pdf" style={{display:'none'}}
                      onChange={e=>e.target.files[0]&&handleFile(req.doc_type,e.target.files[0])}/>
                  </label>
                </div>;
              })}
            </div>}

        {err && <p style={{color:'var(--red)',fontSize:13,margin:'12px 0 0'}}>{err}</p>}
        <button className="btn btn-primary" style={{width:'100%',marginTop:20,padding:14}} onClick={submit} disabled={submitting}>
          {submitting ? 'Submitting…' : 'Submit Request'}
        </button>
      </>}
    </div>
  </div>;

        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:12}}>
          <button onClick={()=>setLightbox(l=>({...l,index:Math.max(0,l.index-1)}))} disabled={lightbox.index===0} className="btn" style={{background:'rgba(255,255,255,0.1)',color:'white',flex:1,marginRight:8}}>← Prev</button>
          <button onClick={()=>setLightbox(l=>({...l,index:Math.min(l.images.length-1,l.index+1)}))} disabled={lightbox.index===lightbox.images.length-1} className="btn" style={{background:'rgba(255,255,255,0.1)',color:'white',flex:1}}>Next →</button>
        </div>
        <button onClick={()=>setLightbox(null)} className="btn" style={{width:'100%',marginTop:8,background:'rgba(255,255,255,0.08)',color:'white'}}>Close</button>
      </div>
    </div>}

    {/* Create post modal */}
    {modal && <div className="modal-overlay" onClick={()=>setModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>New Listing</h2>

        {/* Photos */}
        <div className="form-group">
          <label className="label">Photos <span style={{color:'var(--text2)'}}>(up to 6)</span></label>
          <div className="photo-grid">
            {photos.map((src,i)=><div key={i} className="photo-thumb-wrap">
              <img src={src} className="photo-thumb"/>
              <button className="photo-remove" onClick={()=>removePhoto(i)}>×</button>
            </div>)}
            {photos.length<6&&<button className="photo-add" onClick={()=>fileInputRef.current.click()}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Add photo
            </button>}
          </div>
          <input ref={fileInputRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={addPhotos}/>
        </div>

        <div className="form-group"><label className="label">Type</label>
          <select className="input" value={form.postType} onChange={e=>setF('postType',e.target.value)}>
            <option value="sell">Sell</option><option value="buy">Buy</option>
          </select></div>
        <div className="form-group"><label className="label">Title *</label>
          <input className="input" value={form.title} onChange={e=>setF('title',e.target.value)} placeholder="e.g. Sofa for sale"/></div>
        <div className="form-group"><label className="label">Description</label>
          <textarea className="input" value={form.description} onChange={e=>setF('description',e.target.value)} placeholder="Condition, details..." rows={3} style={{resize:'none'}}/></div>
        <div className="form-group"><label className="label">Price (Rs.)</label>
          <input className="input" type="number" value={form.price} onChange={e=>setF('price',e.target.value)} placeholder="0"/></div>

        <div className="flex" style={{gap:10,marginTop:16}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={create}>Post Listing</button>
          <button className="btn btn-secondary" style={{flex:1}} onClick={()=>setModal(false)}>Cancel</button>
        </div>
      </div>
    </div>}

    </div>
  </div>;
}

function QRCanvas({code, size=80}) {
  const ref = React.useRef(null);
  useEffect(()=>{
    if(!ref.current || !window.QRCode) return;
    ref.current.innerHTML = '';
    new QRCode(ref.current, {
      text: code, width: size, height: size,
      colorDark:'#000', colorLight:'#fff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  },[code, size]);
  return <div ref={ref} style={{borderRadius:6,overflow:'hidden',lineHeight:0}}/>;
}

function InviteQRModal({invite, onClose}) {
  const canvasRef = React.useRef(null);

  useEffect(()=>{
    if(!canvasRef.current) return;
    canvasRef.current.innerHTML = '';
    new QRCode(canvasRef.current, {
      text: invite.qr_code,
      width: 220, height: 220,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H,
    });
  }, [invite.qr_code]);

  const download = () => {
    const img = canvasRef.current?.querySelector('img') || canvasRef.current?.querySelector('canvas');
    if(!img) return;
    const src = img.tagName === 'CANVAS' ? img.toDataURL() : img.src;
    const a = document.createElement('a');
    a.href = src; a.download = `GatePass-${invite.visitor_name.replace(/\s+/g,'-')}.png`;
    a.click();
  };

  const share = async () => {
    const img = canvasRef.current?.querySelector('img') || canvasRef.current?.querySelector('canvas');
    if(!img) return;
    const src = img.tagName === 'CANVAS' ? img.toDataURL() : img.src;
    if(navigator.share) {
      const blob = await (await fetch(src)).blob();
      const file = new File([blob], `GatePass-${invite.visitor_name}.png`, {type:'image/png'});
      navigator.share({title:`Gate Pass – ${invite.visitor_name}`, text:`QR Code: ${invite.qr_code}`, files:[file]}).catch(()=>{});
    } else {
      await navigator.clipboard.writeText(invite.qr_code);
      alert('QR code copied to clipboard: ' + invite.qr_code);
    }
  };

  const validRange = invite.valid_from || invite.valid_to
    ? `${invite.valid_from ? new Date(invite.valid_from).toLocaleString() : ''}${invite.valid_from && invite.valid_to ? ' → ' : ''}${invite.valid_to ? new Date(invite.valid_to).toLocaleString() : ''}`
    : null;

  return <div className="qr-modal-overlay" onClick={onClose}>
    <div className="qr-modal-card" onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:28}}>🎫</div>
      <div className="qr-modal-name">{invite.visitor_name}</div>
      <div className="qr-modal-meta">
        {invite.visitor_type}{invite.purpose ? ` · ${invite.purpose}` : ''}
        {validRange && <><br/>{validRange}</>}
      </div>
      <div ref={canvasRef}/>
      <div className="qr-modal-code">{invite.qr_code}</div>
      <div className="qr-modal-btns">
        <button className="btn btn-secondary" style={{flex:1,fontSize:13}} onClick={share}>
          {navigator.share ? '📤 Share' : '📋 Copy Code'}
        </button>
        <button className="btn btn-primary" style={{flex:1,fontSize:13}} onClick={download}>⬇ Save</button>
      </div>
      <button className="btn btn-secondary" style={{width:'100%',fontSize:13}} onClick={onClose}>Close</button>
    </div>
  </div>;
}

function FormModal({title, onClose, onSubmit, fields, initialData}) {
  const [data, setData] = useState(initialData||{});
  const set = (k,v)=>setData(d=>({...d,[k]:v}));
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>{title}</h2>
      {initialData&&Object.keys(initialData).length>0&&<div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12,fontSize:12,color:'var(--accent2)'}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
        Voice filled {Object.keys(initialData).length} field{Object.keys(initialData).length>1?'s':''}
      </div>}
      {fields.map(f=><div key={f.key} className="form-group">
        <label className="label">{f.label}</label>
        {f.type==='select' ? <select className="input" value={data[f.key]||''} onChange={e=>set(f.key,e.target.value)} style={initialData?.[f.key]?{borderColor:'var(--accent)',background:'rgba(108,92,231,0.08)'}:{}}><option value="">Select</option>{f.options.map(o=><option key={o} value={o}>{o}</option>)}</select>
        : <input className="input" type={f.type||'text'} value={data[f.key]||''} onChange={e=>set(f.key,e.target.value)} placeholder={f.label} style={initialData?.[f.key]?{borderColor:'var(--accent)',background:'rgba(108,92,231,0.08)'}:{}}/>}
      </div>)}
      <div className="flex" style={{gap:10,marginTop:16}}>
        <button className="btn btn-primary" style={{flex:1}} onClick={()=>onSubmit(data)}>Submit</button>
        <button className="btn btn-secondary" style={{flex:1}} onClick={onClose}>Cancel</button>
      </div>
    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
