<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f5f7;--card:#fff;--accent:#4a56e2;--accent2:#6c5ce7;--green:#00b894;--red:#e17055;--orange:#f39c12;--text:#1a1a2e;--text2:#6b7280;--border:#e5e7eb;--radius:12px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:#1a1a2e;color:white;padding:20px 0;position:fixed;height:100vh;overflow-y:auto}
.sidebar h1{font-size:18px;padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar .society-name{padding:12px 20px;font-size:11px;color:#8888a0;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .society-name span{color:#a29bfe;font-weight:600;display:block;font-size:13px}
.sidebar nav{padding:12px 0}
.sidebar nav button{display:block;width:100%;text-align:left;padding:10px 20px;background:none;border:none;color:#8888a0;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}
.sidebar nav button:hover,.sidebar nav button.active{color:white;background:rgba(108,92,231,.2)}
.sidebar nav button.active{border-left:3px solid #6c5ce7}
.main{margin-left:240px;flex:1;padding:24px 32px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.top-bar h2{font-size:24px;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border)}
.stat-card .val{font-size:28px;font-weight:700;font-family:'Space Mono'}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:10px 12px;font-size:12px;color:var(--text2);font-weight:600;border-bottom:2px solid var(--border);text-transform:uppercase}
.table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,184,148,.1);color:var(--green)}
.badge-red{background:rgba(225,112,85,.1);color:var(--red)}
.badge-orange{background:rgba(243,156,18,.1);color:var(--orange)}
.badge-blue{background:rgba(74,86,226,.1);color:var(--accent)}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{opacity:.9}
.btn-green{background:var(--green);color:white}
.btn-red{background:var(--red);color:white}
.btn-sm{padding:5px 12px;font-size:11px}
.input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:100%}
.input:focus{border-color:var(--accent)}
.form-group{margin-bottom:12px}
.label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.flex{display:flex;align-items:center;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:white;border-radius:16px;padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:16px}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.login h1{font-size:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty{text-align:center;padding:40px;color:var(--text2);font-size:14px}
.tab-bar{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit}
.tab.active{background:var(--accent);color:white;border-color:var(--accent)}
select.input{appearance:none}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
</style></head><body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;

function api(path, opts={}) {
  const token = localStorage.getItem('gk_admin_token');
  const headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = `Bearer ${token}`;
  return fetch(path, {...opts, headers}).then(r=>r.json());
}

function App() {
  const [token, setToken] = useState(localStorage.getItem('gk_admin_token'));
  const [user, setUser] = useState(null);
  const [ctx, setCtx] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [loading, setLoading] = useState(true);

  const loadMe = useCallback(()=>{
    if(!token){setLoading(false);return;}
    api('/api/auth/me').then(d=>{
      if(d.error){localStorage.removeItem('gk_admin_token');setToken(null);}
      else{setUser(d.user);setCtx(d);}
      setLoading(false);
    });
  },[token]);
  useEffect(()=>{loadMe();},[loadMe]);

  const handleLogin=(t)=>{localStorage.setItem('gk_admin_token',t);setToken(t);setLoading(true);setTimeout(loadMe,100);};

  if(loading) return <div className="login"><h1>Loading...</h1></div>;
  if(!token) return <LoginPage onLogin={handleLogin}/>;

  const isSuperAdmin = ctx?.roles?.some(r=>r.role==='super_admin');
  const pages = {dashboard:<Dashboard/>,apartments:<Apartments/>,residents:<Residents/>,spaces:<Spaces/>,bookings:<Bookings/>,invoices:<InvoicesAdmin/>,approvals:<Approvals/>,daily_help:<DailyHelp/>,documents:<Documents/>,doc_reqs:<DocReqs/>,news:<NewsAdmin/>,banners:<BannersAdmin/>,ads:<AdsAdmin/>,guards:<Guards/>,societies:<Societies token={token}/>};

  return <div className="layout">
    <div className="sidebar">
      <h1 style={{padding:'16px 20px 16px'}}>Admin Console</h1>
      <div className="society-name"><span>{ctx?.society?.name||'No Society'}</span>{ctx?.society?.city}</div>
      <nav>
        {[['dashboard','Dashboard'],['apartments','🏢 Apartments'],['residents','Residents'],['spaces','Spaces'],['bookings','Bookings'],['invoices','💳 Invoices'],['approvals','Approvals'],['daily_help','Daily Help'],['documents','Documents'],['doc_reqs','Doc Requirements'],['news','📰 News'],['banners','📢 Banners'],['ads','🏷 Ads'],['guards','🛡 Guards']].map(([k,l])=>
          <button key={k} className={page===k?'active':''} onClick={()=>setPage(k)}>{l}</button>
        )}
        {isSuperAdmin&&<button className={page==='societies'?'active':''} onClick={()=>setPage('societies')} style={{borderTop:'1px solid #2d2d3d',marginTop:8,paddingTop:16}}>⚙ Manage Societies</button>}
        <button style={{color:'#e17055',marginTop:20}} onClick={()=>{localStorage.removeItem('gk_admin_token');setToken(null);}}>Sign Out</button>
      </nav>
    </div>
    <div className="main">{pages[page]||pages.dashboard}</div>
  </div>;
}

function LoginPage({onLogin}) {
  const [phone,setPhone]=useState('');const [otp,setOtp]=useState('');const [sid,setSid]=useState('');const [step,setStep]=useState('phone');
  const send=()=>api('/api/auth/request-otp',{method:'POST',body:JSON.stringify({phone})}).then(d=>{if(d.success){setSid(d.sessionId);setStep('otp');}});
  const verify=()=>api('/api/auth/verify-otp',{method:'POST',body:JSON.stringify({sessionId:sid,otp})}).then(d=>{if(d.token)onLogin(d.token);});
  return <div className="login">
    <h1>Admin Console</h1>
    <p style={{color:'var(--text2)'}}>Management Console</p>
    <div style={{width:300}}>
      {step==='phone'?<><div className="form-group"><label className="label">Phone</label><input className="input" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="Admin phone"/></div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={send}>Send OTP</button>
        <p style={{fontSize:11,color:'var(--text2)',marginTop:8}}>Demo: 9999900001 (Green Valley) | 9999900003 (Sunrise)</p></>
      :<><div className="form-group"><label className="label">OTP</label><input className="input" value={otp} onChange={e=>setOtp(e.target.value)} placeholder="123456"/></div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={verify}>Verify</button></>}
    </div>
  </div>;
}

function Apartments() {
  const [towers, setTowers]         = useState([]);
  const [apartments, setApartments] = useState([]);
  const [selectedTower, setSelectedTower] = useState('all');
  const [search, setSearch]         = useState('');
  const [aptSort, setAptSort]       = useState({col:'unit_number', dir:'asc'});
  const [residents, setResidents]   = useState([]);
  const [resSearch, setResSearch]   = useState('');
  const [resSort, setResSort]       = useState({col:'name', dir:'asc'});
  const [drawer, setDrawer]         = useState(null);
  const [modal, setModal]           = useState(null);
  const [form, setForm]             = useState({towerId:'', unitNumber:'', floor:'', bedrooms:'2', areaSqft:''});
  const [msg, setMsg]               = useState('');
  const [loadingResidents, setLoadingResidents] = useState(false);

  const load = () => {
    api('/api/admin/towers').then(d => setTowers(Array.isArray(d)?d:[]));
    api('/api/admin/apartments').then(d => setApartments(Array.isArray(d)?d:[]));
  };
  useEffect(load, []);

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const openCreate = () => { setForm({towerId:towers[0]?.id||'', unitNumber:'', floor:'', bedrooms:'2', areaSqft:''}); setMsg(''); setModal('create'); };
  const openEdit   = apt => { setForm({towerId:apt.tower_id, unitNumber:apt.unit_number, floor:apt.floor||'', bedrooms:apt.bedrooms||'2', areaSqft:apt.area_sqft||''}); setMsg(''); setModal(apt); };

  const openResidents = apt => {
    setDrawer(apt); setResidents([]); setResSearch(''); setResSort({col:'name',dir:'asc'}); setLoadingResidents(true);
    api(`/api/admin/apartments/${apt.id}/residents`).then(d => { setResidents(Array.isArray(d)?d:[]); setLoadingResidents(false); });
  };

  const save = () => {
    if(!form.unitNumber.trim()) return setMsg('Unit number is required');
    if(!form.towerId) return setMsg('Select a tower');
    const body = {towerId:form.towerId, unitNumber:form.unitNumber.trim(), floor:form.floor?parseInt(form.floor):null, bedrooms:parseInt(form.bedrooms)||2, areaSqft:form.areaSqft?parseFloat(form.areaSqft):null};
    const isEdit = modal && modal !== 'create';
    (isEdit ? api(`/api/admin/apartments/${modal.id}`,{method:'PUT',body:JSON.stringify(body)}) : api('/api/admin/apartments',{method:'POST',body:JSON.stringify(body)}))
      .then(d => { if(d.error) return setMsg(d.error); setModal(null); load(); });
  };

  const del = apt => {
    if(!confirm(`Delete apartment ${apt.unit_number}? This cannot be undone.`)) return;
    api(`/api/admin/apartments/${apt.id}`,{method:'DELETE'}).then(d => { if(d.error) return alert(d.error); load(); });
  };

  // Sorting helpers
  const toggleSort = (current, col, setter) => setter(s => s.col===col ? {...s, dir:s.dir==='asc'?'desc':'asc'} : {col, dir:'asc'});
  const SortIcon = ({col, state}) => <span style={{marginLeft:4,opacity:state.col===col?1:0.3,fontSize:10}}>{state.col===col && state.dir==='desc' ? '▼' : '▲'}</span>;
  const aptSortRows = (rows, {col, dir}) => [...rows].sort((a,b) => {
    const av = a[col]??'', bv = b[col]??'';
    const n = v => (v!==''&&!isNaN(v)) ? Number(v) : null;
    const an=n(av), bn=n(bv);
    const cmp = (an!==null&&bn!==null) ? an-bn : String(av).localeCompare(String(bv));
    return dir==='asc' ? cmp : -cmp;
  });
  const thStyle = (col, s) => ({cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',color:s.col===col?'var(--text)':'var(--text2)'});

  const statusBadge = s => {
    const c = s==='approved'?'var(--green)':s==='pending'?'var(--orange)':'var(--red)';
    return <span style={{fontSize:11,fontWeight:700,padding:'2px 9px',borderRadius:20,color:c,border:`1px solid ${c}`,background:`${c}18`}}>{s}</span>;
  };

  const SearchBar = ({value, onChange, placeholder, style={}}) => <div style={{position:'relative',...style}}>
    <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',fontSize:14,pointerEvents:'none'}}>🔍</span>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:'100%',paddingLeft:32,paddingRight:value?28:10,height:36,borderRadius:8,border:'1px solid var(--border)',background:'var(--card2)',color:'var(--text)',fontSize:13,fontFamily:'inherit',boxSizing:'border-box'}}/>
    {value && <button onClick={()=>onChange('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:18,lineHeight:1,padding:0}}>×</button>}
  </div>;

  // Filter + sort apartments
  const q = search.toLowerCase();
  const filtered = apartments
    .filter(a => selectedTower==='all' || a.tower_id===selectedTower)
    .filter(a => !q || [a.unit_number,a.tower_name,String(a.floor||''),String(a.bedrooms||''),String(a.area_sqft||'')].some(v=>v.toLowerCase().includes(q)));
  const sorted = aptSortRows(filtered, aptSort);

  // Filter + sort residents
  const rq = resSearch.toLowerCase();
  const filteredRes = residents.filter(r => !rq || [r.name,r.phone,r.email,r.resident_type,r.status].some(v=>(v||'').toLowerCase().includes(rq)));
  const sortedRes = aptSortRows(filteredRes, resSort);

  return <div>
    <div className="top-bar" style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
      <div>
        <h2 style={{marginBottom:4}}>Apartments</h2>
        <div style={{fontSize:13,color:'var(--text2)'}}>{apartments.length} units across {towers.length} tower{towers.length!==1?'s':''}</div>
      </div>
      <button className="btn btn-primary btn-sm" onClick={openCreate}>+ Add Apartment</button>
    </div>

    {/* Search + Tower filter row */}
    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16,alignItems:'center'}}>
      <TblSearchBar value={search} onChange={setSearch} placeholder="Search unit, tower, floor, BHK…" style={{flex:'1 1 220px',minWidth:180}}/>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[['all','All Towers'],...towers.map(t=>[t.id,t.name])].map(([id,label])=>
          <button key={id} onClick={()=>setSelectedTower(id)} style={{padding:'5px 14px',borderRadius:20,border:'1px solid var(--border)',background:selectedTower===id?'var(--accent)':'none',color:selectedTower===id?'white':'var(--text2)',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>
            {label}
          </button>
        )}
      </div>
      {(search||selectedTower!=='all') && <span style={{fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>{sorted.length} result{sorted.length!==1?'s':''}</span>}
    </div>

    {/* Apartments table */}
    <div className="card" style={{overflowX:'auto'}}>
      <table className="table">
        <thead><tr>
          <th style={thStyle('unit_number',aptSort)} onClick={()=>toggleSort(aptSort,'unit_number',setAptSort)}>Unit <SortIcon col="unit_number" state={aptSort}/></th>
          <th style={thStyle('tower_name',aptSort)} onClick={()=>toggleSort(aptSort,'tower_name',setAptSort)}>Tower <SortIcon col="tower_name" state={aptSort}/></th>
          <th style={thStyle('floor',aptSort)} onClick={()=>toggleSort(aptSort,'floor',setAptSort)}>Floor <SortIcon col="floor" state={aptSort}/></th>
          <th style={thStyle('bedrooms',aptSort)} onClick={()=>toggleSort(aptSort,'bedrooms',setAptSort)}>BHK <SortIcon col="bedrooms" state={aptSort}/></th>
          <th style={thStyle('area_sqft',aptSort)} onClick={()=>toggleSort(aptSort,'area_sqft',setAptSort)}>Area (sqft) <SortIcon col="area_sqft" state={aptSort}/></th>
          <th>Actions</th>
        </tr></thead>
        <tbody>
          {sorted.map(apt=><tr key={apt.id}>
            <td style={{fontWeight:600}}>{apt.unit_number}</td>
            <td>{apt.tower_name}</td>
            <td>{apt.floor||'—'}</td>
            <td>{apt.bedrooms||2}</td>
            <td>{apt.area_sqft||'—'}</td>
            <td>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>openResidents(apt)} style={{fontSize:11,padding:'3px 10px',borderRadius:6,border:'1px solid var(--border)',background:'none',color:'var(--text2)',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>👤 Residents</button>
                <button onClick={()=>openEdit(apt)} style={{fontSize:11,padding:'3px 10px',borderRadius:6,border:'1px solid var(--border)',background:'none',color:'var(--text2)',cursor:'pointer',fontFamily:'inherit'}}>✏ Edit</button>
                <button onClick={()=>del(apt)} style={{fontSize:11,padding:'3px 10px',borderRadius:6,border:'none',background:'rgba(248,81,73,.12)',color:'var(--red)',cursor:'pointer',fontFamily:'inherit'}}>🗑 Delete</button>
              </div>
            </td>
          </tr>)}
          {sorted.length===0 && <tr><td colSpan={6} style={{textAlign:'center',color:'var(--text2)',padding:40}}>{search?'No apartments match your search':'No apartments yet — add one above'}</td></tr>}
        </tbody>
      </table>
    </div>

    {/* Create / Edit Modal */}
    {modal && <div className="modal-overlay" onClick={()=>setModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:440}}>
        <div className="modal-header">
          <span className="modal-title">{modal==='create'?'Add Apartment':'Edit Apartment'}</span>
          <button className="modal-close" onClick={()=>setModal(null)}>✕</button>
        </div>
        <div style={{padding:24}}>
          <div className="form-group">
            <label className="label">Tower *</label>
            <select className="input" value={form.towerId} onChange={e=>setF('towerId',e.target.value)}>
              <option value="">Select tower</option>
              {towers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="label">Unit Number *</label>
            <input className="input" value={form.unitNumber} onChange={e=>setF('unitNumber',e.target.value)} placeholder="e.g. 101, A-202"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group">
              <label className="label">Floor</label>
              <input className="input" type="number" value={form.floor} onChange={e=>setF('floor',e.target.value)} placeholder="1"/>
            </div>
            <div className="form-group">
              <label className="label">Bedrooms</label>
              <select className="input" value={form.bedrooms} onChange={e=>setF('bedrooms',e.target.value)}>
                {[1,2,3,4,5].map(n=><option key={n} value={n}>{n} BHK</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="label">Area (sqft)</label>
            <input className="input" type="number" value={form.areaSqft} onChange={e=>setF('areaSqft',e.target.value)} placeholder="e.g. 1200"/>
          </div>
          {msg && <div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{msg}</div>}
          <div style={{display:'flex',gap:10}}>
            <button className="btn" style={{flex:1}} onClick={()=>setModal(null)}>Cancel</button>
            <button className="btn btn-primary" style={{flex:1}} onClick={save}>{modal==='create'?'Add Apartment':'Save Changes'}</button>
          </div>
        </div>
      </div>
    </div>}

    {/* Residents Drawer */}
    {drawer && <div className="modal-overlay" onClick={()=>setDrawer(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:640,width:'90vw'}}>
        <div className="modal-header">
          <div>
            <span className="modal-title">Residents — {drawer.unit_number}</span>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{drawer.tower_name} · Floor {drawer.floor||'—'} · {drawer.bedrooms||2} BHK</div>
          </div>
          <button className="modal-close" onClick={()=>setDrawer(null)}>✕</button>
        </div>
        <div style={{padding:'16px 24px 24px'}}>
          {loadingResidents && <div style={{textAlign:'center',color:'var(--text2)',padding:40}}>Loading…</div>}
          {!loadingResidents && residents.length===0 && <div style={{textAlign:'center',color:'var(--text2)',padding:40}}>
            <div style={{fontSize:32,marginBottom:8}}>🏠</div>No residents in this apartment
          </div>}
          {!loadingResidents && residents.length>0 && <>
            <TblSearchBar value={resSearch} onChange={setResSearch} placeholder="Search name, phone, type, status…" style={{marginBottom:14}}/>
            <div style={{overflowX:'auto'}}>
              <table className="table">
                <thead><tr>
                  <th style={thStyle('name',resSort)} onClick={()=>toggleSort(resSort,'name',setResSort)}>Name <SortIcon col="name" state={resSort}/></th>
                  <th style={thStyle('phone',resSort)} onClick={()=>toggleSort(resSort,'phone',setResSort)}>Phone <SortIcon col="phone" state={resSort}/></th>
                  <th style={thStyle('resident_type',resSort)} onClick={()=>toggleSort(resSort,'resident_type',setResSort)}>Type <SortIcon col="resident_type" state={resSort}/></th>
                  <th style={thStyle('lease_start',resSort)} onClick={()=>toggleSort(resSort,'lease_start',setResSort)}>Lease <SortIcon col="lease_start" state={resSort}/></th>
                  <th style={thStyle('status',resSort)} onClick={()=>toggleSort(resSort,'status',setResSort)}>Status <SortIcon col="status" state={resSort}/></th>
                </tr></thead>
                <tbody>

// ─── Table utilities (plain functions, not a hook) ────────────────────────────
function tblSortRows(rows, col, dir) {
  return [...rows].sort((a,b) => {
    const av = a[col]??'', bv = b[col]??'';
    const n = v => (v!==''&&v!=null&&!isNaN(v)) ? Number(v) : null;
    const an=n(av), bn=n(bv);
    const cmp = (an!==null&&bn!==null) ? an-bn : String(av).localeCompare(String(bv));
    return dir==='asc' ? cmp : -cmp;
  });
}
function tblFilter(rows, q, fields) {
  if(!q) return rows;
  const lq = q.toLowerCase();
  return rows.filter(r => fields.some(f => (r[f]||'').toString().toLowerCase().includes(lq)));
}
function TblSortTh({col, label, sort, setSort}) {
  const active = sort.col===col;
  return <th style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',color:active?'var(--text)':'var(--text2)'}}
    onClick={()=>setSort(s=>s.col===col?{...s,dir:s.dir==='asc'?'desc':'asc'}:{col,dir:'asc'})}>
    {label}<span style={{marginLeft:4,opacity:active?1:0.3,fontSize:10}}>{active&&sort.dir==='desc'?'▼':'▲'}</span>
  </th>;
}
function TblSearchBar({value, onChange, placeholder='Search…', style={}}) {
  return <div style={{position:'relative',flex:'1 1 200px',minWidth:160,...style}}>
    <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',fontSize:14,pointerEvents:'none'}}>🔍</span>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:'100%',paddingLeft:32,paddingRight:value?28:10,height:34,borderRadius:8,border:'1px solid var(--border)',background:'var(--card2)',color:'var(--text)',fontSize:13,fontFamily:'inherit',boxSizing:'border-box'}}/>
    {value&&<button onClick={()=>onChange('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:18,lineHeight:1,padding:0}}>×</button>}
  </div>;
}

  const [moves, setMoves] = useState([]);

  // Shared review modal state
  const [reviewTarget, setReviewTarget] = useState(null); // {type:'move'|'lease', obj, docs}
  const [docsLoading, setDocsLoading] = useState(false);
  const [stage, setStage] = useState('docs'); // 'docs' | 'reject'
  const [rejectReason, setRejectReason] = useState('');
  const [rejectErr, setRejectErr] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [lightbox, setLightbox] = useState(null);

  const [moveSearch, setMoveSearch] = useState('');
  const [moveSort, setMoveSort] = useState({col:'name', dir:'asc'});
  const [leaseSearch, setLeaseSearch] = useState('');
  const [leaseSort, setLeaseSort] = useState({col:'name', dir:'asc'});

  const loadM = () => api('/api/admin/move-requests').then(setMoves);
  const loadL = () => api('/api/admin/lease-extensions').then(setLeases);
  useEffect(() => { loadM(); loadL(); }, []);

  const openReview = (type, obj) => {
    setReviewTarget({type, obj, docs: [], reqs: []});
    setStage('docs');
    setRejectReason('');
    setRejectErr('');
    setDocsLoading(true);
    if (type === 'move') {
      // docs already embedded with data field; fetch reqs to show checklist
      api(`/api/admin/move-doc-requirements`).then(all => {
        const reqs = (all||[]).filter(r => r.move_type === obj.move_type);
        setReviewTarget({type, obj, docs: obj.documents || [], reqs});
        setDocsLoading(false);
      });
    } else {
      // fetch both lease docs and lease doc requirements
      Promise.all([
        api(`/api/admin/lease-extensions/${obj.id}/documents`),
        api(`/api/admin/lease-doc-requirements`),
      ]).then(([docs, reqs]) => {
        setReviewTarget({type, obj, docs: docs||[], reqs: reqs||[]});
        setDocsLoading(false);
      });
    }
  };

  const approve = async () => {
    setSubmitting(true);
    const {type, obj} = reviewTarget;
    if (type === 'move') await api(`/api/admin/move-requests/${obj.id}/approve`, {method:'POST'});
    else await api(`/api/admin/lease-extensions/${obj.id}/approve`, {method:'POST'});
    setSubmitting(false);
    setReviewTarget(null);
    type === 'move' ? loadM() : loadL();
  };

  const submitReject = async () => {
    if (!rejectReason.trim()) return setRejectErr('Please provide a reason');
    setSubmitting(true);
    const {type, obj} = reviewTarget;
    let res;
    if (type === 'move') res = await api(`/api/admin/move-requests/${obj.id}/reject`, {method:'POST', body:JSON.stringify({reason:rejectReason})});
    else res = await api(`/api/admin/lease-extensions/${obj.id}/reject`, {method:'POST', body:JSON.stringify({reason:rejectReason})});
    setSubmitting(false);
    if (res?.error) return setRejectErr(res.error);
    setReviewTarget(null);
    type === 'move' ? loadM() : loadL();
  };

  const verifyDoc = (did) => api(`/api/admin/move-requests/${reviewTarget.obj.id}/documents/${did}/verify`, {method:'POST'})
    .then(() => {
      setReviewTarget(t => ({...t, docs: t.docs.map(d => d.id===did ? {...d, status:'verified'} : d)}));
      loadM();
    });

  const isImage = d => d.data && (d.data.startsWith('data:image') || /\.(jpg|jpeg|png|gif|webp)$/i.test(d.file_name||''));
  const isPdf   = d => d.data && (d.data.startsWith('data:application/pdf') || /\.pdf$/i.test(d.file_name||''));
  const fmtDate = s => s ? new Date(s).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';

  const rt = reviewTarget;

  return <div>
    <div className="top-bar"><h2>Approvals</h2></div>
    <div className="tab-bar">
      <button className={`tab ${tab==='moves'?'active':''}`} onClick={()=>setTab('moves')}>
        Move Requests {moves.filter(m=>m.status==='pending').length>0 && <span className="badge badge-red" style={{marginLeft:4}}>{moves.filter(m=>m.status==='pending').length}</span>}
      </button>
      <button className={`tab ${tab==='leases'?'active':''}`} onClick={()=>setTab('leases')}>
        Lease Extensions {leases.filter(l=>l.status==='pending').length>0 && <span className="badge badge-red" style={{marginLeft:4}}>{leases.filter(l=>l.status==='pending').length}</span>}
      </button>
    </div>

    {/* ── Move Requests ── */}
    {tab==='moves' && <div className="card" style={{overflowX:'auto'}}>
      <div style={{padding:'12px 0 8px',display:'flex',gap:8,alignItems:'center'}}>
        <TblSearchBar value={moveSearch} onChange={setMoveSearch} placeholder="Search name, phone, unit, status…"/>
        {moveSearch&&<span style={{fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>{tblSortRows(tblFilter(moves,moveSearch,['name','phone','unit_number','tower_name','move_type','status']), moveSort.col, moveSort.dir).length} result{tblSortRows(tblFilter(moves,moveSearch,['name','phone','unit_number','tower_name','move_type','status']), moveSort.col, moveSort.dir).length!==1?'s':''}</span>}
      </div>
      <table className="table"><thead><tr>
        <TblSortTh col="name" label="Name" sort={moveSort} setSort={setMoveSort}/>
        <TblSortTh col="unit_number" label="Apartment" sort={moveSort} setSort={setMoveSort}/>
        <TblSortTh col="move_type" label="Type" sort={moveSort} setSort={setMoveSort}/>
        <TblSortTh col="tentative_start" label="Dates" sort={moveSort} setSort={setMoveSort}/>
        <TblSortTh col="status" label="Status" sort={moveSort} setSort={setMoveSort}/>
        <th>Actions</th>
      </tr></thead><tbody>
        {tblSortRows(tblFilter(moves,moveSearch,['name','phone','unit_number','tower_name','move_type','status']), moveSort.col, moveSort.dir).map(m=><tr key={m.id}>
          <td>{m.name}<br/><span style={{fontSize:11,color:'var(--text2)'}}>{m.phone}</span></td>
          <td>{m.unit_number} · {m.tower_name}</td>
          <td><span className={`badge badge-${m.move_type==='move_in'?'green':'red'}`}>{m.move_type?.replace('_',' ')}</span></td>
          <td style={{fontSize:12}}>{fmtDate(m.tentative_start)}<br/>→ {fmtDate(m.tentative_end)}</td>
          <td>
            <span className={`badge badge-${m.status==='approved'?'green':m.status==='pending'?'orange':'red'}`}>{m.status}</span>
            {m.status==='rejected'&&m.rejection_reason&&<div style={{fontSize:11,color:'var(--text2)',marginTop:3,maxWidth:140}}>↳ {m.rejection_reason}</div>}
          </td>
          <td>
            {m.status==='pending'
              ? <button className="btn btn-sm btn-primary" onClick={()=>openReview('move',m)}>Review →</button>
              : <button className="btn btn-sm" style={{background:'var(--card2)',border:'1px solid var(--border)',color:'var(--text2)'}} onClick={()=>openReview('move',m)}>View Docs</button>}
          </td>
        </tr>)}
        {!tblFilter(moves,moveSearch,['name','phone','unit_number','tower_name','move_type','status']).length&&<tr><td colSpan={6} style={{textAlign:'center',color:'var(--text2)',padding:32}}>{moveSearch?'No requests match your search':'No move requests'}</td></tr>}
      </tbody></table>
    </div>}

    {/* ── Lease Extensions ── */}
    {tab==='leases' && <div className="card" style={{overflowX:'auto'}}>
      <div style={{padding:'12px 0 8px',display:'flex',gap:8,alignItems:'center'}}>
        <TblSearchBar value={leaseSearch} onChange={setLeaseSearch} placeholder="Search name, phone, unit, status…"/>
        {leaseSearch&&<span style={{fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>{tblFilter(leases,leaseSearch,['name','phone','unit_number','tower_name','status']).length} results</span>}
      </div>
      <table className="table"><thead><tr>
        <TblSortTh col="name" label="Name" sort={leaseSort} setSort={setLeaseSort}/>
        <TblSortTh col="unit_number" label="Apartment" sort={leaseSort} setSort={setLeaseSort}/>
        <TblSortTh col="phone" label="Phone" sort={leaseSort} setSort={setLeaseSort}/>
        <TblSortTh col="current_end" label="Current End" sort={leaseSort} setSort={setLeaseSort}/>
        <TblSortTh col="requested_end" label="Requested End" sort={leaseSort} setSort={setLeaseSort}/>
        <th>Notes</th>
        <TblSortTh col="status" label="Status" sort={leaseSort} setSort={setLeaseSort}/>
        <th>Actions</th>
      </tr></thead><tbody>
        {tblSortRows(tblFilter(leases,leaseSearch,['name','phone','unit_number','tower_name','status']), leaseSort.col, leaseSort.dir).map(l=><tr key={l.id}>
          <td>{l.name}</td>
          <td>{l.unit_number} · {l.tower_name}</td>
          <td style={{fontSize:12}}>{l.phone}</td>
          <td style={{fontSize:12}}>{fmtDate(l.current_end)}</td>
          <td style={{fontSize:12,fontWeight:600,color:'var(--accent)'}}>{fmtDate(l.requested_end)}</td>
          <td style={{fontSize:12,color:'var(--text2)',maxWidth:140}}>{l.notes||'—'}</td>
          <td><span className={`badge badge-${l.status==='approved'?'green':l.status==='pending'?'orange':'red'}`}>{l.status}</span></td>
          <td>
            {l.status==='pending'
              ? <button className="btn btn-sm btn-primary" onClick={()=>openReview('lease',l)}>Review →</button>
              : <button className="btn btn-sm" style={{background:'var(--card2)',border:'1px solid var(--border)',color:'var(--text2)'}} onClick={()=>openReview('lease',l)}>View Docs</button>}
          </td>
        </tr>)}
        {!tblFilter(leases,leaseSearch,['name','phone','unit_number','tower_name','status']).length&&<tr><td colSpan={8} style={{textAlign:'center',color:'var(--text2)',padding:32}}>{leaseSearch?'No extensions match your search':'No lease extensions'}</td></tr>}
      </tbody></table>
    </div>}

    {/* ── Review Modal ── */}
    {rt && <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}}>
      <div style={{background:'var(--card)',borderRadius:20,width:'100%',maxWidth:600,maxHeight:'90vh',display:'flex',flexDirection:'column',border:'1px solid var(--border)'}}>

        {/* Header */}
        <div style={{padding:'20px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <h3 style={{fontSize:18,marginBottom:4}}>
              {rt.type==='move' ? (rt.obj.move_type==='move_in'?'📦 Move In':'🚚 Move Out') : '📋 Lease Extension'} Review
            </h3>
            <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>
              <strong style={{color:'var(--text)'}}>{rt.obj.name}</strong>{' · '}{rt.obj.phone}<br/>
              {rt.obj.unit_number}, {rt.obj.tower_name}
              {rt.type==='move' && <>{' · '}{fmtDate(rt.obj.tentative_start)} → {fmtDate(rt.obj.tentative_end)}</>}
              {rt.type==='lease' && <>{' · '}Extended to <strong style={{color:'var(--accent)'}}>{fmtDate(rt.obj.requested_end)}</strong></>}
            </div>
          </div>
          <button onClick={()=>setReviewTarget(null)} style={{background:'none',border:'none',color:'var(--text2)',fontSize:22,cursor:'pointer',lineHeight:1,padding:0,flexShrink:0}}>×</button>
        </div>

        {/* Body */}
        <div style={{overflowY:'auto',flex:1,padding:'20px 24px'}}>
          {stage==='docs' && <>
            {/* Requirements checklist */}
            {rt.reqs && rt.reqs.length > 0 && <div style={{marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--text2)',letterSpacing:0.5,textTransform:'uppercase',marginBottom:8}}>Required Documents</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {rt.reqs.map(req => {
                  const submitted = rt.docs.find(d => d.doc_type === req.doc_type);
                  const verified  = submitted?.status === 'verified';
                  return <div key={req.id} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',borderRadius:20,fontSize:12,fontWeight:600,
                    background: verified ? 'rgba(63,185,80,0.15)' : submitted ? 'rgba(210,153,34,0.15)' : 'rgba(248,81,73,0.1)',
                    border: `1px solid ${verified ? 'var(--green)' : submitted ? 'var(--orange)' : 'var(--red)'}`,
                    color: verified ? 'var(--green)' : submitted ? 'var(--orange)' : 'var(--red)'}}>
                    {verified ? '✓' : submitted ? '⏳' : '✗'}
                    {' '}{req.doc_type.replace(/_/g,' ')}
                    {req.is_mandatory ? '' : ' (optional)'}
                  </div>;
                })}
              </div>
            </div>}

            <div style={{fontSize:13,fontWeight:700,color:'var(--text2)',letterSpacing:0.5,textTransform:'uppercase',marginBottom:12}}>
              Submitted Documents
              {!docsLoading && <span style={{fontWeight:400,textTransform:'none',letterSpacing:0}}> ({rt.docs.length} file{rt.docs.length!==1?'s':''})</span>}
            </div>

            {docsLoading && <div style={{padding:'40px 0',textAlign:'center',color:'var(--text2)'}}>Loading…</div>}

            {!docsLoading && rt.type==='lease' && rt.reqs.length === 0 && rt.docs.length === 0 && <div style={{padding:'24px 0',textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:8}}>📋</div>
              <div style={{color:'var(--text2)',fontSize:13}}>No document requirements configured for lease extensions.</div>
              <div style={{color:'var(--text2)',fontSize:12,marginTop:4}}>Add requirements in <strong>Doc Requirements → Lease Extensions</strong>.</div>
            </div>}

            {!docsLoading && rt.docs.length === 0 && (rt.type === 'move' || rt.reqs.length > 0) && rt.type !== 'lease' && <div style={{padding:'32px 0',textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:8}}>📭</div>
              <div style={{color:'var(--text2)',fontSize:13}}>No documents submitted with this request.</div>
            </div>}

            {!docsLoading && rt.docs.length === 0 && rt.type === 'lease' && rt.reqs.length > 0 && <div style={{padding:'24px 0',textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:8}}>📭</div>
              <div style={{color:'var(--text2)',fontSize:13}}>No documents uploaded yet by the resident.</div>
            </div>}

            {!docsLoading && rt.docs.map(doc=><div key={doc.id} style={{background:'var(--card2)',borderRadius:14,padding:16,marginBottom:12,border:`1px solid ${doc.status==='verified'?'var(--green)':'var(--border)'}`}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>{doc.doc_type?.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</div>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{doc.file_name}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span className={`badge badge-${doc.status==='verified'?'green':'orange'}`}>{doc.status}</span>
                  {doc.status!=='verified' && rt.obj.status==='pending' &&
                    <button className="btn btn-sm btn-green" onClick={()=>verifyDoc(doc.id)}>✓ Verify</button>}
                </div>
              </div>
              {isImage(doc) && <div style={{borderRadius:10,overflow:'hidden',cursor:'zoom-in',marginBottom:4}} onClick={()=>setLightbox(doc.data)}>
                <img src={doc.data} style={{width:'100%',maxHeight:220,objectFit:'cover',display:'block'}}/>
                <div style={{fontSize:11,color:'var(--text2)',padding:'4px 0',textAlign:'center'}}>Click to enlarge</div>
              </div>}
              {isPdf(doc) && <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'var(--card)',borderRadius:10}}>
                <span style={{fontSize:24}}>📄</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>PDF</div><div style={{fontSize:11,color:'var(--text2)'}}>{doc.file_name}</div></div>
                <a href={doc.data} download={doc.file_name} style={{padding:'6px 12px',borderRadius:8,background:'var(--accent)',color:'white',fontSize:12,fontWeight:700,textDecoration:'none'}}>⬇ Download</a>
              </div>}
            </div>)}

            {/* Lease details card */}
            {rt.type==='lease' && <div style={{background:'var(--card2)',borderRadius:14,padding:20,display:'flex',flexDirection:'column',gap:10,marginTop:rt.docs.length?12:0}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:4}}>Request Details</div>
              {[['Resident', rt.obj.name],['Phone', rt.obj.phone],['Apartment', `${rt.obj.unit_number}, ${rt.obj.tower_name}`],
                ['Current Lease End', fmtDate(rt.obj.current_end)],['Requested Extension To', fmtDate(rt.obj.requested_end)],
                ['Notes', rt.obj.notes||'—']].map(([l,v])=>
                <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
                  <span style={{fontSize:12,color:'var(--text2)',fontWeight:600,flexShrink:0}}>{l}</span>
                  <span style={{fontSize:13,color:'var(--text)',textAlign:'right'}}>{v}</span>
                </div>)}
            </div>}
          </>}

          {stage==='reject' && <>
            <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>
              Rejecting request from <strong style={{color:'var(--text)'}}>{rt.obj.name}</strong>. This reason will be shown to them in the app.
            </p>
            <label className="label">Reason for rejection *</label>
            <textarea className="input" rows={4} value={rejectReason} onChange={e=>setRejectReason(e.target.value)}
              placeholder={rt.type==='move' ? 'e.g. Missing NOC document — please resubmit.' : 'e.g. Lease extension not approved by management.'}
              style={{resize:'vertical',width:'100%',marginBottom:8}}/>
            {rejectErr && <p style={{color:'var(--red)',fontSize:13}}>{rejectErr}</p>}
          </>}
        </div>

        {/* Footer */}
        {rt.obj.status==='pending' && <div style={{padding:'16px 24px',borderTop:'1px solid var(--border)',flexShrink:0}}>
          {stage==='docs' && <div style={{display:'flex',gap:10}}>
            <button className="btn btn-green" style={{flex:2}} onClick={approve} disabled={submitting}>
              {submitting ? 'Approving…' : '✓ Approve'}
            </button>
            <button className="btn" style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',color:'var(--red)',fontWeight:700}} onClick={()=>setStage('reject')}>
              ✕ Reject
            </button>
          </div>}
          {stage==='reject' && <div style={{display:'flex',gap:10}}>
            <button className="btn" style={{flex:1,background:'var(--red)',color:'white',fontWeight:700,border:'none'}} onClick={submitReject} disabled={submitting}>
              {submitting ? 'Rejecting…' : 'Confirm Reject'}
            </button>
            <button className="btn" style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',color:'var(--text)'}} onClick={()=>setStage('docs')}>
              ← Back
            </button>
          </div>}
        </div>}
      </div>
    </div>}

    {/* Lightbox */}
    {lightbox && <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.95)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:20}} onClick={()=>setLightbox(null)}>
      <img src={lightbox} style={{maxWidth:'100%',maxHeight:'90vh',borderRadius:12,objectFit:'contain'}}/>
      <button style={{position:'absolute',top:20,right:20,background:'rgba(255,255,255,0.1)',border:'none',color:'white',fontSize:28,width:44,height:44,borderRadius:'50%',cursor:'pointer'}} onClick={()=>setLightbox(null)}>×</button>
    </div>}
  </div>;
}

function DailyHelp() {

  const [search, setSearch] = useState('');
  const [sort, setSort] = useState({col:'name', dir:'asc'});
  const load=()=>api('/api/admin/daily-help').then(setHelp);
  useEffect(()=>{load();},[]);
  const add=d=>{api('/api/admin/daily-help',{method:'POST',body:JSON.stringify(d)}).then(()=>{load();setModal(false);});};
  const displayed = tblSortRows(tblFilter(help, search, ['name','phone','help_type','status']), sort.col, sort.dir);
  return <div><div className="top-bar"><h2>Daily Help</h2>
    <div style={{display:'flex',gap:8,alignItems:'center'}}>
      <TblSearchBar value={search} onChange={setSearch} placeholder="Search name, phone, type…"/>
      <button className="btn btn-primary" onClick={()=>setModal(true)}>+ Add</button>
    </div>
  </div>
    <div className="card" style={{overflowX:'auto'}}><table className="table"><thead><tr>
      <TblSortTh col="name" label="Name" sort={sort} setSort={setSort}/>
      <TblSortTh col="phone" label="Phone" sort={sort} setSort={setSort}/>
      <TblSortTh col="help_type" label="Type" sort={sort} setSort={setSort}/>
      <th>ID Code</th><th>QR Code</th>
      <TblSortTh col="status" label="Status" sort={sort} setSort={setSort}/>
      <th>Assignments</th><th>Actions</th>
    </tr></thead><tbody>
      {displayed.map(h=><tr key={h.id}><td>{h.name}</td><td>{h.phone}</td><td>{h.help_type}</td><td style={{fontFamily:'Space Mono',fontSize:12}}>{h.id_code}</td><td style={{fontFamily:'Space Mono',fontSize:12}}>{h.qr_code}</td>
        <td><span className={`badge badge-${h.status==='approved'?'green':h.status==='pending'?'orange':'red'}`}>{h.status}</span></td>
        <td>{h.assignments?.map(a=><div key={a.id} style={{fontSize:11}}>{a.unit_number} ({a.days_of_week}) {a.time_slot}</div>)}</td>
        <td>{h.status==='pending'&&<div className="flex"><button className="btn btn-sm btn-green" onClick={()=>api(`/api/admin/daily-help/${h.id}/approve`,{method:'POST'}).then(load)}>Approve</button><button className="btn btn-sm btn-red" onClick={()=>api(`/api/admin/daily-help/${h.id}/reject`,{method:'POST'}).then(load)}>Reject</button></div>}</td></tr>)}
      {!displayed.length&&<tr><td colSpan={8} style={{textAlign:'center',color:'var(--text2)',padding:32}}>{search?'No staff match your search':'No daily help registered'}</td></tr>}
    </tbody></table></div>
    {modal&&<Modal title="Add Daily Help" onClose={()=>setModal(false)} onSubmit={add}
      fields={[{k:'name',l:'Name'},{k:'phone',l:'Phone'},{k:'helpType',l:'Type',type:'select',opts:['maid','cook','driver','gardener','other']}]}/>}
  </div>;
}

    <div className="card"><table className="table"><thead><tr><th>Name</th><th>Apartment</th><th>Type</th><th>File</th><th>Status</th><th>Actions</th></tr></thead><tbody>

        <td>{d.status==='pending'&&<div className="flex"><button className="btn btn-sm btn-green" onClick={()=>api(`/api/admin/documents/${d.id}/verify`,{method:'POST'}).then(load)}>Verify</button><button className="btn btn-sm btn-red" onClick={()=>api(`/api/admin/documents/${d.id}/reject`,{method:'POST'}).then(load)}>Reject</button></div>}</td></tr>)}
    </tbody></table>{!docs.length&&<div className="empty">No documents</div>}</div>

}

function DocReqs() {
  const [tab, setTab] = useState('signup');

  // Signup reqs
  const [reqs, setReqs] = useState([]); const [modal, setModal] = useState(false);
  const load  = () => api('/api/admin/document-requirements').then(setReqs);
  const add   = d  => api('/api/admin/document-requirements', {method:'POST', body:JSON.stringify({...d, isMandatory:true})}).then(()=>{load(); setModal(false);});
  const del   = id => api(`/api/admin/document-requirements/${id}`, {method:'DELETE'}).then(load);

  // Move reqs
  const [moveReqs, setMoveReqs] = useState([]); const [moveModal, setMoveModal] = useState(false);
  const loadM  = () => api('/api/admin/move-doc-requirements').then(setMoveReqs);
  const addM   = d  => api('/api/admin/move-doc-requirements', {method:'POST', body:JSON.stringify({...d, isMandatory:true})}).then(()=>{loadM(); setMoveModal(false);});
  const delM   = id => api(`/api/admin/move-doc-requirements/${id}`, {method:'DELETE'}).then(loadM);

  // Lease reqs
  const [leaseReqs, setLeaseReqs] = useState([]); const [leaseModal, setLeaseModal] = useState(false);
  const loadL  = () => api('/api/admin/lease-doc-requirements').then(setLeaseReqs);
  const addL   = d  => api('/api/admin/lease-doc-requirements', {method:'POST', body:JSON.stringify({...d, isMandatory:true})}).then(()=>{loadL(); setLeaseModal(false);});
  const delL   = id => api(`/api/admin/lease-doc-requirements/${id}`, {method:'DELETE'}).then(loadL);

  useEffect(()=>{ load(); loadM(); loadL(); }, []);

  const DOC_TYPES = ['government_id','address_proof','noc','property_papers','rent_agreement','bank_statement','income_proof','photo','other'];

  const ReqTable = ({rows, onDel, emptyMsg, cols}) => <div className="card">
    <table className="table"><thead><tr>{cols.map(c=><th key={c}>{c}</th>)}<th>Mandatory</th><th>Actions</th></tr></thead><tbody>
      {rows.map(r=><tr key={r.id}>
        {cols.map(c=><td key={c}>
          {c==='Resident Type' && <span className="badge badge-blue">{r.resident_type?.replace(/_/g,' ')}</span>}
          {c==='Move Type'     && <span className={`badge badge-${r.move_type==='move_in'?'green':'red'}`}>{r.move_type?.replace('_',' ')}</span>}
          {c==='Document Type' && <span style={{textTransform:'capitalize'}}>{r.doc_type?.replace(/_/g,' ')}</span>}
        </td>)}
        <td><span className={`badge badge-${r.is_mandatory?'red':'blue'}`}>{r.is_mandatory?'Required':'Optional'}</span></td>
        <td><button className="btn btn-sm btn-red" onClick={()=>onDel(r.id)}>Remove</button></td>
      </tr>)}
    </tbody></table>
    {!rows.length && <div className="empty">{emptyMsg}</div>}
  </div>;

  return <div>
    <div className="top-bar"><h2>Document Requirements</h2>
      <button className="btn btn-primary" onClick={()=>{ if(tab==='signup') setModal(true); else if(tab==='move') setMoveModal(true); else setLeaseModal(true); }}>+ Add Requirement</button>
    </div>
    <div className="tab-bar">
      <button className={`tab ${tab==='signup'?'active':''}`} onClick={()=>setTab('signup')}>Signup / Residency</button>
      <button className={`tab ${tab==='move'?'active':''}`} onClick={()=>setTab('move')}>Move In / Out</button>
      <button className={`tab ${tab==='lease'?'active':''}`} onClick={()=>setTab('lease')}>Lease Extensions</button>
    </div>

    {tab==='signup' && <ReqTable rows={reqs} onDel={del} emptyMsg="No signup requirements configured" cols={['Resident Type','Document Type']}/>}
    {tab==='move'   && <ReqTable rows={moveReqs} onDel={delM} emptyMsg="No move requirements configured" cols={['Move Type','Document Type']}/>}
    {tab==='lease'  && <ReqTable rows={leaseReqs} onDel={delL} emptyMsg="No lease extension requirements configured" cols={['Document Type']}/>}

    {modal && <Modal title="Add Signup Requirement" onClose={()=>setModal(false)} onSubmit={add}
      fields={[{k:'residentType',l:'Resident Type',type:'select',opts:['owner','owner_family','tenant','tenant_family']},
               {k:'docType',l:'Document Type',type:'select',opts:DOC_TYPES}]}/>}
    {moveModal && <Modal title="Add Move Requirement" onClose={()=>setMoveModal(false)} onSubmit={addM}
      fields={[{k:'moveType',l:'Move Type',type:'select',opts:['move_in','move_out']},
               {k:'docType',l:'Document Type',type:'select',opts:DOC_TYPES}]}/>}
    {leaseModal && <Modal title="Add Lease Extension Requirement" onClose={()=>setLeaseModal(false)} onSubmit={addL}
      fields={[{k:'docType',l:'Document Type',type:'select',opts:DOC_TYPES}]}/>}
  </div>;
}

function Modal({title,onClose,onSubmit,fields,defaults}) {
  const [data,setData]=useState(defaults||{});
  const set=(k,v)=>setData(d=>({...d,[k]:v}));
  return <div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>{title}</h3>
    {fields.map(f=><div key={f.k} className="form-group"><label className="label">{f.l}</label>
      {f.type==='select'?<select className="input" value={data[f.k]||''} onChange={e=>set(f.k,e.target.value)}><option value="">Select</option>{f.opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
      :<input className="input" type={f.type||'text'} value={data[f.k]||''} onChange={e=>set(f.k,e.target.value)}/>}</div>)}
    <div className="flex" style={{gap:8,marginTop:16}}><button className="btn btn-primary" style={{flex:1}} onClick={()=>onSubmit(data)}>Submit</button><button className="btn" style={{flex:1,background:'var(--bg)'}} onClick={onClose}>Cancel</button></div>
  </div></div>;
}

function Societies({token}) {

  const [staff, setStaff] = useState([]);

  const load = () => api('/api/superadmin/societies').then(d=>{ if(Array.isArray(d)) setSocieties(d); });
  useEffect(()=>{ load(); }, []);

  const loadStaff = (sid) => api('/api/superadmin/societies/'+sid+'/staff').then(d=>{ if(Array.isArray(d)) setStaff(d); });

  const selectSociety = (s) => { setSelected(s); loadStaff(s.id); setView('detail'); };

  const createSociety = () => {
    api('/api/superadmin/societies', {method:'POST', body:JSON.stringify(form)}).then(d=>{
      if(d.success){ setMsg('Society created!'); setForm({}); setView('list'); load(); }
      else setMsg(d.error||'Failed');
    });

  const deleteSociety = (sid) => {
    if(!confirm('Delete this society and all its towers/apartments? This cannot be undone.')) return;

      if(d.success){ setMsg('Deleted.'); setView('list'); load(); }

  const addTower = () => {
    api('/api/superadmin/societies/'+selected.id+'/towers', {method:'POST', body:JSON.stringify(form)}).then(d=>{
      if(d.success){ setMsg(`Tower added! ${d.apartmentsCreated} apartments created.`); setForm({}); setView('detail'); api('/api/superadmin/societies').then(r=>{ const s=r.find(x=>x.id===selected.id); if(s){setSelected(s);} }); }

  const deleteTower = (tid) => {

    api('/api/superadmin/societies/'+selected.id+'/staff', {method:'POST', body:JSON.stringify(form)}).then(d=>{

    label:{fontSize:12,color:'#8888a0',marginBottom:4,display:'block'} };

  if(view==='newSociety') return <div style={{padding:24,maxWidth:520}}>

    {['name','address','city','state','pincode'].map(k=><div key={k}>
      <label style={style.label}>{k.charAt(0).toUpperCase()+k.slice(1)}{k==='name'&&' *'}</label>
      <input style={style.input} value={form[k]||''} onChange={e=>s(k,e.target.value)} placeholder={k==='name'?'e.g. Green Valley':''} />

    {msg&&<div style={{color:'#a8e6cf',marginBottom:12,fontSize:13}}>{msg}</div>}
    <button onClick={createSociety} style={{...style.btn,background:'#6c5ce7',color:'white',width:'100%',padding:12}}>Create Society</button>

  if(view==='newTower') return <div style={{padding:24,maxWidth:520}}>
    <button onClick={()=>setView('detail')} style={{...style.btn,background:'none',color:'#8888a0',marginBottom:16}}>← Back</button>
    <h2 style={{marginBottom:4}}>Add Tower</h2>
    <p style={{color:'#8888a0',fontSize:13,marginBottom:20}}>to {selected?.name}</p>
    {[['name','Tower Name','e.g. Tower A'],['floors','Number of Floors','e.g. 12'],['aptsPerFloor','Apartments per Floor','e.g. 4']].map(([k,l,p])=><div key={k}>
      <label style={style.label}>{l}</label>
      <input style={style.input} value={form[k]||''} onChange={e=>s(k,e.target.value)} placeholder={p} type={k!=='name'?'number':'text'} />

    <button onClick={addTower} style={{...style.btn,background:'#6c5ce7',color:'white',width:'100%',padding:12}}>Add Tower & Generate Apartments</button>

  if(view==='newStaff') return <div style={{padding:24,maxWidth:520}}>

    <input style={style.input} value={form.phone||''} onChange={e=>s('phone',e.target.value)} placeholder="10-digit phone (login credential)" />

      <option value="guard">Guard</option>

    {msg&&<div style={{color:'#a8e6cf',marginBottom:12,fontSize:13}}>{msg}</div>}
    <button onClick={assignStaff} style={{...style.btn,background:'#6c5ce7',color:'white',width:'100%',padding:12}}>Assign Staff Member</button>
  </div>;

  if(view==='detail' && selected) return <div style={{padding:24}}>
    <button onClick={()=>setView('list')} style={{...style.btn,background:'none',color:'#8888a0',marginBottom:16}}>← All Societies</button>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
      <div><h2 style={{marginBottom:4}}>{selected.name}</h2>

      <button onClick={()=>deleteSociety(selected.id)} style={{...style.btn,background:'rgba(231,76,60,.15)',color:'#e74c3c'}}>Delete Society</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:24}}>
      {[['Residents',selected.resident_count||0,'#a8e6cf'],['Admins',selected.admin_count||0,'#c9b1ff'],['Guards',selected.guard_count||0,'#ffd3a5']].map(([l,v,c])=>

    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
