function InvoicesAdmin() {
  const [tab, setTab]             = useState('invoices');
  const [invoices, setInvoices]   = useState([]);
  const [payments, setPayments]   = useState([]);
  const [modal, setModal]         = useState(false);
  const [recipients, setRecipients] = useState(null); // {invoiceId, rows}
  // Raise invoice form state
  const [form, setForm] = useState({title:'',description:'',invoiceType:'maintenance',amount:'',dueDate:'',notes:'',target:'all',residentTypes:[],apartmentIds:[],userIds:[]});
  const [preview, setPreview]         = useState(null);
  const [submitting, setSubmitting]   = useState(false);
  const [err, setErr]                 = useState('');
  const [allApartments, setAllApartments] = useState([]);
  const [allResidents, setAllResidents]   = useState([]);
  const [residentSearch, setResidentSearch] = useState('');

  const TYPES = ['maintenance','repair','utility','amenity','event','other'];
  const RES_TYPES = ['owner','owner_family','tenant','tenant_family'];
  const TYPE_ICONS = {maintenance:'🔧',repair:'🛠',utility:'💡',amenity:'🏊',event:'🎉',other:'📄'};

  const [invoiceFilter, setInvoiceFilter] = useState('all');
  const [invoiceSearch, setInvoiceSearch] = useState('');


  const loadInvoices = () => api('/api/admin/invoices').then(setInvoices);
  const loadPayments = () => api('/api/admin/payments').then(setPayments);
  useEffect(()=>{ loadInvoices(); loadPayments(); },[]);

  const fmtAmt  = a => `₹${Number(a).toLocaleString('en-IN')}`;
  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';

  const openModal = () => {
    setForm({title:'',description:'',invoiceType:'maintenance',amount:'',dueDate:'',notes:'',target:'all',residentTypes:[],apartmentIds:[],userIds:[]});
    setPreview(null); setErr(''); setResidentSearch(''); setModal(true);
    // Load apartments + residents for pickers
    api('/api/admin/apartments').then(d => setAllApartments(Array.isArray(d)?d:[]));
    api('/api/admin/residents?status=approved').then(d => setAllResidents(Array.isArray(d)?d:[]));
  };

  const fetchPreview = async () => {
    const res = await api('/api/admin/invoices/preview-recipients', {method:'POST', body: JSON.stringify({
      target: form.target, residentTypes: form.residentTypes,
      apartmentIds: form.apartmentIds, userIds: form.userIds,
    })});
    setPreview(Array.isArray(res) ? res : []);
  };
  React.useEffect(()=>{
    if(modal) fetchPreview();
  },[form.target, form.residentTypes.join(','), form.apartmentIds.join(','), form.userIds.join(','), modal]);

  const toggleResType = t => setForm(f => ({...f, residentTypes: f.residentTypes.includes(t) ? f.residentTypes.filter(x=>x!==t) : [...f.residentTypes, t]}));
  const toggleApt    = id => setForm(f => ({...f, apartmentIds: f.apartmentIds.includes(id) ? f.apartmentIds.filter(x=>x!==id) : [...f.apartmentIds, id]}));
  const toggleUser   = id => setForm(f => ({...f, userIds: f.userIds.includes(id) ? f.userIds.filter(x=>x!==id) : [...f.userIds, id]}));

  const submit = async () => {
    if(!form.title.trim()) return setErr('Title is required');
    if(!form.amount || isNaN(form.amount)) return setErr('Valid amount is required');
    if(form.target==='type' && !form.residentTypes.length) return setErr('Select at least one resident type');
    if(form.target==='apartment' && !form.apartmentIds.length) return setErr('Select at least one apartment');
    if(form.target==='specific' && !form.userIds.length) return setErr('Select at least one resident');
    setSubmitting(true); setErr('');
    const res = await api('/api/admin/invoices', {method:'POST', body: JSON.stringify(form)});
    setSubmitting(false);
    if(res.error) return setErr(res.error);
    setModal(false); loadInvoices();
  };

  const cancel = async (id) => {
    if(!confirm('Cancel this invoice? Recipients will no longer be able to pay it.')) return;
    const res = await api(`/api/admin/invoices/${id}`, {method:'DELETE'});
    if(res.error) alert(res.error); else loadInvoices();
  };

  const viewRecipients = async (inv) => {
    const rows = await api(`/api/admin/invoices/${inv.id}/recipients`);
    setRecipients({invoice: inv, rows: Array.isArray(rows)?rows:[]});
  };

  return <div>
    <div className="top-bar"><h2>💳 Invoices & Payments</h2>
      <button className="btn btn-primary" onClick={openModal}>+ Raise Invoice</button>
    </div>

    <div className="tab-bar">
      <button className={`tab ${tab==='invoices'?'active':''}`} onClick={()=>setTab('invoices')}>Invoices</button>
      <button className={`tab ${tab==='payments'?'active':''}`} onClick={()=>setTab('payments')}>Payment Log</button>
    </div>

    {/* ── Invoices tab ── */}
    {tab==='invoices' && <>
      {/* Search + Status filter pills */}
      <TblSearchBar value={invoiceSearch} onChange={setInvoiceSearch} placeholder="Search title, type, resident, unit…" style={{marginBottom:8}}/>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {[['all','All'],['unpaid','Unpaid'],['paid','Paid'],['cancelled','Cancelled']].map(([k,l])=>{
          const count = k==='all' ? invoices.length : invoices.filter(inv=>{
            if(k==='paid') return inv.status==='paid' || (inv.recipient_count>0 && inv.paid_count>=inv.recipient_count);
            if(k==='unpaid') return inv.status==='unpaid' && !(inv.recipient_count>0 && inv.paid_count>=inv.recipient_count);
            return inv.status===k;
          }).length;
          return <button key={k} onClick={()=>setInvoiceFilter(k)} style={{
            padding:'5px 14px',borderRadius:20,border:'1px solid var(--border)',fontFamily:'inherit',cursor:'pointer',fontSize:12,fontWeight:600,
            background:invoiceFilter===k?'var(--accent)':'none',color:invoiceFilter===k?'white':'var(--text2)',
          }}>{l} <span style={{opacity:0.7}}>({count})</span></button>;
        })}
      </div>
      {(() => {
        const visibleInvoices = tblFilter(invoices, invoiceSearch, ['title','description','invoice_type','resident_name','unit_number']).filter(inv => {
          if(invoiceFilter==='all') return true;
          const paidAll = inv.recipient_count>0 ? inv.paid_count>=inv.recipient_count : inv.status==='paid';
          if(invoiceFilter==='paid') return paidAll;
          if(invoiceFilter==='unpaid') return inv.status==='unpaid' && !paidAll;
          return inv.status===invoiceFilter;
        });
        return <>
          {!visibleInvoices.length && <div className="card"><div className="empty">No {invoiceFilter==='all'?'':invoiceFilter} invoices</div></div>}
          {visibleInvoices.map(inv => {
        const isBulk = inv.recipient_count > 0;
        const paidAll = isBulk ? inv.paid_count >= inv.recipient_count : inv.status==='paid';
        const partPaid = isBulk && inv.paid_count > 0 && inv.paid_count < inv.recipient_count;
        return <div key={inv.id} className="card" style={{marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <span style={{fontSize:18}}>{TYPE_ICONS[inv.invoice_type]||'📄'}</span>
                <span style={{fontWeight:700,fontSize:15}}>{inv.title}</span>
                <span className={`badge badge-${inv.invoice_type==='maintenance'?'blue':inv.invoice_type==='repair'?'orange':'green'}`} style={{fontSize:10}}>
                  {inv.invoice_type}
                </span>
              </div>
              {inv.description && <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>{inv.description}</div>}
              <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                <span style={{fontSize:11,color:'var(--text2)'}}>Raised {fmtDate(inv.created_at)}</span>
                {inv.due_date && <span style={{fontSize:11,color:'var(--text2)'}}>Due {fmtDate(inv.due_date)}</span>}
              </div>
            </div>
            <div style={{textAlign:'right',marginLeft:12}}>
              <div style={{fontSize:18,fontWeight:800,fontFamily:'Space Mono'}}>{fmtAmt(inv.amount)}</div>
              <span className={`badge badge-${paidAll?'green':partPaid?'orange':inv.status==='cancelled'?'red':'orange'}`}>
                {inv.status==='cancelled'?'Cancelled':paidAll?'Paid':partPaid?`${inv.paid_count}/${inv.recipient_count} paid`:'Unpaid'}
              </span>
            </div>
          </div>

          <div style={{display:'flex',gap:8,flexWrap:'wrap',paddingTop:10,borderTop:'1px solid var(--border)'}}>
            {isBulk
              ? <button className="btn btn-sm" onClick={()=>viewRecipients(inv)} style={{fontSize:12}}>
                  👥 {inv.recipient_count} recipient{inv.recipient_count!==1?'s':''}
                </button>
              : inv.resident_name && <span style={{fontSize:12,color:'var(--text2)'}}>{inv.resident_name} · {inv.unit_number}</span>}
            {inv.status==='unpaid' && !(inv.recipient_count>0 && inv.paid_count>=inv.recipient_count) &&
              <button className="btn btn-sm btn-red" onClick={()=>cancel(inv.id)}>Cancel</button>}
          </div>
        </div>;
      })}
        </>;
      })()}
    </>}

    {/* ── Payments tab ── */}
    {tab==='payments' && <div className="card" style={{overflowX:'auto'}}>
      {(() => {
      
        const [pSearch, setPSearch] = React.useState('');
        const [pSort, setPSort] = React.useState({col:'created_at', dir:'desc'});
        const shown = tblSortRows(tblFilter(payments, pSearch, ['resident_name','phone','unit_number','tower_name','title']), pSort.col, pSort.dir);
        return <>
          <div style={{padding:'12px 0 8px',display:'flex',gap:8,alignItems:'center'}}>
            <TblSearchBar value={pSearch} onChange={setPSearch} placeholder="Search resident, unit, invoice…"/>
            {pSearch&&<span style={{fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>{shown.length} result{shown.length!==1?'s':''}</span>}
          </div>
          <table className="table"><thead><tr>
            <TblSortTh col="resident_name" label="Resident" sort={pSort} setSort={setPSort}/>
            <TblSortTh col="unit_number" label="Apartment" sort={pSort} setSort={setPSort}/>
            <TblSortTh col="title" label="Invoice" sort={pSort} setSort={setPSort}/>
            <TblSortTh col="amount" label="Amount" sort={pSort} setSort={setPSort}/>
            <th>Txn ID</th>
            <TblSortTh col="created_at" label="Date" sort={pSort} setSort={setPSort}/>
          </tr></thead>
            <tbody>
              {shown.map(p=><tr key={p.id}>
                <td>{p.resident_name}<br/><span style={{fontSize:11,color:'var(--text2)'}}>{p.phone}</span></td>
                <td>{p.unit_number} · {p.tower_name}</td>
                <td><span style={{fontSize:12}}>{TYPE_ICONS[p.invoice_type]||'📄'}</span> {p.title}</td>
                <td style={{fontFamily:'Space Mono',fontWeight:700}}>{fmtAmt(p.amount)}</td>
                <td style={{fontFamily:'Space Mono',fontSize:11,color:'var(--text2)'}}>{p.transaction_id}</td>
                <td style={{fontSize:12}}>{fmtDate(p.created_at)}</td>
              </tr>)}
              {!shown.length&&<tr><td colSpan={6} style={{textAlign:'center',color:'var(--text2)',padding:32}}>{pSearch?'No payments match your search':'No payments yet'}</td></tr>}
            </tbody>
          </table>
        </>;
      })()}
    </div>}

    {/* ── Recipients modal ── */}
    {recipients && <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
      <div style={{background:'var(--card)',borderRadius:16,padding:24,width:'100%',maxWidth:560,maxHeight:'85vh',overflowY:'auto',border:'1px solid var(--border)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <h3 style={{margin:'0 0 4px'}}>{recipients.invoice.title}</h3>
            <span style={{fontSize:12,color:'var(--text2)'}}>{fmtAmt(recipients.invoice.amount)} · {recipients.rows.length} recipients</span>
          </div>
          <button onClick={()=>setRecipients(null)} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:22}}>×</button>
        </div>
        <table className="table"><thead><tr><th>Name</th><th>Apartment</th><th>Type</th><th>Status</th></tr></thead>
          <tbody>{recipients.rows.map(r=><tr key={r.id}>
            <td>{r.name}<br/><span style={{fontSize:11,color:'var(--text2)'}}>{r.phone}</span></td>
            <td>{r.unit_number} · {r.tower_name}</td>
            <td><span style={{fontSize:11}}>{r.resident_type?.replace(/_/g,' ')}</span></td>
            <td><span className={`badge badge-${r.status==='paid'?'green':'orange'}`}>{r.status}</span></td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>}

    {/* ── Raise Invoice modal ── */}
    {modal && <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20,overflowY:'auto'}}>
      <div style={{background:'var(--card)',borderRadius:16,padding:28,width:'100%',maxWidth:560,border:'1px solid var(--border)',maxHeight:'95vh',overflowY:'auto'}}>
        <h3 style={{marginBottom:20}}>Raise Invoice</h3>

        {/* Type + title row */}
        <div style={{display:'grid',gridTemplateColumns:'140px 1fr',gap:12,marginBottom:12}}>
          <div>
            <label style={{fontSize:12,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:4}}>Category</label>
            <select className="input" value={form.invoiceType} onChange={e=>setForm(f=>({...f,invoiceType:e.target.value}))}>
              {TYPES.map(t=><option key={t} value={t}>{TYPE_ICONS[t]} {t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:12,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:4}}>Title *</label>
            <input className="input" placeholder="e.g. Monthly Maintenance – March 2026" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          <div>
            <label style={{fontSize:12,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:4}}>Amount (₹) *</label>
            <input className="input" type="number" placeholder="2500" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/>
          </div>
          <div>
            <label style={{fontSize:12,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:4}}>Due Date</label>
            <input className="input" type="date" value={form.dueDate} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))}/>
          </div>
        </div>

        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:4}}>Description / Notes</label>
          <textarea className="input" rows={2} placeholder="Optional additional details" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} style={{resize:'vertical',width:'100%'}}/>
        </div>

        {/* Recipients section */}
        <div style={{background:'var(--card2)',borderRadius:12,padding:16,marginBottom:16}}>
          <label style={{fontSize:12,color:'var(--text2)',fontWeight:700,display:'block',marginBottom:10,letterSpacing:0.5,textTransform:'uppercase'}}>Send To</label>

          {/* Target selector */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
            {[['all','🏘 All Residents'],['type','🏷 By Type'],['apartment','🏢 By Apartment'],['specific','👤 Specific Residents']].map(([v,l])=>
              <button key={v} onClick={()=>setForm(f=>({...f,target:v,residentTypes:[],apartmentIds:[],userIds:[]}))}
                style={{padding:'8px 12px',borderRadius:10,border:`2px solid ${form.target===v?'var(--accent)':'var(--border)'}`,
                  background:form.target===v?'rgba(108,92,231,.15)':'transparent',
                  color:form.target===v?'var(--accent)':'var(--text2)',cursor:'pointer',
                  fontFamily:'inherit',fontWeight:600,fontSize:12,textAlign:'left'}}>
                {l}
              </button>)}
          </div>

          {/* By Type — resident type chips */}
          {form.target==='type' && <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
            {RES_TYPES.map(t=>{
              const sel = form.residentTypes.includes(t);
              return <button key={t} onClick={()=>toggleResType(t)}
                style={{padding:'6px 12px',borderRadius:20,border:`1px solid ${sel?'var(--accent)':'var(--border)'}`,
                  background:sel?'rgba(108,92,231,.15)':'transparent',
                  color:sel?'var(--accent)':'var(--text2)',cursor:'pointer',fontFamily:'inherit',fontSize:12}}>
                {t.replace(/_/g,' ')}
              </button>;
            })}
          </div>}

          {/* By Apartment — scrollable apartment list */}
          {form.target==='apartment' && <div>
            <div style={{maxHeight:180,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,marginBottom:8}}>
              {allApartments.length===0 && <div style={{padding:12,fontSize:12,color:'var(--text2)'}}>Loading apartments…</div>}
              {allApartments.map(a => {
                const sel = form.apartmentIds.includes(a.id);
                return <div key={a.id} onClick={()=>toggleApt(a.id)}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',
                    background:sel?'rgba(108,92,231,.1)':'transparent'}}>
                  <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${sel?'var(--accent)':'var(--border)'}`,background:sel?'var(--accent)':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {sel && <span style={{color:'white',fontSize:10,fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{fontWeight:600,fontSize:13}}>{a.unit_number}</span>
                  <span style={{fontSize:12,color:'var(--text2)'}}>{a.tower_name} · Floor {a.floor||'—'} · {a.bedrooms||2} BHK</span>
                </div>;
              })}
            </div>
            {form.apartmentIds.length>0 && <div style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>{form.apartmentIds.length} apartment{form.apartmentIds.length!==1?'s':''} selected
              <button onClick={()=>setForm(f=>({...f,apartmentIds:[]}))} style={{marginLeft:8,background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:12}}>Clear</button>
            </div>}
          </div>}

          {/* Specific Residents — search + checklist */}
          {form.target==='specific' && <div>
            <div style={{position:'relative',marginBottom:8}}>
              <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',fontSize:13,pointerEvents:'none'}}>🔍</span>
              <input value={residentSearch} onChange={e=>setResidentSearch(e.target.value)} placeholder="Search name, phone, unit…"
                style={{width:'100%',paddingLeft:30,height:32,borderRadius:8,border:'1px solid var(--border)',background:'var(--card)',color:'var(--text)',fontSize:12,fontFamily:'inherit',boxSizing:'border-box'}}/>
            </div>
            <div style={{maxHeight:180,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,marginBottom:8}}>
              {allResidents.length===0 && <div style={{padding:12,fontSize:12,color:'var(--text2)'}}>Loading residents…</div>}
              {allResidents
                .filter(r => !residentSearch || [r.name,r.phone,r.unit_number,r.tower_name].some(v=>(v||'').toLowerCase().includes(residentSearch.toLowerCase())))
                .map(r => {
                  const sel = form.userIds.includes(r.user_id);
                  return <div key={r.user_id} onClick={()=>toggleUser(r.user_id)}
                    style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',
                      background:sel?'rgba(108,92,231,.1)':'transparent'}}>
                    <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${sel?'var(--accent)':'var(--border)'}`,background:sel?'var(--accent)':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {sel && <span style={{color:'white',fontSize:10,fontWeight:700}}>✓</span>}
                    </div>
                    <div style={{flex:1}}>
                      <span style={{fontWeight:600,fontSize:13}}>{r.name}</span>
                      <span style={{fontSize:11,color:'var(--text2)',marginLeft:8}}>{r.unit_number} · {r.tower_name}</span>
                    </div>
                    <span style={{fontSize:11,color:'var(--text2)'}}>{r.phone}</span>
                  </div>;
              })}
            </div>
            {form.userIds.length>0 && <div style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>{form.userIds.length} resident{form.userIds.length!==1?'s':''} selected
              <button onClick={()=>setForm(f=>({...f,userIds:[]}))} style={{marginLeft:8,background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:12}}>Clear</button>
            </div>}
          </div>}

          {/* Preview */}
          {preview !== null && <div style={{marginTop:12,padding:'10px 14px',background:'rgba(108,92,231,.08)',borderRadius:10,fontSize:13}}>
            {preview.length===0
              ? <span style={{color:'var(--red)'}}>⚠ No eligible residents match this selection</span>
              : <span style={{color:'var(--accent)',fontWeight:600}}>✓ Will send to {preview.length} resident{preview.length!==1?'s':''}</span>}
            {preview.length>0 && <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:4}}>
              {preview.slice(0,8).map(r=><span key={r.user_id} style={{fontSize:11,padding:'2px 8px',borderRadius:6,background:'var(--card)',border:'1px solid var(--border)'}}>{r.name} ({r.unit_number})</span>)}
              {preview.length>8 && <span style={{fontSize:11,color:'var(--text2)'}}>+{preview.length-8} more</span>}
            </div>}
          </div>}
        </div>

        {err && <p style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</p>}
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-primary" onClick={submit} disabled={submitting}>
            {submitting?'Sending…':'Raise Invoice'}
          </button>
          <button className="btn" style={{background:'var(--card2)',border:'1px solid var(--border)'}} onClick={()=>setModal(false)}>Cancel</button>
        </div>
      </div>
    </div>}
  </div>;
}

function BannersAdmin() {
  const [banners,setBanners]=useState([]);
  const [modal,setModal]=useState(null); // null | 'add' | banner object
  const [form,setForm]=useState({});
  const [err,setErr]=useState('');
  const load=()=>api('/api/admin/banners').then(setBanners);
  useEffect(()=>{load();},[]);

  const openAdd=()=>{setForm({bgColor:'#6c5ce7',isActive:true,sortOrder:0});setErr('');setModal('add');};
  const openEdit=b=>{setForm({...b,bgColor:b.bg_color,imageUrl:b.image_url,ctaText:b.cta_text,ctaUrl:b.cta_url,sortOrder:b.sort_order,isActive:!!b.is_active,expiresAt:b.expires_at||''});setErr('');setModal(b);};
  const save=()=>{
    const method=modal==='add'?'POST':'PUT';
    const url=modal==='add'?'/api/admin/banners':`/api/admin/banners/${modal.id}`;
    api(url,{method,body:JSON.stringify(form)}).then(d=>{if(d.error)return setErr(d.error);load();setModal(null);});
  };
  const del=id=>{if(confirm('Delete this banner?'))api(`/api/admin/banners/${id}`,{method:'DELETE'}).then(load);};
  const toggle=b=>api(`/api/admin/banners/${b.id}`,{method:'PUT',body:JSON.stringify({...b,bgColor:b.bg_color,imageUrl:b.image_url,ctaText:b.cta_text,ctaUrl:b.cta_url,sortOrder:b.sort_order,isActive:!b.is_active})}).then(load);

  const F=({l,k,type='text',placeholder})=><div className="form-group" style={{marginBottom:10}}>
    <label style={{fontSize:12,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:4}}>{l}</label>
    <input className="input" style={{width:'100%'}} type={type} placeholder={placeholder} value={form[k]||''} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}/>
  </div>;

  return <div>
    <div className="top-bar"><h2>📢 Society Banners</h2><button className="btn btn-primary" onClick={openAdd}>+ Add Banner</button></div>
    <p style={{fontSize:13,color:'var(--text2)',margin:'0 0 16px'}}>Banners appear at the top of every resident's home screen. Use them for announcements, events, or emergency notices.</p>

    {!banners.length && <div className="card"><div className="empty">No banners yet</div></div>}
    {banners.map(b=><div key={b.id} className="card" style={{marginBottom:12}}>
      {/* Preview */}
      <div style={{borderRadius:14,padding:'16px 18px',marginBottom:12,
          background:b.image_url?`linear-gradient(135deg,rgba(0,0,0,0.5),rgba(0,0,0,0.2)),url(${b.image_url}) center/cover`:(b.bg_color||'#6c5ce7'),
          display:'flex',alignItems:'center',gap:12,minHeight:70}}>
        <div style={{flex:1}}>
          {b.title&&<div style={{fontWeight:700,color:'white',fontSize:15}}>{b.title}</div>}
          {b.body&&<div style={{color:'rgba(255,255,255,0.8)',fontSize:12,marginTop:2}}>{b.body}</div>}
        </div>
        {b.cta_text&&<div style={{background:'rgba(255,255,255,0.2)',borderRadius:8,padding:'6px 12px',color:'white',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>{b.cta_text}</div>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <span className={`badge badge-${b.is_active?'green':'red'}`}>{b.is_active?'Active':'Inactive'}</span>
        {b.expires_at&&<span style={{fontSize:11,color:'var(--text2)'}}>Expires {b.expires_at.slice(0,10)}</span>}
        <span style={{fontSize:11,color:'var(--text2)'}}>Order: {b.sort_order}</span>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          <button className="btn btn-sm" style={{background:b.is_active?'var(--card2)':'var(--green)',color:'white',border:'none'}} onClick={()=>toggle(b)}>{b.is_active?'Deactivate':'Activate'}</button>
          <button className="btn btn-sm" style={{background:'var(--accent)',color:'white',border:'none'}} onClick={()=>openEdit(b)}>Edit</button>
          <button className="btn btn-sm btn-red" onClick={()=>del(b.id)}>Delete</button>
        </div>
      </div>
    </div>)}

    {modal&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
      <div style={{background:'var(--card)',borderRadius:16,padding:28,width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',border:'1px solid var(--border)'}}>
        <h3 style={{marginBottom:16}}>{modal==='add'?'Add Banner':'Edit Banner'}</h3>
        <F l="Title" k="title" placeholder="e.g. Annual Day – Save the Date!"/>
        <F l="Body text" k="body" placeholder="Join us on 15th March at the clubhouse"/>
        <F l="Background color" k="bgColor" type="color"/>
        <F l="Background image URL (optional)" k="imageUrl" placeholder="https://..."/>
        <F l="CTA button text" k="ctaText" placeholder="Learn More"/>
        <F l="CTA link URL" k="ctaUrl" placeholder="https://..."/>
        <F l="Sort order (lower = first)" k="sortOrder" type="number"/>
        <F l="Expires at (optional)" k="expiresAt" type="datetime-local"/>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
          <input type="checkbox" id="bannerActive" checked={!!form.isActive} onChange={e=>setForm(f=>({...f,isActive:e.target.checked}))}/>
          <label htmlFor="bannerActive" style={{fontSize:13}}>Active (visible to residents)</label>
        </div>
        {err&&<p style={{color:'var(--red)',fontSize:13,marginBottom:10}}>{err}</p>}
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-primary" onClick={save}>Save Banner</button>
          <button className="btn" style={{background:'var(--card2)',border:'1px solid var(--border)'}} onClick={()=>setModal(null)}>Cancel</button>
        </div>
      </div>
    </div>}
  </div>;
}

// ─── Ads Admin ────────────────────────────────────────────────────────────────
function AdsAdmin() {
  const [ads,setAds]=useState([]);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [err,setErr]=useState('');
  const load=()=>api('/api/admin/ads').then(setAds);
  useEffect(()=>{load();},[]);

  const openAdd=()=>{setForm({bgColor:'#1a1a2e',isActive:true,sortOrder:0});setErr('');setModal('add');};
  const openEdit=a=>{setForm({...a,bgColor:a.bg_color,imageUrl:a.image_url,ctaText:a.cta_text,ctaUrl:a.cta_url,sortOrder:a.sort_order,isActive:!!a.is_active,expiresAt:a.expires_at||''});setErr('');setModal(a);};
  const save=()=>{
    if(!form.headline) return setErr('Headline is required');
    const method=modal==='add'?'POST':'PUT';
    const url=modal==='add'?'/api/admin/ads':`/api/admin/ads/${modal.id}`;
    api(url,{method,body:JSON.stringify(form)}).then(d=>{if(d.error)return setErr(d.error);load();setModal(null);});
  };
  const del=id=>{if(confirm('Delete this ad?'))api(`/api/admin/ads/${id}`,{method:'DELETE'}).then(load);};
  const toggle=a=>api(`/api/admin/ads/${a.id}`,{method:'PUT',body:JSON.stringify({...a,bgColor:a.bg_color,imageUrl:a.image_url,ctaText:a.cta_text,ctaUrl:a.cta_url,sortOrder:a.sort_order,isActive:!a.is_active})}).then(load);

  const F=({l,k,type='text',placeholder})=><div className="form-group" style={{marginBottom:10}}>
    <label style={{fontSize:12,color:'var(--text2)',fontWeight:600,display:'block',marginBottom:4}}>{l}</label>
    <input className="input" style={{width:'100%'}} type={type} placeholder={placeholder} value={form[k]||''} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}/>
  </div>;

  return <div>
    <div className="top-bar"><h2>🏷 Advertisements</h2><button className="btn btn-primary" onClick={openAdd}>+ Add Ad</button></div>
    <p style={{fontSize:13,color:'var(--text2)',margin:'0 0 16px'}}>Ads appear as a full-width tile in the resident home screen grid. Only the first active ad is shown.</p>

    {!ads.length&&<div className="card"><div className="empty">No advertisements yet</div></div>}
    {ads.map(a=><div key={a.id} className="card" style={{marginBottom:12}}>
      {/* Preview */}
      <div style={{borderRadius:14,padding:'16px 18px',marginBottom:12,position:'relative',overflow:'hidden',minHeight:80,
          background:a.image_url
            ?`linear-gradient(90deg,${a.bg_color||'#1a1a2e'} 0%,rgba(0,0,0,0.1) 100%),url(${a.image_url}) right center/cover no-repeat`
            :`linear-gradient(135deg,${a.bg_color||'#1a1a2e'},#0a0a1a)`}}>
        <div style={{position:'absolute',top:8,right:10,fontSize:9,fontWeight:700,color:'rgba(255,255,255,0.4)',letterSpacing:1}}>SPONSORED</div>
        {a.advertiser&&<div style={{fontSize:10,color:'rgba(255,255,255,0.5)',fontWeight:600,marginBottom:3,letterSpacing:0.5,textTransform:'uppercase'}}>{a.advertiser}</div>}
        <div style={{fontWeight:700,color:'white',fontSize:15,marginBottom:2}}>{a.headline}</div>
        {a.subtext&&<div style={{color:'rgba(255,255,255,0.7)',fontSize:12}}>{a.subtext}</div>}
        {a.cta_text&&<div style={{marginTop:8,display:'inline-flex',gap:5,background:'rgba(255,255,255,0.15)',borderRadius:8,padding:'5px 12px',color:'white',fontSize:12,fontWeight:700}}>{a.cta_text} →</div>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <span className={`badge badge-${a.is_active?'green':'red'}`}>{a.is_active?'Active':'Inactive'}</span>
        {a.expires_at&&<span style={{fontSize:11,color:'var(--text2)'}}>Expires {a.expires_at.slice(0,10)}</span>}
        <span style={{fontSize:11,color:'var(--text2)'}}>Order: {a.sort_order}</span>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          <button className="btn btn-sm" style={{background:a.is_active?'var(--card2)':'var(--green)',color:'white',border:'none'}} onClick={()=>toggle(a)}>{a.is_active?'Deactivate':'Activate'}</button>
          <button className="btn btn-sm" style={{background:'var(--accent)',color:'white',border:'none'}} onClick={()=>openEdit(a)}>Edit</button>
          <button className="btn btn-sm btn-red" onClick={()=>del(a.id)}>Delete</button>
        </div>
      </div>
    </div>)}

    {modal&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
      <div style={{background:'var(--card)',borderRadius:16,padding:28,width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',border:'1px solid var(--border)'}}>
        <h3 style={{marginBottom:16}}>{modal==='add'?'Add Ad':'Edit Ad'}</h3>
        <F l="Headline *" k="headline" placeholder="e.g. 20% off at Swiggy for residents"/>
        <F l="Subtext" k="subtext" placeholder="Use code SOCIETY20 at checkout"/>
        <F l="Advertiser / brand name" k="advertiser" placeholder="e.g. Swiggy"/>
        <F l="Background color" k="bgColor" type="color"/>
        <F l="Background image URL (optional)" k="imageUrl" placeholder="https://..."/>
        <F l="CTA button text" k="ctaText" placeholder="Get Offer"/>
        <F l="CTA link URL" k="ctaUrl" placeholder="https://..."/>
        <F l="Sort order (lower = shown first)" k="sortOrder" type="number"/>
        <F l="Expires at (optional)" k="expiresAt" type="datetime-local"/>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
          <input type="checkbox" id="adActive" checked={!!form.isActive} onChange={e=>setForm(f=>({...f,isActive:e.target.checked}))}/>
          <label htmlFor="adActive" style={{fontSize:13}}>Active (visible to residents)</label>
        </div>
        {err&&<p style={{color:'var(--red)',fontSize:13,marginBottom:10}}>{err}</p>}
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-primary" onClick={save}>Save Ad</button>
          <button className="btn" style={{background:'var(--card2)',border:'1px solid var(--border)'}} onClick={()=>setModal(null)}>Cancel</button>
        </div>
      </div>
    </div>}
  </div>;
}

function Guards() {
  const [guards, setGuards] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({name:'', pin:''});
  const [editPin, setEditPin] = useState(null); // {roleId, pin}
  const [msg, setMsg] = useState('');
  const [err, setErr] = useState('');

  const load = () => api('/api/admin/guards').then(setGuards);
  useEffect(() => { load(); }, []);

  const create = () => {
    setErr('');
    if(!form.name.trim()) return setErr('Name required');
    if(!form.pin || form.pin.length < 4 || !/^\d+$/.test(form.pin)) return setErr('PIN must be at least 4 digits');
    api('/api/admin/guards', {method:'POST', body:JSON.stringify(form)}).then(d => {
      if(d.error) return setErr(d.error);
      setForm({name:'', pin:''}); setShowForm(false); setMsg('Guard created!'); load();
      setTimeout(() => setMsg(''), 3000);
    });
  };

  const remove = (roleId, name) => {
    if(!confirm(`Remove guard ${name}? They won't be able to log in.`)) return;
    api(`/api/admin/guards/${roleId}`, {method:'DELETE'}).then(load);
  };

  const savePin = (roleId) => {
    if(!editPin?.pin || editPin.pin.length < 4 || !/^\d+$/.test(editPin.pin)) return setErr('PIN must be at least 4 digits');
    api(`/api/admin/guards/${roleId}/pin`, {method:'PUT', body:JSON.stringify({pin:editPin.pin})}).then(d => {
      if(d.error) return setErr(d.error);
      setEditPin(null); setErr(''); load();
    });
  };

  const genPin = () => Math.floor(1000 + Math.random() * 9000).toString();

  return <div>
    <div className="top-bar" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <h2>Guard Logins</h2>
      <button className="btn btn-primary btn-sm" onClick={() => { setShowForm(s=>!s); setErr(''); }}>
        {showForm ? '✕ Cancel' : '+ Add Guard'}
      </button>
    </div>

    {msg && <div style={{background:'rgba(168,230,207,.1)',border:'1px solid rgba(168,230,207,.3)',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#a8e6cf'}}>{msg}</div>}

    {showForm && <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:24,marginBottom:24}}>
      <h3 style={{marginBottom:16}}>New Guard</h3>
      <div className="form-group">
        <label className="label">Guard Name *</label>
        <input className="input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Rajesh Kumar"/>
      </div>
      <div className="form-group">
        <label className="label">PIN * <span style={{color:'var(--text2)',fontWeight:400}}>(min 4 digits — guard uses this to log in)</span></label>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <input className="input" value={form.pin} onChange={e=>setForm(f=>({...f,pin:e.target.value.replace(/\D/g,'')}))}
            placeholder="e.g. 4821" maxLength={8} style={{fontFamily:'monospace',fontSize:20,letterSpacing:4,flex:1}}/>
          <button className="btn btn-sm" onClick={()=>setForm(f=>({...f,pin:genPin()}))}
            style={{background:'var(--card2)',border:'1px solid var(--border)',color:'var(--text)',whiteSpace:'nowrap'}}>
            🎲 Generate
          </button>
        </div>
      </div>
      {err && <div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary" style={{width:'100%'}} onClick={create}>Create Guard Login</button>
    </div>}

    {/* Guard list */}
    {!guards.length && !showForm && <div className="empty">
      No guards yet. Add a guard to give them PIN-based access to the GateKeeper app.
    </div>}

    {guards.map(g => <div key={g.role_id} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:20,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:42,height:42,borderRadius:21,background:'rgba(88,166,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🛡</div>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{g.guard_name || g.name || 'Guard'}</div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Guard · {g.phone}</div>
          </div>
        </div>

        {/* PIN display / edit */}
        {editPin?.roleId === g.role_id ? (
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input value={editPin.pin} onChange={e=>setEditPin(p=>({...p,pin:e.target.value.replace(/\D/g,'')}))}
              maxLength={8} style={{width:90,padding:'6px 10px',borderRadius:8,border:'1px solid var(--accent)',background:'var(--card2)',color:'var(--text)',fontFamily:'monospace',fontSize:18,letterSpacing:4,textAlign:'center'}}/>
            <button onClick={()=>savePin(g.role_id)} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--accent)',color:'white',cursor:'pointer',fontWeight:600,fontSize:12,fontFamily:'inherit'}}>Save</button>
            <button onClick={()=>{setEditPin(null);setErr('');}} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',background:'none',color:'var(--text2)',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>✕</button>
          </div>
        ) : (
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 16px',fontFamily:'monospace',fontSize:22,letterSpacing:6,color:'var(--accent)',fontWeight:700}}>
              {g.guard_pin || '—'}
            </div>
            <button onClick={()=>{setEditPin({roleId:g.role_id,pin:g.guard_pin||''});setErr('');}}
              style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',background:'none',color:'var(--text2)',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>
              ✏️
            </button>
            <button onClick={()=>remove(g.role_id, g.guard_name||g.name)}
              style={{padding:'6px 10px',borderRadius:8,border:'none',background:'rgba(248,81,73,.12)',color:'var(--red)',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>
              Remove
            </button>
          </div>
        )}
      </div>
      {err && editPin?.roleId === g.role_id && <div style={{color:'var(--red)',fontSize:12,marginTop:8}}>{err}</div>}
    </div>)}

    <div style={{marginTop:20,padding:'14px 16px',background:'rgba(255,255,255,.03)',borderRadius:12,border:'1px solid var(--border)'}}>
      <p style={{fontSize:12,color:'var(--text2)',margin:0,lineHeight:1.6}}>
        🔑 Guards use their <strong style={{color:'var(--text)'}}>PIN only</strong> to log in to the GateKeeper app — no phone or OTP needed.<br/>
        Share the PIN securely with the guard. They'll also need to select this society on the login screen.
      </p>
    </div>
  </div>;
}

function NewsAdmin() {
  const [news, setNews] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({title:'', body:'', isPinned:false, category:'society'});
  const [photos, setPhotos] = useState([]); // base64 strings
  const [msg, setMsg] = useState('');
  const fileRef = React.useRef(null);

  const load = () => api('/api/news').then(d=>setNews(Array.isArray(d)?d:[]));
  useEffect(()=>{ load(); },[]);

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  const addPhotos = e => {
    const files = Array.from(e.target.files);
    if(photos.length + files.length > 8) return alert('Max 8 photos per post');
    files.forEach(file=>{
      const r = new FileReader();
      r.onload = ev => setPhotos(p=>[...p, ev.target.result]);
      r.readAsDataURL(file);
    });
    e.target.value = '';
  };

  const publish = () => {
    if(!form.title.trim()) return setMsg('Title is required');
    api('/api/news',{method:'POST',body:JSON.stringify({...form,images:photos})}).then(d=>{
      if(d.error) return setMsg(d.error);
      setMsg(''); setForm({title:'',body:'',isPinned:false,category:'society'}); setPhotos([]); setShowForm(false);
      load();
    });
  };

  const deletePost = id => {
    if(!confirm('Delete this news post?')) return;
    api(`/api/news/${id}`,{method:'DELETE'}).then(load);
  };

  const togglePin = (id, pinned) => {
    api(`/api/news/${id}/pin`,{method:'POST',body:JSON.stringify({pin:!pinned})}).then(load);
  };

  const formatDate = dt => new Date(dt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

  return <div>
    <div className="top-bar" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <h2>Society News</h2>
      <button className="btn btn-primary btn-sm" onClick={()=>setShowForm(s=>!s)}>
        {showForm ? '✕ Cancel' : '+ New Post'}
      </button>
    </div>

    {/* Compose form */}
    {showForm && <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:24,marginBottom:24}}>
      <h3 style={{marginBottom:16}}>New Announcement</h3>

      {/* Photo upload */}
      <div style={{marginBottom:16}}>
        <label style={{fontSize:12,color:'var(--text2)',display:'block',marginBottom:8}}>Photos <span style={{opacity:.6}}>(up to 8)</span></label>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:8}}>
          {photos.map((src,i)=><div key={i} style={{position:'relative',aspectRatio:'1',borderRadius:10,overflow:'hidden'}}>
            <img src={src} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            <button onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:4,right:4,width:20,height:20,borderRadius:'50%',background:'rgba(0,0,0,.7)',border:'none',color:'white',cursor:'pointer',fontSize:13,lineHeight:'20px',textAlign:'center',padding:0}}>×</button>
          </div>)}
          {photos.length<8&&<button onClick={()=>fileRef.current.click()} style={{aspectRatio:'1',borderRadius:10,border:'2px dashed var(--border)',background:'none',cursor:'pointer',color:'var(--text2)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,fontSize:11,fontFamily:'inherit'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Add
          </button>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={addPhotos}/>
      </div>

      <div className="form-group">
        <label className="label">Title *</label>
        <input className="input" value={form.title} onChange={e=>setF('title',e.target.value)} placeholder="Announcement title"/>
      </div>
      <div className="form-group">
        <label className="label">Body</label>
        <textarea className="input" rows={4} value={form.body} onChange={e=>setF('body',e.target.value)} placeholder="Full details of the announcement..." style={{resize:'vertical'}}/>
      </div>
      <div className="form-group" style={{display:'flex',alignItems:'center',gap:10}}>
        <input type="checkbox" id="pin-chk" checked={form.isPinned} onChange={e=>setF('isPinned',e.target.checked)} style={{width:16,height:16,accentColor:'var(--accent)'}}/>
        <label htmlFor="pin-chk" style={{fontSize:13,color:'var(--text)',cursor:'pointer'}}>📌 Pin this post to the top</label>
      </div>
      <div className="form-group">
        <label className="label">Category</label>
        <select className="input" value={form.category} onChange={e=>setF('category',e.target.value)}>
          <option value="society">Society</option>
          <option value="events">Events</option>
          <option value="maintenance">Maintenance</option>
        </select>
      </div>
      {msg&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{msg}</div>}
      <button className="btn btn-primary" style={{width:'100%'}} onClick={publish}>Publish Announcement</button>
    </div>}

    {/* News feed */}
    {!news.length&&!showForm&&<div className="empty">No news posts yet. Create your first announcement!</div>}
    {news.map(n=><div key={n.id} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:20,marginBottom:16}}>
      {/* Photo strip */}
      {n.images&&n.images.length>0&&<div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:14,borderRadius:10,overflow:'hidden'}}>
        {n.images.slice(0,4).map((src,i)=><div key={i} style={{position:'relative',flexShrink:0}}>
          <img src={src} style={{height:120,width:120,objectFit:'cover',borderRadius:10,display:'block'}}/>
          {i===3&&n.images.length>4&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:18,borderRadius:10}}>+{n.images.length-4}</div>}
        </div>)}
      </div>}

      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
        <div style={{flex:1}}>
          {n.is_pinned?<span style={{fontSize:11,color:'var(--accent)',fontWeight:600,display:'block',marginBottom:4}}>📌 PINNED</span>:null}
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{n.title}</div>
          {n.body&&<div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6,marginBottom:10,whiteSpace:'pre-wrap'}}>{n.body}</div>}
          <div style={{fontSize:11,color:'var(--text2)'}}>{n.author_name} · {formatDate(n.created_at)}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
          <button onClick={()=>togglePin(n.id,n.is_pinned)} style={{fontSize:11,padding:'4px 10px',borderRadius:8,border:'1px solid var(--border)',background:'none',color:'var(--text2)',cursor:'pointer',fontFamily:'inherit'}}>
            {n.is_pinned?'Unpin':'📌 Pin'}
          </button>
          <button onClick={()=>deletePost(n.id)} style={{fontSize:11,padding:'4px 10px',borderRadius:8,border:'none',background:'rgba(248,81,73,.15)',color:'var(--red)',cursor:'pointer',fontFamily:'inherit'}}>
            Delete
          </button>
        </div>
      </div>
    </div>)}
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script></body></html>
