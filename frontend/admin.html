<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f5f7;--card:#fff;--accent:#4a56e2;--accent2:#6c5ce7;--green:#00b894;--red:#e17055;--orange:#f39c12;--text:#1a1a2e;--text2:#6b7280;--border:#e5e7eb;--radius:12px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:#1a1a2e;color:white;padding:20px 0;position:fixed;height:100vh;overflow-y:auto}
.sidebar h1{font-size:18px;padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar .society-name{padding:12px 20px;font-size:11px;color:#8888a0;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .society-name span{color:#a29bfe;font-weight:600;display:block;font-size:13px}
.sidebar nav{padding:12px 0}
.sidebar nav button{display:block;width:100%;text-align:left;padding:10px 20px;background:none;border:none;color:#8888a0;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}
.sidebar nav button:hover,.sidebar nav button.active{color:white;background:rgba(108,92,231,.2)}
.sidebar nav button.active{border-left:3px solid #6c5ce7}
.main{margin-left:240px;flex:1;padding:24px 32px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.top-bar h2{font-size:24px;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border)}
.stat-card .val{font-size:28px;font-weight:700;font-family:'Space Mono'}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:10px 12px;font-size:12px;color:var(--text2);font-weight:600;border-bottom:2px solid var(--border);text-transform:uppercase}
.table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,184,148,.1);color:var(--green)}
.badge-red{background:rgba(225,112,85,.1);color:var(--red)}
.badge-orange{background:rgba(243,156,18,.1);color:var(--orange)}
.badge-blue{background:rgba(74,86,226,.1);color:var(--accent)}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{opacity:.9}
.btn-green{background:var(--green);color:white}
.btn-red{background:var(--red);color:white}
.btn-sm{padding:5px 12px;font-size:11px}
.input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:100%}
.input:focus{border-color:var(--accent)}
.form-group{margin-bottom:12px}
.label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.flex{display:flex;align-items:center;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:white;border-radius:16px;padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:16px}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.login h1{font-size:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty{text-align:center;padding:40px;color:var(--text2);font-size:14px}
.tab-bar{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit}
.tab.active{background:var(--accent);color:white;border-color:var(--accent)}
select.input{appearance:none}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
</style></head><body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;

function api(path, opts={}) {
  const token = localStorage.getItem('gk_admin_token');
  const headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = `Bearer ${token}`;
  return fetch(path, {...opts, headers}).then(r=>r.json());
}

function App() {
  const [token, setToken] = useState(localStorage.getItem('gk_admin_token'));
  const [user, setUser] = useState(null);
  const [ctx, setCtx] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [loading, setLoading] = useState(true);

  const loadMe = useCallback(()=>{
    if(!token){setLoading(false);return;}
    api('/api/auth/me').then(d=>{
      if(d.error){localStorage.removeItem('gk_admin_token');setToken(null);}
      else{setUser(d.user);setCtx(d);}
      setLoading(false);
    });
  },[token]);
  useEffect(()=>{loadMe();},[loadMe]);

  const handleLogin=(t)=>{localStorage.setItem('gk_admin_token',t);setToken(t);setLoading(true);setTimeout(loadMe,100);};

  if(loading) return <div className="login"><h1>Loading...</h1></div>;
  if(!token) return <LoginPage onLogin={handleLogin}/>;

  const isSuperAdmin = ctx?.roles?.some(r=>r.role==='super_admin');
  const pages = {dashboard:<Dashboard/>,residents:<Residents/>,spaces:<Spaces/>,bookings:<Bookings/>,approvals:<Approvals/>,daily_help:<DailyHelp/>,documents:<Documents/>,doc_reqs:<DocReqs/>,news:<NewsAdmin/>,banners:<BannersAdmin/>,ads:<AdsAdmin/>,guards:<Guards/>,societies:<Societies token={token}/>};

  return <div className="layout">
    <div className="sidebar">
      <h1 style={{padding:'16px 20px 16px'}}>Admin Console</h1>
      <div className="society-name"><span>{ctx?.society?.name||'No Society'}</span>{ctx?.society?.city}</div>
      <nav>
        {[['dashboard','Dashboard'],['residents','Residents'],['spaces','Spaces'],['bookings','Bookings'],['approvals','Approvals'],['daily_help','Daily Help'],['documents','Documents'],['doc_reqs','Doc Requirements'],['news','📰 News'],['banners','📢 Banners'],['ads','🏷 Ads'],['guards','🛡 Guards']].map(([k,l])=>
          <button key={k} className={page===k?'active':''} onClick={()=>setPage(k)}>{l}</button>
        )}
        {isSuperAdmin&&<button className={page==='societies'?'active':''} onClick={()=>setPage('societies')} style={{borderTop:'1px solid #2d2d3d',marginTop:8,paddingTop:16}}>⚙ Manage Societies</button>}
        <button style={{color:'#e17055',marginTop:20}} onClick={()=>{localStorage.removeItem('gk_admin_token');setToken(null);}}>Sign Out</button>
      </nav>
    </div>
    <div className="main">{pages[page]||pages.dashboard}</div>
  </div>;
}

function LoginPage({onLogin}) {
  const [phone,setPhone]=useState('');const [otp,setOtp]=useState('');const [sid,setSid]=useState('');const [step,setStep]=useState('phone');
  const send=()=>api('/api/auth/request-otp',{method:'POST',body:JSON.stringify({phone})}).then(d=>{if(d.success){setSid(d.sessionId);setStep('otp');}});
  const verify=()=>api('/api/auth/verify-otp',{method:'POST',body:JSON.stringify({sessionId:sid,otp})}).then(d=>{if(d.token)onLogin(d.token);});
  return <div className="login">
    <h1>Admin Console</h1>
    <p style={{color:'var(--text2)'}}>Management Console</p>
    <div style={{width:300}}>
      {step==='phone'?<><div className="form-group"><label className="label">Phone</label><input className="input" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="Admin phone"/></div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={send}>Send OTP</button>
        <p style={{fontSize:11,color:'var(--text2)',marginTop:8}}>Demo: 9999900001 (Green Valley) | 9999900003 (Sunrise)</p></>
      :<><div className="form-group"><label className="label">OTP</label><input className="input" value={otp} onChange={e=>setOtp(e.target.value)} placeholder="123456"/></div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={verify}>Verify</button></>}
    </div>
  </div>;
}

function Dashboard() {
  const [d,setD]=useState({});
  useEffect(()=>{api('/api/admin/dashboard').then(setD);},[]);
  return <div><div className="top-bar"><h2>Dashboard</h2></div>
    <div className="stats">
      <div className="stat-card"><div className="val" style={{color:'var(--accent)'}}>{d.totalResidents||0}</div><div className="label">Total Residents</div></div>
      <div className="stat-card"><div className="val" style={{color:'var(--orange)'}}>{d.pendingApprovals||0}</div><div className="label">Pending Approvals</div></div>
      <div className="stat-card"><div className="val" style={{color:'var(--red)'}}>{d.pendingMoves||0}</div><div className="label">Pending Moves</div></div>
      <div className="stat-card"><div className="val" style={{color:'var(--accent2)'}}>{d.pendingLeases||0}</div><div className="label">Pending Leases</div></div>
      <div className="stat-card"><div className="val" style={{color:'var(--green)'}}>{d.activeDailyHelp||0}</div><div className="label">Active Daily Help</div></div>
      <div className="stat-card"><div className="val" style={{color:'var(--orange)'}}>{d.pendingDocuments||0}</div><div className="label">Pending Docs</div></div>
    </div>
  </div>;
}

function Residents() {
  const [res,setRes]=useState([]);const [filter,setFilter]=useState('');
  const [rejectModal,setRejectModal]=useState(null); // {id, name}
  const [rejectReason,setRejectReason]=useState('');
  const [rejectErr,setRejectErr]=useState('');
  const load=()=>api('/api/admin/residents'+(filter?'?status='+filter:'')).then(setRes);
  useEffect(()=>{load();},[filter]);

  const approve=id=>api(`/api/admin/residents/${id}/approve`,{method:'POST'}).then(load);
  const openReject=r=>{ setRejectModal({id:r.id,name:r.name}); setRejectReason(''); setRejectErr(''); };
  const submitReject=()=>{
    if(!rejectReason.trim()) return setRejectErr('Please provide a reason');
    api(`/api/admin/residents/${rejectModal.id}/reject`,{method:'POST',body:JSON.stringify({reason:rejectReason})})
      .then(d=>{ if(d.error) return setRejectErr(d.error); setRejectModal(null); load(); });
  };

  return <div>
    <div className="top-bar"><h2>Residents</h2></div>
    <div className="tab-bar">
      {['','pending','approved','rejected'].map(f=><button key={f} className={`tab ${filter===f?'active':''}`} onClick={()=>setFilter(f)}>{f||'All'}</button>)}
    </div>
    <div className="card"><table className="table"><thead><tr><th>Name</th><th>Phone</th><th>Apartment</th><th>Tower</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      {res.map(r=><tr key={r.id}><td>{r.name}</td><td>{r.phone}</td><td>{r.unit_number}</td><td>{r.tower_name}</td>
        <td><span className="badge badge-blue">{r.resident_type}</span></td>
        <td>
          <span className={`badge badge-${r.status==='approved'?'green':r.status==='pending'?'orange':'red'}`}>{r.status}</span>
          {r.status==='rejected'&&r.rejection_reason&&<div style={{fontSize:11,color:'var(--text2)',marginTop:4,maxWidth:180}}>↳ {r.rejection_reason}</div>}
        </td>
        <td>{r.status==='pending'&&<div className="flex">
          <button className="btn btn-sm btn-green" onClick={()=>approve(r.id)}>Approve</button>
          <button className="btn btn-sm btn-red" onClick={()=>openReject(r)}>Reject</button>
        </div>}</td></tr>)}
    </tbody></table>
    {!res.length&&<div className="empty">No residents found</div>}</div>

    {/* Reject reason modal */}
    {rejectModal&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
      <div style={{background:'var(--card)',borderRadius:16,padding:28,width:420,border:'1px solid var(--border)'}}>
        <h3 style={{marginBottom:4}}>Reject Application</h3>
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>Rejecting <strong>{rejectModal.name}</strong>. This reason will be shown to the applicant.</p>
        <label className="label">Reason for rejection *</label>
        <textarea className="input" rows={3} value={rejectReason} onChange={e=>setRejectReason(e.target.value)}
          placeholder="e.g. Documents incomplete — please resubmit with valid proof of ownership."
          style={{resize:'vertical',marginBottom:12,width:'100%'}}/>
        {rejectErr&&<p style={{color:'var(--red)',fontSize:13,marginBottom:10}}>{rejectErr}</p>}
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-primary btn-sm" style={{background:'var(--red)'}} onClick={submitReject}>Confirm Reject</button>
          <button className="btn btn-sm" style={{background:'var(--card2)',border:'1px solid var(--border)',color:'var(--text)'}} onClick={()=>setRejectModal(null)}>Cancel</button>
        </div>
      </div>
    </div>}
  </div>;
}

function Spaces() {
  const [spaces,setSpaces]=useState([]);const [modal,setModal]=useState(false);const [editing,setEditing]=useState(null);
  const load=()=>api('/api/admin/spaces').then(setSpaces);
  useEffect(()=>{load();},[]);
  const openAdd=()=>{setEditing(null);setModal(true);};
  const openEdit=s=>{setEditing(s);setModal(true);};
  const save=d=>{
    if(editing) api(`/api/admin/spaces/${editing.id}`,{method:'PUT',body:JSON.stringify(d)}).then(()=>{load();setModal(false);setEditing(null);});
    else api('/api/admin/spaces',{method:'POST',body:JSON.stringify(d)}).then(()=>{load();setModal(false);});
  };
  const del=id=>{if(confirm('Delete?'))api(`/api/admin/spaces/${id}`,{method:'DELETE'}).then(load);};
  const fields=[{k:'name',l:'Name'},{k:'description',l:'Description'},{k:'spaceType',l:'Type',type:'select',opts:['common_room','work_area','gym','pool','party_hall','guest_room','other']},{k:'capacity',l:'Capacity',type:'number'},{k:'costPerHour',l:'Cost/Hour',type:'number'},{k:'availableFrom',l:'Open',type:'time'},{k:'availableTo',l:'Close',type:'time'},{k:'isShared',l:'Shared workspace?',type:'select',opts:['false','true']},{k:'totalSpots',l:'Total Spots',type:'number'}];
  const editDefaults=editing?{name:editing.name,description:editing.description,spaceType:editing.space_type,capacity:editing.capacity,costPerHour:editing.cost_per_hour,availableFrom:editing.available_from,availableTo:editing.available_to,isShared:editing.is_shared?'true':'false',totalSpots:editing.total_spots}:null;
  return <div><div className="top-bar"><h2>Spaces</h2><button className="btn btn-primary" onClick={openAdd}>+ Add Space</button></div>
    <div className="card"><table className="table"><thead><tr><th>Name</th><th>Type</th><th>Capacity</th><th>Cost/hr</th><th>Hours</th><th>Shared</th><th>Actions</th></tr></thead><tbody>
      {spaces.map(s=><tr key={s.id}><td><b>{s.name}</b><br/><span style={{fontSize:11,color:'var(--text2)'}}>{s.description}</span></td><td>{s.space_type}</td><td>{s.capacity}</td><td style={{fontFamily:'Space Mono'}}>Rs.{s.cost_per_hour}</td><td>{s.available_from}-{s.available_to}</td><td>{s.is_shared?`Yes (${s.total_spots} spots)`:'No'}</td>
        <td><div className="flex"><button className="btn btn-sm" style={{background:'var(--accent)',color:'white'}} onClick={()=>openEdit(s)}>Edit</button><button className="btn btn-sm btn-red" onClick={()=>del(s.id)}>Delete</button></div></td></tr>)}
    </tbody></table></div>
    {modal&&<Modal title={editing?'Edit Space':'Add Space'} onClose={()=>{setModal(false);setEditing(null);}} onSubmit={save} fields={fields} defaults={editDefaults}/>}
  </div>;
}

function Bookings() {
  const [bk,setBk]=useState([]);
  useEffect(()=>{api('/api/admin/bookings').then(setBk);},[]);
  return <div><div className="top-bar"><h2>Bookings</h2></div>
    <div className="card"><table className="table"><thead><tr><th>Space</th><th>Booked By</th><th>Date</th><th>Time</th><th>Cost</th><th>Status</th></tr></thead><tbody>
      {bk.map(b=><tr key={b.id}><td>{b.space_name}</td><td>{b.booked_by}</td><td>{b.booking_date}</td><td>{b.start_time}-{b.end_time}</td><td style={{fontFamily:'Space Mono'}}>Rs.{b.total_cost}</td>
        <td><span className={`badge badge-${b.status==='confirmed'?'green':b.status==='pending'?'orange':'red'}`}>{b.status}</span></td></tr>)}
    </tbody></table>{!bk.length&&<div className="empty">No bookings</div>}</div>
  </div>;
}

function Approvals() {
  const [moves,setMoves]=useState([]);
  const [leases,setLeases]=useState([]);
  const [tab,setTab]=useState('moves');
  const [rejectTarget,setRejectTarget]=useState(null); // {id,name,label}
  const [rejectReason,setRejectReason]=useState('');
  const [rejectErr,setRejectErr]=useState('');
  const [docsTarget,setDocsTarget]=useState(null); // move object to show docs for

  const loadM=()=>api('/api/admin/move-requests').then(setMoves);
  const loadL=()=>api('/api/admin/lease-extensions').then(setLeases);
  useEffect(()=>{loadM();loadL();},[]);

  const openReject=(m)=>{setRejectTarget({id:m.id,name:m.name,label:m.move_type==='move_in'?'Move In':'Move Out'});setRejectReason('');setRejectErr('');};
  const submitReject=()=>{
    if(!rejectReason.trim()) return setRejectErr('Please provide a reason');
    api(`/api/admin/move-requests/${rejectTarget.id}/reject`,{method:'POST',body:JSON.stringify({reason:rejectReason})})
      .then(d=>{if(d.error) return setRejectErr(d.error); setRejectTarget(null); loadM();});
  };
  const verifyDoc=(mid,did)=>api(`/api/admin/move-requests/${mid}/documents/${did}/verify`,{method:'POST'}).then(loadM);

  return <div>
    <div className="top-bar"><h2>Approvals</h2></div>
    <div className="tab-bar">
      <button className={`tab ${tab==='moves'?'active':''}`} onClick={()=>setTab('moves')}>Move Requests</button>
      <button className={`tab ${tab==='leases'?'active':''}`} onClick={()=>setTab('leases')}>Lease Extensions</button>
    </div>

    {tab==='moves'&&<div className="card">
      <table className="table"><thead><tr><th>Name</th><th>Apartment</th><th>Type</th><th>Dates</th><th>Docs</th><th>Status</th><th>Actions</th></tr></thead><tbody>
        {moves.map(m=><tr key={m.id}>
          <td>{m.name}<br/><span style={{fontSize:11,color:'var(--text2)'}}>{m.phone}</span></td>
          <td>{m.unit_number} · {m.tower_name}</td>
          <td><span className={`badge badge-${m.move_type==='move_in'?'green':'red'}`}>{m.move_type}</span></td>
          <td style={{fontSize:12}}>{m.tentative_start}<br/>→ {m.tentative_end}</td>
          <td>
            {m.documents&&m.documents.length>0
              ? <button className="btn btn-sm" style={{fontSize:11}} onClick={()=>setDocsTarget(m)}>
                  View {m.documents.length} doc{m.documents.length>1?'s':''}
                </button>
              : <span style={{fontSize:11,color:'var(--text2)'}}>None</span>}
          </td>
          <td>
            <span className={`badge badge-${m.status==='approved'?'green':m.status==='pending'?'orange':'red'}`}>{m.status}</span>
            {m.status==='rejected'&&m.rejection_reason&&<div style={{fontSize:11,color:'var(--text2)',marginTop:3,maxWidth:140}}>↳ {m.rejection_reason}</div>}
          </td>
          <td>{m.status==='pending'&&<div className="flex">
            <button className="btn btn-sm btn-green" onClick={()=>api(`/api/admin/move-requests/${m.id}/approve`,{method:'POST'}).then(loadM)}>Approve</button>
            <button className="btn btn-sm btn-red" onClick={()=>openReject(m)}>Reject</button>
          </div>}</td>
        </tr>)}
      </tbody></table>
      {!moves.length&&<div className="empty">No move requests</div>}
    </div>}

    {tab==='leases'&&<div className="card"><table className="table"><thead><tr><th>Name</th><th>Apartment</th><th>Current End</th><th>Requested End</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      {leases.map(l=><tr key={l.id}><td>{l.name}</td><td>{l.unit_number} - {l.tower_name}</td><td>{l.current_end}</td><td>{l.requested_end}</td>
        <td><span className={`badge badge-${l.status==='approved'?'green':l.status==='pending'?'orange':'red'}`}>{l.status}</span></td>
        <td>{l.status==='pending'&&<div className="flex"><button className="btn btn-sm btn-green" onClick={()=>api(`/api/admin/lease-extensions/${l.id}/approve`,{method:'POST'}).then(loadL)}>Approve</button><button className="btn btn-sm btn-red" onClick={()=>api(`/api/admin/lease-extensions/${l.id}/reject`,{method:'POST'}).then(loadL)}>Reject</button></div>}</td></tr>)}
    </tbody></table>{!leases.length&&<div className="empty">No lease extensions</div>}</div>}

    {/* Reject modal */}
    {rejectTarget&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
      <div style={{background:'var(--card)',borderRadius:16,padding:28,width:420,border:'1px solid var(--border)'}}>
        <h3 style={{marginBottom:4}}>Reject {rejectTarget.label}</h3>
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>Rejecting request from <strong>{rejectTarget.name}</strong>. The reason will be shown to them.</p>
        <label className="label">Reason *</label>
        <textarea className="input" rows={3} value={rejectReason} onChange={e=>setRejectReason(e.target.value)}
          placeholder="e.g. Missing NOC from previous society." style={{resize:'vertical',marginBottom:12,width:'100%'}}/>
        {rejectErr&&<p style={{color:'var(--red)',fontSize:13,marginBottom:10}}>{rejectErr}</p>}
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-sm" style={{background:'var(--red)',color:'white',border:'none'}} onClick={submitReject}>Confirm Reject</button>
          <button className="btn btn-sm" style={{background:'var(--card2)',border:'1px solid var(--border)',color:'var(--text)'}} onClick={()=>setRejectTarget(null)}>Cancel</button>
        </div>
      </div>
    </div>}

    {/* Document viewer */}
    {docsTarget&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
      <div style={{background:'var(--card)',borderRadius:16,padding:24,width:'100%',maxWidth:560,maxHeight:'85vh',overflowY:'auto',border:'1px solid var(--border)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style={{margin:0}}>Documents — {docsTarget.name}</h3>
          <button onClick={()=>setDocsTarget(null)} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:22}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {docsTarget.documents.map(d=><div key={d.id} style={{background:'var(--card2)',borderRadius:12,padding:16,border:`1px solid ${d.status==='verified'?'var(--green)':'var(--border)'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div>
                <span style={{fontWeight:700,fontSize:13}}>{d.doc_type.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</span>
                <span style={{fontSize:11,color:'var(--text2)',marginLeft:8}}>{d.file_name}</span>
              </div>
              <span className={`badge badge-${d.status==='verified'?'green':'orange'}`}>{d.status}</span>
            </div>
            {d.data&&(d.data.startsWith('data:image')?
              <img src={d.data} style={{width:'100%',borderRadius:8,maxHeight:200,objectFit:'contain',background:'#000'}} alt={d.doc_type}/>:
              <div style={{fontSize:12,color:'var(--text2)',padding:8,background:'var(--card)',borderRadius:8}}>PDF document — <a href={d.data} download={d.file_name} style={{color:'var(--accent)'}}>Download</a></div>)}
            {d.status!=='verified'&&<button className="btn btn-sm btn-green" style={{marginTop:8}} onClick={()=>verifyDoc(docsTarget.id,d.id)}>✓ Mark Verified</button>}
          </div>)}
        </div>
      </div>
    </div>}
  </div>;
}

function Modal({title,onClose,onSubmit,fields,defaults}) {
  const [data,setData]=useState(defaults||{});
  const set=(k,v)=>setData(d=>({...d,[k]:v}));
  return <div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h3>{title}</h3>
    {fields.map(f=><div key={f.k} className="form-group"><label className="label">{f.l}</label>
      {f.type==='select'?<select className="input" value={data[f.k]||''} onChange={e=>set(f.k,e.target.value)}><option value="">Select</option>{f.opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
      :<input className="input" type={f.type||'text'} value={data[f.k]||''} onChange={e=>set(f.k,e.target.value)}/>}</div>)}
    <div className="flex" style={{gap:8,marginTop:16}}><button className="btn btn-primary" style={{flex:1}} onClick={()=>onSubmit(data)}>Submit</button><button className="btn" style={{flex:1,background:'var(--bg)'}} onClick={onClose}>Cancel</button></div>
  </div></div>;
}

function Societies({token}) {
  const [societies, setSocieties] = useState([]);
  const [selected, setSelected] = useState(null);
  const [staff, setStaff] = useState([]);
  const [view, setView] = useState('list'); // list | detail | newSociety | newTower | newStaff
  const [form, setForm] = useState({});
  const [msg, setMsg] = useState('');

  const load = () => api('/api/superadmin/societies').then(d=>{ if(Array.isArray(d)) setSocieties(d); });
  useEffect(()=>{ load(); }, []);

  const loadStaff = (sid) => api('/api/superadmin/societies/'+sid+'/staff').then(d=>{ if(Array.isArray(d)) setStaff(d); });

  const selectSociety = (s) => { setSelected(s); loadStaff(s.id); setView('detail'); };

  const createSociety = () => {
    api('/api/superadmin/societies', {method:'POST', body:JSON.stringify(form)}).then(d=>{
      if(d.success){ setMsg('Society created!'); setForm({}); setView('list'); load(); }
      else setMsg(d.error||'Failed');
    });
  };

  const deleteSociety = (sid) => {
    if(!confirm('Delete this society and all its towers/apartments? This cannot be undone.')) return;
    api('/api/superadmin/societies/'+sid, {method:'DELETE'}).then(d=>{
      if(d.success){ setMsg('Deleted.'); setView('list'); load(); }
    });
  };

  const addTower = () => {
    api('/api/superadmin/societies/'+selected.id+'/towers', {method:'POST', body:JSON.stringify(form)}).then(d=>{
      if(d.success){ setMsg(`Tower added! ${d.apartmentsCreated} apartments created.`); setForm({}); setView('detail'); api('/api/superadmin/societies').then(r=>{ const s=r.find(x=>x.id===selected.id); if(s){setSelected(s);} }); }
      else setMsg(d.error||'Failed');
    });
  };

  const deleteTower = (tid) => {
    if(!confirm('Delete this tower and all its apartments?')) return;
    api('/api/superadmin/towers/'+tid, {method:'DELETE'}).then(d=>{ if(d.success){ load().then(()=>{ api('/api/superadmin/societies').then(r=>{ const s=r.find(x=>x.id===selected.id); if(s) setSelected(s); setSocieties(r); }); }); } });
  };

  const assignStaff = () => {
    api('/api/superadmin/societies/'+selected.id+'/staff', {method:'POST', body:JSON.stringify(form)}).then(d=>{
      if(d.success){ setMsg('Staff assigned!'); setForm({}); setView('detail'); loadStaff(selected.id); }
      else setMsg(d.error||'Failed');
    });
  };

  const removeStaff = (roleId) => {
    if(!confirm('Remove this person from the society?')) return;
    api('/api/superadmin/staff/'+roleId, {method:'DELETE'}).then(d=>{ if(d.success) loadStaff(selected.id); });
  };

  const s = (k,v) => setForm(f=>({...f,[k]:v}));
  const style = { card:{background:'#1e1e2e',border:'1px solid #2d2d3d',borderRadius:12,padding:16,marginBottom:12},
    btn:{padding:'8px 16px',border:'none',borderRadius:8,fontFamily:'inherit',fontWeight:600,fontSize:13,cursor:'pointer'},
    input:{width:'100%',padding:'9px 12px',border:'1px solid #2d2d3d',borderRadius:8,background:'#111',color:'white',fontFamily:'inherit',fontSize:13,outline:'none',marginBottom:10},
    label:{fontSize:12,color:'#8888a0',marginBottom:4,display:'block'} };

  if(view==='newSociety') return <div style={{padding:24,maxWidth:520}}>
    <button onClick={()=>setView('list')} style={{...style.btn,background:'none',color:'#8888a0',marginBottom:16}}>← Back</button>
    <h2 style={{marginBottom:20}}>New Society</h2>
    {['name','address','city','state','pincode'].map(k=><div key={k}>
      <label style={style.label}>{k.charAt(0).toUpperCase()+k.slice(1)}{k==='name'&&' *'}</label>
      <input style={style.input} value={form[k]||''} onChange={e=>s(k,e.target.value)} placeholder={k==='name'?'e.g. Green Valley':''} />
    </div>)}
    {msg&&<div style={{color:'#a8e6cf',marginBottom:12,fontSize:13}}>{msg}</div>}
    <button onClick={createSociety} style={{...style.btn,background:'#6c5ce7',color:'white',width:'100%',padding:12}}>Create Society</button>
  </div>;

  if(view==='newTower') return <div style={{padding:24,maxWidth:520}}>
    <button onClick={()=>setView('detail')} style={{...style.btn,background:'none',color:'#8888a0',marginBottom:16}}>← Back</button>
    <h2 style={{marginBottom:4}}>Add Tower</h2>
    <p style={{color:'#8888a0',fontSize:13,marginBottom:20}}>to {selected?.name}</p>
    {[['name','Tower Name','e.g. Tower A'],['floors','Number of Floors','e.g. 12'],['aptsPerFloor','Apartments per Floor','e.g. 4']].map(([k,l,p])=><div key={k}>
      <label style={style.label}>{l}</label>
      <input style={style.input} value={form[k]||''} onChange={e=>s(k,e.target.value)} placeholder={p} type={k!=='name'?'number':'text'} />
    </div>)}
    <p style={{fontSize:12,color:'#8888a0',marginBottom:16}}>
      This will auto-generate {(form.floors||0)*(form.aptsPerFloor||0)||'N'} apartments.
    </p>
    {msg&&<div style={{color:'#a8e6cf',marginBottom:12,fontSize:13}}>{msg}</div>}
    <button onClick={addTower} style={{...style.btn,background:'#6c5ce7',color:'white',width:'100%',padding:12}}>Add Tower & Generate Apartments</button>
  </div>;

  if(view==='newStaff') return <div style={{padding:24,maxWidth:520}}>
    <button onClick={()=>setView('detail')} style={{...style.btn,background:'none',color:'#8888a0',marginBottom:16}}>← Back</button>
    <h2 style={{marginBottom:4}}>Assign Staff</h2>
    <p style={{color:'#8888a0',fontSize:13,marginBottom:20}}>to {selected?.name}</p>

    <input style={style.input} value={form.name||''} onChange={e=>s('name',e.target.value)} placeholder="Full name" />
    <label style={style.label}>Phone *</label>
    <input style={style.input} value={form.phone||''} onChange={e=>s('phone',e.target.value)} placeholder="10-digit phone (login credential)" />
    <label style={style.label}>Role *</label>

      <option value="">Select role</option>
      <option value="admin">Admin</option>
      <option value="guard">Guard</option>
    </select>
    {msg&&<div style={{color:'#a8e6cf',marginBottom:12,fontSize:13}}>{msg}</div>}
    <button onClick={assignStaff} style={{...style.btn,background:'#6c5ce7',color:'white',width:'100%',padding:12}}>Assign Staff Member</button>
  </div>;

  if(view==='detail' && selected) return <div style={{padding:24}}>
    <button onClick={()=>setView('list')} style={{...style.btn,background:'none',color:'#8888a0',marginBottom:16}}>← All Societies</button>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
      <div><h2 style={{marginBottom:4}}>{selected.name}</h2>
        <p style={{color:'#8888a0',fontSize:13}}>{[selected.address,selected.city,selected.state,selected.pincode].filter(Boolean).join(', ')||'No address'}</p></div>
      <button onClick={()=>deleteSociety(selected.id)} style={{...style.btn,background:'rgba(231,76,60,.15)',color:'#e74c3c'}}>Delete Society</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:24}}>
      {[['Residents',selected.resident_count||0,'#a8e6cf'],['Admins',selected.admin_count||0,'#c9b1ff'],['Guards',selected.guard_count||0,'#ffd3a5']].map(([l,v,c])=>
        <div key={l} style={{...style.card,textAlign:'center'}}><div style={{fontSize:28,fontWeight:700,color:c}}>{v}</div><div style={{fontSize:12,color:'#8888a0'}}>{l}</div></div>)}
    </div>

    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
      <h3>Towers & Apartments</h3>
      <button onClick={()=>{setForm({});setView('newTower');}} style={{...style.btn,background:'#6c5ce7',color:'white'}}>+ Add Tower</button>
    </div>
    {selected.towers?.length===0&&<p style={{color:'#8888a0',fontSize:13,marginBottom:20}}>No towers yet.</p>}
    {selected.towers?.map(t=><div key={t.id} style={{...style.card,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div><div style={{fontWeight:600}}>{t.name}</div>
        <div style={{fontSize:12,color:'#8888a0'}}>{t.floors} floors · {t.apartment_count} apartments</div></div>
      <button onClick={()=>deleteTower(t.id)} style={{...style.btn,background:'rgba(231,76,60,.1)',color:'#e74c3c',fontSize:11,padding:'5px 10px'}}>Remove</button>
    </div>)}

    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,marginTop:8}}>
      <h3>Staff</h3>
      <button onClick={()=>{setForm({});setMsg('');setView('newStaff');}} style={{...style.btn,background:'#6c5ce7',color:'white'}}>+ Assign Staff</button>
    </div>
    {staff.length===0&&<p style={{color:'#8888a0',fontSize:13}}>No staff assigned.</p>}
    {staff.map(m=><div key={m.role_id} style={{...style.card,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div><div style={{fontWeight:600}}>{m.name||m.phone}</div>
        <div style={{fontSize:12,color:'#8888a0'}}>{m.phone} · <span style={{color:m.role==='admin'?'#c9b1ff':'#ffd3a5'}}>{m.role}</span></div></div>
      <button onClick={()=>removeStaff(m.role_id)} style={{...style.btn,background:'rgba(231,76,60,.1)',color:'#e74c3c',fontSize:11,padding:'5px 10px'}}>Remove</button>
    </div>)}
  </div>;

  return <div style={{padding:24}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
      <h2>All Societies</h2>
      <button onClick={()=>{setForm({});setMsg('');setView('newSociety');}} style={{...style.btn,background:'#6c5ce7',color:'white'}}>+ New Society</button>
    </div>
    {msg&&<div style={{color:'#a8e6cf',marginBottom:12,fontSize:13,padding:'10px 14px',background:'rgba(168,230,207,.1)',borderRadius:8}}>{msg}</div>}
    {societies.length===0&&<p style={{color:'#8888a0'}}>No societies yet.</p>}
    {societies.map(s=><div key={s.id} style={{...style.card,cursor:'pointer'}} onClick={()=>selectSociety(s)}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><div style={{fontWeight:600,fontSize:16,marginBottom:4}}>{s.name}</div>
          <div style={{fontSize:12,color:'#8888a0'}}>{[s.city,s.state].filter(Boolean).join(', ')||'No location'}</div></div>
        <div style={{textAlign:'right',fontSize:12,color:'#8888a0'}}>
          <div>{s.towers?.length||0} towers</div>
          <div>{s.resident_count||0} residents</div>
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:10}}>
        <span style={{fontSize:11,padding:'2px 8px',borderRadius:12,background:'rgba(108,92,231,.2)',color:'#c9b1ff'}}>{s.admin_count} admins</span>
        <span style={{fontSize:11,padding:'2px 8px',borderRadius:12,background:'rgba(253,203,110,.1)',color:'#ffd3a5'}}>{s.guard_count} guards</span>
      </div>
    </div>)}
  </div>;
}

function BannersAdmin() {
  const [banners,setBanners]=useState([]);
  const [modal,setModal]=useState(null); // null | 'add' | banner object
  const [form,setForm]=useState({});
  const [err,setErr]=useState('');
  const load=()=>api('/api/admin/banners').then(setBanners);
  useEffect(()=>{load();},[]);

  const openAdd=()=>{setForm({bgColor:'#6c5ce7',isActive:true,sortOrder:0});setErr('');setModal('add');};
  const openEdit=b=>{setForm({...b,bgColor:b.bg_color,imageUrl:b.image_url,ctaText:b.cta_text,ctaUrl:b.cta_url,sortOrder:b.sort_order,isActive:!!b.is_active,expiresAt:b.expires_at||''});setErr('');setModal(b);};
  const save=()=>{
    const method=modal==='add'?'POST':'PUT';
    const url=modal==='add'?'/api/admin/banners':`/api/admin/banners/${modal.id}`;
    api(url,{method,body:JSON.stringify(form)}).then(d=>{if(d.error)return setErr(d.error);load();setModal(null);});

function Guards() {
  const [guards, setGuards] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({name:'', pin:''});
  const [editPin, setEditPin] = useState(null); // {roleId, pin}
  const [msg, setMsg] = useState('');
  const [err, setErr] = useState('');

  const load = () => api('/api/admin/guards').then(setGuards);
  useEffect(() => { load(); }, []);

  const create = () => {
    setErr('');
    if(!form.name.trim()) return setErr('Name required');
    if(!form.pin || form.pin.length < 4 || !/^\d+$/.test(form.pin)) return setErr('PIN must be at least 4 digits');
    api('/api/admin/guards', {method:'POST', body:JSON.stringify(form)}).then(d => {
      if(d.error) return setErr(d.error);
      setForm({name:'', pin:''}); setShowForm(false); setMsg('Guard created!'); load();
      setTimeout(() => setMsg(''), 3000);
    });
  };

  const remove = (roleId, name) => {
    if(!confirm(`Remove guard ${name}? They won't be able to log in.`)) return;
    api(`/api/admin/guards/${roleId}`, {method:'DELETE'}).then(load);
  };

  const savePin = (roleId) => {
    if(!editPin?.pin || editPin.pin.length < 4 || !/^\d+$/.test(editPin.pin)) return setErr('PIN must be at least 4 digits');
    api(`/api/admin/guards/${roleId}/pin`, {method:'PUT', body:JSON.stringify({pin:editPin.pin})}).then(d => {
      if(d.error) return setErr(d.error);
      setEditPin(null); setErr(''); load();
    });
  };

  const genPin = () => Math.floor(1000 + Math.random() * 9000).toString();

  return <div>
    <div className="top-bar" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <h2>Guard Logins</h2>
      <button className="btn btn-primary btn-sm" onClick={() => { setShowForm(s=>!s); setErr(''); }}>
        {showForm ? '✕ Cancel' : '+ Add Guard'}
      </button>
    </div>

    {msg && <div style={{background:'rgba(168,230,207,.1)',border:'1px solid rgba(168,230,207,.3)',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#a8e6cf'}}>{msg}</div>}

    {showForm && <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:24,marginBottom:24}}>
      <h3 style={{marginBottom:16}}>New Guard</h3>
      <div className="form-group">
        <label className="label">Guard Name *</label>
        <input className="input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Rajesh Kumar"/>
      </div>
      <div className="form-group">
        <label className="label">PIN * <span style={{color:'var(--text2)',fontWeight:400}}>(min 4 digits — guard uses this to log in)</span></label>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <input className="input" value={form.pin} onChange={e=>setForm(f=>({...f,pin:e.target.value.replace(/\D/g,'')}))}
            placeholder="e.g. 4821" maxLength={8} style={{fontFamily:'monospace',fontSize:20,letterSpacing:4,flex:1}}/>
          <button className="btn btn-sm" onClick={()=>setForm(f=>({...f,pin:genPin()}))}
            style={{background:'var(--card2)',border:'1px solid var(--border)',color:'var(--text)',whiteSpace:'nowrap'}}>
            🎲 Generate
          </button>
        </div>
      </div>
      {err && <div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary" style={{width:'100%'}} onClick={create}>Create Guard Login</button>
    </div>}

    {/* Guard list */}
    {!guards.length && !showForm && <div className="empty">
      No guards yet. Add a guard to give them PIN-based access to the GateKeeper app.
    </div>}

    {guards.map(g => <div key={g.role_id} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:20,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:42,height:42,borderRadius:21,background:'rgba(88,166,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🛡</div>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{g.guard_name || g.name || 'Guard'}</div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Guard · {g.phone}</div>
          </div>
        </div>

        {/* PIN display / edit */}
        {editPin?.roleId === g.role_id ? (
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input value={editPin.pin} onChange={e=>setEditPin(p=>({...p,pin:e.target.value.replace(/\D/g,'')}))}
              maxLength={8} style={{width:90,padding:'6px 10px',borderRadius:8,border:'1px solid var(--accent)',background:'var(--card2)',color:'var(--text)',fontFamily:'monospace',fontSize:18,letterSpacing:4,textAlign:'center'}}/>
            <button onClick={()=>savePin(g.role_id)} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--accent)',color:'white',cursor:'pointer',fontWeight:600,fontSize:12,fontFamily:'inherit'}}>Save</button>
            <button onClick={()=>{setEditPin(null);setErr('');}} style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',background:'none',color:'var(--text2)',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>✕</button>
          </div>
        ) : (
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 16px',fontFamily:'monospace',fontSize:22,letterSpacing:6,color:'var(--accent)',fontWeight:700}}>
              {g.guard_pin || '—'}
            </div>
            <button onClick={()=>{setEditPin({roleId:g.role_id,pin:g.guard_pin||''});setErr('');}}
              style={{padding:'6px 10px',borderRadius:8,border:'1px solid var(--border)',background:'none',color:'var(--text2)',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>
              ✏️
            </button>
            <button onClick={()=>remove(g.role_id, g.guard_name||g.name)}
              style={{padding:'6px 10px',borderRadius:8,border:'none',background:'rgba(248,81,73,.12)',color:'var(--red)',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>
              Remove
            </button>
          </div>
        )}
      </div>
      {err && editPin?.roleId === g.role_id && <div style={{color:'var(--red)',fontSize:12,marginTop:8}}>{err}</div>}
    </div>)}

    <div style={{marginTop:20,padding:'14px 16px',background:'rgba(255,255,255,.03)',borderRadius:12,border:'1px solid var(--border)'}}>
      <p style={{fontSize:12,color:'var(--text2)',margin:0,lineHeight:1.6}}>
        🔑 Guards use their <strong style={{color:'var(--text)'}}>PIN only</strong> to log in to the GateKeeper app — no phone or OTP needed.<br/>
        Share the PIN securely with the guard. They'll also need to select this society on the login screen.
      </p>
    </div>
  </div>;
}

function NewsAdmin() {
  const [news, setNews] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({title:'', body:'', isPinned:false});
  const [photos, setPhotos] = useState([]); // base64 strings
  const [msg, setMsg] = useState('');
  const fileRef = React.useRef(null);

  const load = () => api('/api/news').then(d=>setNews(Array.isArray(d)?d:[]));
  useEffect(()=>{ load(); },[]);

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  const addPhotos = e => {
    const files = Array.from(e.target.files);
    if(photos.length + files.length > 8) return alert('Max 8 photos per post');
    files.forEach(file=>{
      const r = new FileReader();
      r.onload = ev => setPhotos(p=>[...p, ev.target.result]);
      r.readAsDataURL(file);
    });
    e.target.value = '';
  };

  const publish = () => {
    if(!form.title.trim()) return setMsg('Title is required');
    api('/api/news',{method:'POST',body:JSON.stringify({...form,images:photos})}).then(d=>{
      if(d.error) return setMsg(d.error);
      setMsg(''); setForm({title:'',body:'',isPinned:false}); setPhotos([]); setShowForm(false);
      load();
    });
  };

  const deletePost = id => {
    if(!confirm('Delete this news post?')) return;
    api(`/api/news/${id}`,{method:'DELETE'}).then(load);
  };

  const togglePin = (id, pinned) => {
    api(`/api/news/${id}/pin`,{method:'POST',body:JSON.stringify({pin:!pinned})}).then(load);
  };

  const formatDate = dt => new Date(dt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

  return <div>
    <div className="top-bar" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <h2>Society News</h2>
      <button className="btn btn-primary btn-sm" onClick={()=>setShowForm(s=>!s)}>
        {showForm ? '✕ Cancel' : '+ New Post'}
      </button>
    </div>

    {/* Compose form */}
    {showForm && <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:24,marginBottom:24}}>
      <h3 style={{marginBottom:16}}>New Announcement</h3>

      {/* Photo upload */}
      <div style={{marginBottom:16}}>
        <label style={{fontSize:12,color:'var(--text2)',display:'block',marginBottom:8}}>Photos <span style={{opacity:.6}}>(up to 8)</span></label>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:8}}>
          {photos.map((src,i)=><div key={i} style={{position:'relative',aspectRatio:'1',borderRadius:10,overflow:'hidden'}}>
            <img src={src} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            <button onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:4,right:4,width:20,height:20,borderRadius:'50%',background:'rgba(0,0,0,.7)',border:'none',color:'white',cursor:'pointer',fontSize:13,lineHeight:'20px',textAlign:'center',padding:0}}>×</button>
          </div>)}
          {photos.length<8&&<button onClick={()=>fileRef.current.click()} style={{aspectRatio:'1',borderRadius:10,border:'2px dashed var(--border)',background:'none',cursor:'pointer',color:'var(--text2)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,fontSize:11,fontFamily:'inherit'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Add
          </button>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={addPhotos}/>
      </div>

      <div className="form-group">
        <label className="label">Title *</label>
        <input className="input" value={form.title} onChange={e=>setF('title',e.target.value)} placeholder="Announcement title"/>
      </div>
      <div className="form-group">
        <label className="label">Body</label>
        <textarea className="input" rows={4} value={form.body} onChange={e=>setF('body',e.target.value)} placeholder="Full details of the announcement..." style={{resize:'vertical'}}/>
      </div>
      <div className="form-group" style={{display:'flex',alignItems:'center',gap:10}}>
        <input type="checkbox" id="pin-chk" checked={form.isPinned} onChange={e=>setF('isPinned',e.target.checked)} style={{width:16,height:16,accentColor:'var(--accent)'}}/>

      </div>
      {msg&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{msg}</div>}
      <button className="btn btn-primary" style={{width:'100%'}} onClick={publish}>Publish Announcement</button>
    </div>}

    {/* News feed */}
    {!news.length&&!showForm&&<div className="empty">No news posts yet. Create your first announcement!</div>}
    {news.map(n=><div key={n.id} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:20,marginBottom:16}}>
      {/* Photo strip */}
      {n.images&&n.images.length>0&&<div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:14,borderRadius:10,overflow:'hidden'}}>
        {n.images.slice(0,4).map((src,i)=><div key={i} style={{position:'relative',flexShrink:0}}>
          <img src={src} style={{height:120,width:120,objectFit:'cover',borderRadius:10,display:'block'}}/>
          {i===3&&n.images.length>4&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:18,borderRadius:10}}>+{n.images.length-4}</div>}
        </div>)}
      </div>}

      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
        <div style={{flex:1}}>
          {n.is_pinned?<span style={{fontSize:11,color:'var(--accent)',fontWeight:600,display:'block',marginBottom:4}}>📌 PINNED</span>:null}
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{n.title}</div>
          {n.body&&<div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6,marginBottom:10,whiteSpace:'pre-wrap'}}>{n.body}</div>}
          <div style={{fontSize:11,color:'var(--text2)'}}>{n.author_name} · {formatDate(n.created_at)}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
          <button onClick={()=>togglePin(n.id,n.is_pinned)} style={{fontSize:11,padding:'4px 10px',borderRadius:8,border:'1px solid var(--border)',background:'none',color:'var(--text2)',cursor:'pointer',fontFamily:'inherit'}}>
            {n.is_pinned?'Unpin':'📌 Pin'}
          </button>
          <button onClick={()=>deletePost(n.id)} style={{fontSize:11,padding:'4px 10px',borderRadius:8,border:'none',background:'rgba(248,81,73,.15)',color:'var(--red)',cursor:'pointer',fontFamily:'inherit'}}>
            Delete
          </button>
        </div>
      </div>
    </div>)}
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script></body></html>
